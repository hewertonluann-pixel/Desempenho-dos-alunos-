<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Armaduras de Clave</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ================================================
   OVERLAY DE ROTAÇÃO
   Aparece apenas quando o dispositivo está em portrait
   e a largura é menor que 600px (celular).
   Some automaticamente ao girar para landscape.
================================================ */
#rotate-overlay{
  display:none;
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(135deg,#1a1a2e,#0f3460);
  flex-direction:column;align-items:center;justify-content:center;
  gap:18px;text-align:center;padding:32px;
}
#rotate-overlay .rot-icon{
  font-size:3.5rem;
  animation:rotAnim 1.8s ease-in-out infinite;
}
#rotate-overlay p{
  color:#e2e8f0;font-size:1rem;font-family:'Segoe UI',sans-serif;line-height:1.6;
  max-width:280px;
}
#rotate-overlay small{color:#94a3b8;font-size:.8rem}
@keyframes rotAnim{
  0%,100%{transform:rotate(0deg)}
  40%    {transform:rotate(90deg)}
  60%    {transform:rotate(90deg)}
}
/* Exibe overlay em portrait em telas pequenas */
@media (max-width:767px) and (orientation:portrait){
  #rotate-overlay{display:flex}
}

body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:16px 14px 40px;color:#e2e8f0;
}
.back-btn{
  align-self:flex-start;
  background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);
  color:#e2e8f0;padding:7px 14px;border-radius:10px;font-size:.82rem;
  font-weight:600;cursor:pointer;text-decoration:none;display:flex;
  align-items:center;gap:6px;margin-bottom:12px;
  transition:background .18s,border-color .18s;
}
.back-btn:hover{background:rgba(255,255,255,.15);border-color:#a855f7}
h1{font-size:1.35rem;color:#e2b96f;text-shadow:0 2px 8px rgba(0,0,0,.5);margin-bottom:3px;text-align:center}
.subtitle{color:#94a3b8;font-size:.82rem;margin-bottom:14px;text-align:center}
.phase-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
.tab-btn{
  background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);
  color:#94a3b8;padding:6px 16px;border-radius:20px;font-size:.82rem;
  font-weight:600;cursor:pointer;transition:all .2s;
}
.tab-btn.active{background:rgba(168,85,247,.2);border-color:#a855f7;color:#e2b96f}
.tab-btn:hover:not(.active){background:rgba(255,255,255,.12);color:#e2e8f0}
.main-card{
  background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);
  border-radius:18px;padding:22px 20px;width:100%;max-width:920px;
  backdrop-filter:blur(8px);box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.phase-title{font-size:1rem;font-weight:700;color:#e2b96f;margin-bottom:5px}
.phase-desc{
  font-size:.84rem;color:#94a3b8;margin-bottom:14px;line-height:1.6;
}
.phase-desc strong{color:#e2e8f0}
.legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.74rem;color:#94a3b8}
.legend-box{width:20px;height:12px;border-radius:3px}
.lb-tone {background:linear-gradient(160deg,#8eafc4,#5b7f9c)}
.lb-semi {background:linear-gradient(160deg,#7dc4a6,#4a9a80)}
.lb-sharp{background:linear-gradient(160deg,#f7d98b,#e2b96f)}
.lb-wrong{background:linear-gradient(160deg,#f87171,#dc2626)}
.scale-label{font-size:.72rem;font-weight:700;color:#e2b96f;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.scale-label.ref{color:#475569}
.model-badge{
  display:inline-block;
  background:rgba(226,185,111,.15);border:1px solid rgba(226,185,111,.35);
  color:#e2b96f;font-size:.67rem;font-weight:700;
  padding:2px 9px;border-radius:20px;letter-spacing:.5px;margin-bottom:6px;
}
.model-box{border:1.5px solid rgba(226,185,111,.25);border-radius:12px;padding:12px 12px 8px;margin-bottom:4px;background:rgba(226,185,111,.04)}
.ref-box  {border:1px dashed rgba(255,255,255,.1);border-radius:12px;padding:12px 12px 8px;margin-bottom:4px;opacity:.8}

/* ================================================
   ESCADA
   Em landscape mobile aproveitamos mais largura:
   bricks maiores, gaps maiores.
================================================ */
.staircase{
  display:flex;align-items:flex-end;gap:0;
  overflow-x:auto;padding:12px 4px 0;margin:0 auto 6px;
  -webkit-overflow-scrolling:touch;
}
.step-wrap{
  display:flex;flex-direction:column;align-items:center;
  width:62px;flex-shrink:0;
}
.note-top{
  font-size:.78rem;font-weight:800;color:#e2e8f0;
  margin-bottom:4px;text-align:center;white-space:nowrap;
}
.brick{
  width:56px;height:52px;
  border-radius:8px 8px 3px 3px;
  display:flex;align-items:center;justify-content:center;
  font-size:.86rem;font-weight:800;color:#1a1a2e;
  box-shadow:0 4px 14px rgba(0,0,0,.35),inset 0 2px 0 rgba(255,255,255,.25);
  user-select:none;flex-shrink:0;
}
.brick.tone  {background:linear-gradient(160deg,#8eafc4,#5b7f9c)}
.brick.semi  {background:linear-gradient(160deg,#7dc4a6,#4a9a80)}
.brick.golden{
  background:linear-gradient(160deg,#f7d98b,#e2b96f);
  box-shadow:0 4px 20px rgba(226,185,111,.55),inset 0 2px 0 rgba(255,255,255,.35);
  animation:goldPulse 1.8s ease-in-out infinite;
}
.brick.wrong{background:linear-gradient(160deg,#f87171,#dc2626)!important;animation:shake .4s ease}
.brick.dropzone{
  background:rgba(226,185,111,.07);
  border:2.5px dashed rgba(226,185,111,.5);
  color:#e2b96f;font-size:1.1rem;cursor:pointer;box-shadow:none;animation:none;
}
.brick.dropzone:hover,.brick.dropzone.drag-over{
  background:rgba(226,185,111,.18);border-color:#e2b96f;
  box-shadow:0 0 16px rgba(226,185,111,.35);
}
.step-gap{width:28px;flex-shrink:0;position:relative;align-self:stretch;}
.gap-tag{
  position:absolute;left:50%;transform:translateX(-50%);
  white-space:nowrap;font-size:.58rem;font-weight:700;
  padding:2px 4px;border-radius:4px;
  background:rgba(255,255,255,.07);color:#64748b;
  border:1px solid rgba(255,255,255,.12);pointer-events:none;
}
.gap-tag.semi {color:#7dc4a6;background:rgba(125,196,166,.12);border-color:rgba(125,196,166,.3)}
.gap-tag.wrong{color:#f87171;background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.3)}

@keyframes goldPulse{
  0%,100%{box-shadow:0 4px 20px rgba(226,185,111,.55),inset 0 2px 0 rgba(255,255,255,.35)}
  50%    {box-shadow:0 6px 30px rgba(226,185,111,.85),inset 0 2px 0 rgba(255,255,255,.45)}
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes dropIn{
  0%  {opacity:0;transform:translateY(-30px) scale(.75)}
  70% {transform:translateY(3px) scale(1.04)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
.brick.drop-in{animation:dropIn .5s cubic-bezier(.22,1,.36,1) forwards}

.formula-bar{display:flex;gap:5px;justify-content:center;margin:3px 0 12px;flex-wrap:wrap}
.fb{padding:3px 10px;border-radius:7px;font-size:.74rem;font-weight:700;border:1.5px solid transparent}
.fb.ft{background:rgba(142,175,196,.15);border-color:#5b7f9c;color:#8eafc4}
.fb.fs{background:rgba(125,196,166,.15);border-color:#4a9a80;color:#7dc4a6}
.fb.fw{background:rgba(248,113,113,.12);border-color:#dc2626;color:#f87171}

.scale-divider{border:none;border-top:1px dashed rgba(255,255,255,.08);margin:14px 0}
.explain-box{
  background:rgba(226,185,111,.08);border:1.5px solid rgba(226,185,111,.25);
  border-radius:10px;padding:12px 16px;
  font-size:.83rem;color:#cbd5e1;line-height:1.6;margin-bottom:14px;
}
.explain-box strong{color:#e2b96f}
.feedback-bar{
  min-height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;padding:0 16px;font-size:.88rem;font-weight:600;
  margin-bottom:10px;opacity:0;transition:opacity .3s;
}
.feedback-bar.show{opacity:1}
.feedback-bar.correct{background:rgba(46,213,115,.15);color:#2ed573;border:1.5px solid #2ed573}

.sharp-pool{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:12px}
.sharp-pool p{font-size:.79rem;color:#94a3b8;text-align:center}
.sharp-drag{
  background:linear-gradient(160deg,#f7d98b,#e2b96f);
  border-radius:10px;width:60px;height:50px;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:800;color:#1a1a2e;
  cursor:pointer;user-select:none;
  box-shadow:0 4px 20px rgba(226,185,111,.5);
  animation:goldPulse 1.8s ease-in-out infinite;
  -webkit-tap-highlight-color:transparent;
}
.sharp-drag:active{transform:scale(1.08)}

.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.btn-primary{
  background:linear-gradient(90deg,#7c3aed,#a855f7);
  border:none;color:#fff;padding:9px 20px;border-radius:10px;
  font-size:.86rem;font-weight:700;cursor:pointer;
  box-shadow:0 4px 14px rgba(124,58,237,.4);transition:transform .15s,box-shadow .15s;
  -webkit-tap-highlight-color:transparent;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,58,237,.55)}
.btn-secondary{
  background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);
  color:#e2e8f0;padding:9px 18px;border-radius:10px;
  font-size:.86rem;font-weight:600;cursor:pointer;transition:background .18s;
  -webkit-tap-highlight-color:transparent;
}
.btn-secondary:hover{background:rgba(255,255,255,.14)}

/* ================================================
   LANDSCAPE MOBILE (largura 480-767px)
   Bricks maiores, mais compacto verticalmente,
   escada aproveita tela mais larga.
================================================ */
@media (max-width:767px) and (orientation:landscape){
  body{padding:10px 12px 24px}
  h1{font-size:1.1rem;margin-bottom:2px}
  .subtitle{font-size:.75rem;margin-bottom:8px}
  .phase-tabs{gap:6px;margin-bottom:10px}
  .tab-btn{padding:5px 12px;font-size:.76rem}
  .main-card{padding:14px 12px;border-radius:14px}
  .phase-desc{font-size:.78rem;margin-bottom:10px}
  /* Bricks proporcionais — landscape tem largura para 8 bricks sem scroll */
  .step-wrap{width:54px}
  .brick{width:48px;height:46px;font-size:.76rem}
  .step-gap{width:22px}
  .note-top{font-size:.7rem}
  .gap-tag{font-size:.54rem;padding:1px 3px}
  .formula-bar{margin:2px 0 8px}
  .fb{padding:2px 8px;font-size:.7rem}
  .explain-box{padding:10px 12px;font-size:.78rem;margin-bottom:10px}
  .btn-row{gap:8px;margin-top:8px}
  .btn-primary,.btn-secondary{padding:8px 14px;font-size:.78rem}
  .scale-divider{margin:10px 0}
  .sharp-pool{margin-bottom:8px;gap:4px}
  .sharp-pool p{font-size:.74rem}
  .sharp-drag{width:52px;height:44px;font-size:.9rem}
  .legend{gap:8px;margin-bottom:8px}
  .legend-item{font-size:.68rem}
}

/* Portrait pequeno (fallback caso o overlay seja fechado) */
@media (max-width:480px) and (orientation:portrait){
  .step-wrap{width:42px}
  .brick{width:36px;height:40px;font-size:.68rem}
  .step-gap{width:18px}
  .main-card{padding:12px 8px}
  h1{font-size:1rem}
}
</style>
</head>
<body>

<!-- OVERLAY: aparece em portrait, some ao girar -->
<div id="rotate-overlay">
  <div class="rot-icon">📱</div>
  <p>Para a melhor experiência, gire o celular para <strong style="color:#e2b96f">modo paisagem</strong>.</p>
  <small>A escada de notas precisa de espaço horizontal 🎵</small>
</div>

<a href="atividades.html" class="back-btn">← Atividades</a>
<h1>🎼 Armaduras de Clave</h1>
<p class="subtitle">Entenda como as escalas são formadas e por que surgem os sustenidos</p>

<div class="phase-tabs">
  <button class="tab-btn active" onclick="goPhase(0)">1 – Dó Maior</button>
  <button class="tab-btn" onclick="goPhase(1)">2 – O problema do Sol</button>
  <button class="tab-btn" onclick="goPhase(2)">3 – Sol Maior ✨</button>
</div>

<div class="main-card" id="main-card"></div>

<script>
let AC=null;
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function playNote(f,d=0,dur=.6){
  try{
    const ctx=ac(),o=ctx.createOscillator(),g=ctx.createGain(),t=ctx.currentTime+d;
    o.type='sine';o.frequency.setValueAtTime(f,t);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(.3,t+.02);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+dur);
  }catch(e){}
}
function playDo(){[261.63,293.66,329.63,349.23,392,440,493.88,523.25].forEach((f,i)=>playNote(f,i*.22,.55));}
function playSol(sharp){
  [392,440,493.88,523.25,587.33,659.25,sharp?739.99:698.46,784].forEach((f,i)=>playNote(f,i*.22,.55));
}

const DO_SCALE=[
  {n:'Dó', iv:'',     type:'tone'},
  {n:'Ré', iv:'Tom', type:'tone'},
  {n:'Mi', iv:'Tom', type:'tone'},
  {n:'Fá', iv:'Semi',type:'semi'},
  {n:'Sol',iv:'Tom', type:'tone'},
  {n:'Lá', iv:'Tom', type:'tone'},
  {n:'Si', iv:'Tom', type:'tone'},
  {n:'Dó', iv:'Semi',type:'semi'},
];

const SOL_WRONG=[
  {n:'Sol',iv:'',          type:'tone'},
  {n:'Lá', iv:'Tom',      type:'tone'},
  {n:'Si', iv:'Tom',      type:'tone'},
  {n:'Dó', iv:'Semi',     type:'semi'},
  {n:'Ré', iv:'Tom',      type:'tone'},
  {n:'Mi', iv:'Tom',      type:'tone'},
  {n:'Fá', iv:'Semi',     type:'wrong'},
  {n:'Sol',iv:'WrongTom', type:'semi'},
];

const SOL_RIGHT=[
  {n:'Sol', iv:'',     type:'tone'},
  {n:'Lá',  iv:'Tom', type:'tone'},
  {n:'Si',  iv:'Tom', type:'tone'},
  {n:'Dó',  iv:'Semi',type:'semi'},
  {n:'Ré',  iv:'Tom', type:'tone'},
  {n:'Mi',  iv:'Tom', type:'tone'},
  {n:'Fá♯', iv:'Tom', type:'golden'},
  {n:'Sol', iv:'Semi',type:'tone'},
];

const TONE=48, SEMI=24, BRICK_H=52;

function ivStep(iv){
  if(iv==='Tom'||iv==='WrongTom') return TONE;
  if(iv==='Semi') return SEMI;
  return 0;
}

function calcMB(scale){
  let acc=0;
  const raw=scale.map(s=>{ acc+=ivStep(s.iv); return acc; });
  const base=raw[0];
  return raw.map(v=>v-base);
}

function buildStaircase(scale, dropIndex=-1, solved=false){
  const wrap=document.createElement('div');
  wrap.className='staircase';
  const mb=calcMB(scale);

  scale.forEach((s,i)=>{
    if(i>0){
      const gapEl=document.createElement('div');
      gapEl.className='step-gap';
      const tag=document.createElement('div');
      const isSemi    =s.iv==='Semi';
      const isWrongTom=s.iv==='WrongTom';
      tag.className='gap-tag'+(isSemi?' semi':isWrongTom?' wrong':'');
      tag.textContent=isSemi?'½ T':isWrongTom?'1T ⚠️':'1 T';
      const topL=mb[i-1]+BRICK_H, topR=mb[i]+BRICK_H;
      tag.style.bottom=((topL+topR)/2)+'px';
      gapEl.appendChild(tag);
      wrap.appendChild(gapEl);
    }
    const col=document.createElement('div');
    col.className='step-wrap';
    col.style.marginBottom=mb[i]+'px';
    const lbl=document.createElement('div');
    lbl.className='note-top';
    lbl.textContent=s.n;
    col.appendChild(lbl);
    let brick;
    if(dropIndex===i&&!solved){
      brick=document.createElement('div');
      brick.className='brick dropzone';
      brick.innerHTML='♯';
      brick.title='Toque aqui';
      brick.addEventListener('click',onDropSharp);
      brick.addEventListener('touchend',e=>{e.preventDefault();onDropSharp();},{passive:false});
      brick.addEventListener('dragover',e=>{e.preventDefault();brick.classList.add('drag-over');});
      brick.addEventListener('dragleave',()=>brick.classList.remove('drag-over'));
      brick.addEventListener('drop',e=>{e.preventDefault();onDropSharp();});
    } else {
      brick=document.createElement('div');
      brick.className='brick '+(solved&&s.type==='golden'?'golden drop-in':s.type);
      brick.textContent=s.n;
    }
    col.appendChild(brick);
    wrap.appendChild(col);
  });
  return wrap;
}

function buildFormula(scale){
  const bar=document.createElement('div');
  bar.className='formula-bar';
  scale.filter(s=>s.iv).forEach(s=>{
    const b=document.createElement('div');
    const isWrong=s.iv==='WrongTom';
    b.className='fb '+(s.iv==='Semi'?'fs':isWrong?'fw':'ft');
    b.textContent=s.iv==='Semi'?'½ Tom':isWrong?'1 Tom ⚠️':'1 Tom';
    bar.appendChild(b);
  });
  return bar;
}

function buildLegend(showWrong=false){
  const d=document.createElement('div');
  d.className='legend';
  [['lb-tone','1 Tom'],['lb-semi','½ Tom'],['lb-sharp','♯ Sustenido'],
   ...(showWrong?[['lb-wrong','Incorreto']]:[])]
  .forEach(([c,t])=>{
    const it=document.createElement('div');
    it.className='legend-item';
    it.innerHTML=`<div class="legend-box ${c}"></div><span>${t}</span>`;
    d.appendChild(it);
  });
  return d;
}

function h(parent,tag,cls,html){
  const el=document.createElement(tag);
  if(cls)el.className=cls;
  if(html!==undefined)el.innerHTML=html;
  if(parent)parent.appendChild(el);
  return el;
}
function btn(parent,cls,label,cb){
  const b=h(parent,'button',cls,label);
  b.addEventListener('click',cb);
  return b;
}

let phase2State='intro';

function renderPhase0(){
  const card=document.getElementById('main-card');
  card.innerHTML='';
  h(card,'div','phase-title','🏗️ A Escala Modelo: Dó Maior');
  h(card,'div','phase-desc').innerHTML=
    `<strong>Dó Maior</strong> é a escala modelo — sem sustenidos nem bemoéis.<br>
    A etiqueta entre dois degraus mostra o intervalo:
    <strong>1 Tom</strong> (degrau alto) ou <strong>½ Tom</strong> (degrau baixo).<br>
    Fórmula: <strong>T – T – ½ – T – T – T – ½</strong>.`;
  card.appendChild(buildLegend());
  const mb=h(card,'div','model-box');
  h(mb,'div','model-badge','⭐ ESCALA MODELO MAIOR');
  h(mb,'div','scale-label').textContent='DÓ MAIOR';
  mb.appendChild(buildStaircase(DO_SCALE));
  mb.appendChild(buildFormula(DO_SCALE));
  const br=h(card,'div','btn-row');
  btn(br,'btn-secondary','🔊 Ouvir Dó Maior',playDo);
  btn(br,'btn-primary','Próxima fase →',()=>goPhase(1));
}

function renderPhase1(){
  const card=document.getElementById('main-card');
  card.innerHTML='';
  h(card,'div','phase-title','❓ E se começarmos pelo Sol?');
  h(card,'div','phase-desc').innerHTML=
    `Compare as duas escadas — a fórmula deve ser idêntica à de Dó Maior.<br>
    <strong>Mi→Fá</strong> já é naturalmente <strong>½ Tom</strong> (correto),
    mas <strong>Fá→Sol</strong> = <strong>1 Tom</strong> — degrau alto demais. ⚠️`;
  card.appendChild(buildLegend(true));
  h(card,'div','scale-label').textContent='SOL — sem sustenido ⚠️';
  card.appendChild(buildStaircase(SOL_WRONG));
  card.appendChild(buildFormula(SOL_WRONG));
  h(card,'hr','scale-divider');
  const rb=h(card,'div','ref-box');
  h(rb,'div','model-badge','⭐ ESCALA MODELO MAIOR');
  h(rb,'div','scale-label ref').textContent='DÓ MAIOR — referência';
  rb.appendChild(buildStaircase(DO_SCALE));
  rb.appendChild(buildFormula(DO_SCALE));
  h(card,'div','explain-box').innerHTML=
    `<strong>⚠️ O 7º degrau está alto demais!</strong><br>
    <strong>Mi→Fá</strong> é semitom natural — correto.
    O problema é <strong>Fá→Sol</strong>: 1 Tom em vez de ½ Tom.<br>
    Solução: elevar o Fá meio tom → <strong>Fá♯</strong>.`;
  const br=h(card,'div','btn-row');
  btn(br,'btn-secondary','🔊 Ouvir Sol (sem ♯)',()=>playSol(false));
  btn(br,'btn-primary','Corrigir →',()=>goPhase(2));
}

function renderPhase2(state){
  const card=document.getElementById('main-card');
  card.innerHTML='';
  h(card,'div','phase-title','✨ Sol Maior – Coloque o Sustenido!');
  if(state==='intro'){
    h(card,'div','phase-desc').innerHTML=
      `O bloco dourado <strong>♯</strong> eleva a nota <strong>meio tom</strong>.<br>
      Toque no espaço tracejado para encaixar o ♯ no 7º grau.`;
    const pool=h(card,'div','sharp-pool');
    h(pool,'p',null,'Bloco disponível — toque no espaço tracejado:');
    const drag=h(pool,'div','sharp-drag','♯ Fá');
    drag.draggable=true;
    drag.addEventListener('dragstart',e=>e.dataTransfer.setData('text','sharp'));
    h(card,'div','feedback-bar').id='fb-p2';
    card.appendChild(buildLegend(true));
    h(card,'div','scale-label').textContent='SOL — coloque o ♯ no Fá';
    card.appendChild(buildStaircase(SOL_WRONG,6,false));
    h(card,'hr','scale-divider');
    const rb=h(card,'div','ref-box');
    h(rb,'div','model-badge','⭐ ESCALA MODELO MAIOR');
    h(rb,'div','scale-label ref').textContent='DÓ MAIOR — referência';
    rb.appendChild(buildStaircase(DO_SCALE));
    const br=h(card,'div','btn-row');
    btn(br,'btn-secondary','🔊 Ouvir sem ♯',()=>playSol(false));
  }
  if(state==='solved'){
    h(card,'div','phase-desc').innerHTML=
      `<strong style="color:#2ed573">✓ Perfeito!</strong>
      O <strong>Fá♯</strong> corrigiu o degrau! As duas escadas têm o mesmo formato.`;
    card.appendChild(buildLegend());
    h(card,'div','scale-label').textContent='SOL MAIOR — correto ✨';
    card.appendChild(buildStaircase(SOL_RIGHT,-1,true));
    card.appendChild(buildFormula(SOL_RIGHT));
    h(card,'hr','scale-divider');
    const rb=h(card,'div','ref-box');
    h(rb,'div','model-badge','⭐ ESCALA MODELO MAIOR');
    h(rb,'div','scale-label ref').textContent='DÓ MAIOR — referência';
    rb.appendChild(buildStaircase(DO_SCALE));
    rb.appendChild(buildFormula(DO_SCALE));
    h(card,'div','explain-box').innerHTML=
      `<strong>🎯 Por que o Fá♯?</strong><br>
      O ♯ eleva o Fá: <strong>Mi→Fá♯</strong> = 1 Tom, e <strong>Fá♯→Sol</strong> = ½ Tom ✔<br>
      Por isso a <strong>armadura de Sol Maior tem 1 sustenido: Fá♯</strong>.`;
    const br=h(card,'div','btn-row');
    btn(br,'btn-secondary','🔊 Ouvir Sol Maior ✔',()=>playSol(true));
    btn(br,'btn-secondary','🔄 Repetir',()=>{phase2State='intro';goPhase(2);});
  }
}

function onDropSharp(){
  const fb=document.getElementById('fb-p2');
  if(fb){fb.textContent='✨ Fá♯ encaixado! Escada corrigida!';fb.className='feedback-bar correct show';}
  setTimeout(()=>{phase2State='solved';renderPhase2('solved');playSol(true);},700);
}

function goPhase(n){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===n));
  if(n===0)renderPhase0();
  if(n===1)renderPhase1();
  if(n===2)renderPhase2(phase2State);
}
goPhase(0);
</script>
</body>
</html>
