<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armaduras de Clave</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:20px 16px 50px;color:#e2e8f0;
}
.back-btn{
  align-self:flex-start;
  background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);
  color:#e2e8f0;padding:8px 16px;border-radius:10px;font-size:.88rem;
  font-weight:600;cursor:pointer;text-decoration:none;display:flex;
  align-items:center;gap:6px;margin-bottom:16px;
  transition:background .18s,border-color .18s;
}
.back-btn:hover{background:rgba(255,255,255,.15);border-color:#a855f7}
h1{font-size:1.6rem;color:#e2b96f;text-shadow:0 2px 8px rgba(0,0,0,.5);margin-bottom:4px;text-align:center}
.subtitle{color:#94a3b8;font-size:.92rem;margin-bottom:20px;text-align:center}
.phase-tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
.tab-btn{
  background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);
  color:#94a3b8;padding:8px 20px;border-radius:20px;font-size:.88rem;
  font-weight:600;cursor:pointer;transition:all .2s;
}
.tab-btn.active{background:rgba(168,85,247,.2);border-color:#a855f7;color:#e2b96f}
.tab-btn:hover:not(.active){background:rgba(255,255,255,.12);color:#e2e8f0}
.main-card{
  background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);
  border-radius:20px;padding:28px 24px;width:100%;max-width:860px;
  backdrop-filter:blur(8px);box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.phase-title{font-size:1.15rem;font-weight:700;color:#e2b96f;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.phase-desc{font-size:.9rem;color:#94a3b8;margin-bottom:20px;line-height:1.65}
.phase-desc strong{color:#e2e8f0}

/* ── LEGENDA ── */
.legend{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-bottom:18px}
.legend-item{display:flex;align-items:center;gap:7px;font-size:.8rem;color:#94a3b8}
.legend-box{width:26px;height:16px;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.lb-tone{background:linear-gradient(160deg,#8eafc4,#5b7f9c)}
.lb-semi{background:linear-gradient(160deg,#7dc4a6,#4a9a80)}
.lb-sharp{background:linear-gradient(160deg,#f7d98b,#e2b96f)}
.lb-wrong{background:linear-gradient(160deg,#f87171,#dc2626)}

/* ── LABEL DE ESCADA ── */
.scale-label{
  font-size:.78rem;font-weight:700;color:#e2b96f;
  margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;
  text-align:left;
}
.scale-ref-label{color:#64748b}

/* ════════════════════════════════════════
   ESCADA VISUAL — cada nota é um degrau
   A escada cresce da esquerda p/ direita,
   cada bloco mais alto que o anterior.
   Usamos position:relative + margin-bottom
   acumulado para criar o efeito de escada.
════════════════════════════════════════ */
.staircase{
  display:flex;
  align-items:flex-end;   /* ancora todos no fundo */
  gap:0;
  margin:0 auto 8px;
  overflow-x:auto;
  padding:8px 4px 0;
}

/* Cada coluna = nota + label abaixo */
.step-col{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:68px;
  flex-shrink:0;
}

/* O bloco em si — altura define o degrau */
.brick{
  width:62px;
  border-radius:8px 8px 3px 3px;
  display:flex;align-items:center;justify-content:center;
  font-size:.95rem;font-weight:800;color:#1a1a2e;
  box-shadow:0 4px 14px rgba(0,0,0,.35),inset 0 2px 0 rgba(255,255,255,.25);
  transition:height .45s ease,background .35s;
  user-select:none;
  position:relative;
  /* altura = base + acumulado dos degraus anteriores */
}
.brick.tone  {background:linear-gradient(160deg,#8eafc4,#5b7f9c)}
.brick.semi  {background:linear-gradient(160deg,#7dc4a6,#4a9a80)}
.brick.golden{
  background:linear-gradient(160deg,#f7d98b,#e2b96f);
  box-shadow:0 4px 20px rgba(226,185,111,.55),inset 0 2px 0 rgba(255,255,255,.35);
  animation:goldPulse 1.8s ease-in-out infinite;
}
.brick.wrong{
  background:linear-gradient(160deg,#f87171,#dc2626) !important;
  animation:shake .4s ease;
}
/* Drop zone — mesmo tamanho do brick correspondente */
.brick.dropzone{
  background:rgba(226,185,111,.07);
  border:2.5px dashed rgba(226,185,111,.45);
  color:#e2b96f;font-size:1.3rem;
  cursor:pointer;
  box-shadow:none;
  animation:none;
}
.brick.dropzone:hover,.brick.dropzone.drag-over{
  background:rgba(226,185,111,.18);
  border-color:#e2b96f;
  box-shadow:0 0 16px rgba(226,185,111,.35);
}
@keyframes goldPulse{
  0%,100%{box-shadow:0 4px 20px rgba(226,185,111,.55),inset 0 2px 0 rgba(255,255,255,.35)}
  50%    {box-shadow:0 6px 30px rgba(226,185,111,.85),inset 0 2px 0 rgba(255,255,255,.45)}
}
@keyframes shake{
  0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)}
}
@keyframes dropIn{
  0%  {opacity:0;transform:translateY(-36px) scale(.7)}
  70% {transform:translateY(3px) scale(1.05)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
.brick.drop-in{animation:dropIn .5s cubic-bezier(.22,1,.36,1) forwards}

/* Label abaixo do brick */
.step-note-label{
  margin-top:5px;
  font-size:.72rem;font-weight:700;color:rgba(255,255,255,.85);
  text-align:center;line-height:1.25;
  min-height:28px;
}
.step-note-label .itag{
  display:block;
  font-size:.62rem;color:#64748b;font-weight:500;
  background:rgba(255,255,255,.06);
  padding:1px 5px;border-radius:5px;margin-top:2px;
}
.step-note-label .itag.semi-itag{color:#7dc4a6}
.step-note-label .itag.wrong-itag{color:#f87171}

/* Separador vertical entre steps */
.step-sep{width:3px;align-self:stretch;background:rgba(255,255,255,.06);flex-shrink:0}

/* ── FÓRMULA ── */
.formula-bar{display:flex;gap:6px;justify-content:center;margin:6px 0 20px;flex-wrap:wrap}
.fb{padding:5px 13px;border-radius:8px;font-size:.8rem;font-weight:700;border:1.5px solid transparent}
.fb.ft{background:rgba(142,175,196,.15);border-color:#5b7f9c;color:#8eafc4}
.fb.fs{background:rgba(125,196,166,.15);border-color:#4a9a80;color:#7dc4a6}
.fb.fg{background:rgba(226,185,111,.2);border-color:#e2b96f;color:#e2b96f}

/* ── DIVIDER entre escalas ── */
.scale-divider{
  border:none;border-top:1px dashed rgba(255,255,255,.1);
  margin:14px 0;
}

/* ── EXPLAIN BOX ── */
.explain-box{
  background:rgba(226,185,111,.08);border:1.5px solid rgba(226,185,111,.25);
  border-radius:12px;padding:14px 18px;
  font-size:.88rem;color:#cbd5e1;line-height:1.6;
  margin-bottom:18px;
}
.explain-box strong{color:#e2b96f}

/* ── FEEDBACK ── */
.feedback-bar{
  min-height:42px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;padding:0 20px;font-size:.95rem;font-weight:600;
  margin-bottom:14px;opacity:0;transition:opacity .3s;
}
.feedback-bar.show{opacity:1}
.feedback-bar.correct{background:rgba(46,213,115,.15);color:#2ed573;border:1.5px solid #2ed573}
.feedback-bar.wrong  {background:rgba(255,71,87,.15); color:#ff4757;border:1.5px solid #ff4757}
.feedback-bar.info   {background:rgba(226,185,111,.12);color:#e2b96f;border:1.5px solid rgba(226,185,111,.3)}

/* ── SHARP POOL ── */
.sharp-pool{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:18px}
.sharp-pool p{font-size:.85rem;color:#94a3b8;text-align:center}
.sharp-drag{
  background:linear-gradient(160deg,#f7d98b,#e2b96f);
  border-radius:10px;width:68px;height:68px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;font-weight:800;color:#1a1a2e;
  cursor:grab;user-select:none;
  box-shadow:0 4px 20px rgba(226,185,111,.5);
  animation:goldPulse 1.8s ease-in-out infinite;
  transition:transform .15s;
}
.sharp-drag:active{cursor:grabbing;transform:scale(1.06)}

/* ── BTNS ── */
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.btn-primary{
  background:linear-gradient(90deg,#7c3aed,#a855f7);
  border:none;color:#fff;padding:11px 26px;border-radius:10px;
  font-size:.93rem;font-weight:700;cursor:pointer;
  box-shadow:0 4px 14px rgba(124,58,237,.4);
  transition:transform .15s,box-shadow .15s;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,58,237,.55)}
.btn-secondary{
  background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);
  color:#e2e8f0;padding:11px 26px;border-radius:10px;
  font-size:.93rem;font-weight:600;cursor:pointer;transition:background .18s;
}
.btn-secondary:hover{background:rgba(255,255,255,.14)}

@media(max-width:600px){
  .step-col{width:52px}
  .brick{width:46px;font-size:.78rem}
  .main-card{padding:18px 10px}
  h1{font-size:1.2rem}
}
</style>
</head>
<body>

<a href="atividades.html" class="back-btn">← Atividades</a>
<h1>🎼 Armaduras de Clave</h1>
<p class="subtitle">Entenda como as escalas são formadas e por que surgem os sustenidos</p>

<div class="phase-tabs">
  <button class="tab-btn active" onclick="goPhase(0)">1 – Dó Maior</button>
  <button class="tab-btn" onclick="goPhase(1)">2 – O problema do Sol</button>
  <button class="tab-btn" onclick="goPhase(2)">3 – Sol Maior ✨</button>
</div>

<div class="main-card" id="main-card"></div>

<script>
/* ══════════════════════════════════════════════════
   AUDIO
══════════════════════════════════════════════════ */
let AC=null;
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function playNote(f,delay=0,dur=.6){
  try{
    const ctx=ac(),o=ctx.createOscillator(),g=ctx.createGain(),t=ctx.currentTime+delay;
    o.type='sine';o.frequency.setValueAtTime(f,t);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(.32,t+.02);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+dur);
  }catch(e){}
}
const DO_FREQS =[261.63,293.66,329.63,349.23,392.00,440.00,493.88,523.25];
function playDo(){DO_FREQS.forEach((f,i)=>playNote(f,i*.22,.55));}
function playSol(sharp){
  [392,440,493.88,523.25,587.33,659.25,sharp?739.99:698.46,784]
    .forEach((f,i)=>playNote(f,i*.22,.55));
}

/* ══════════════════════════════════════════════════
   DADOS
   type: 'tone' | 'semi' | 'golden' | 'wrong'
   itype para a tag de intervalo
══════════════════════════════════════════════════ */
const DO_SCALE=[
  {n:'Dó', iv:'',       type:'tone'},
  {n:'Ré', iv:'1 Tom', type:'tone'},
  {n:'Mi', iv:'1 Tom', type:'tone'},
  {n:'Fá', iv:'½ Tom',type:'semi'},
  {n:'Sol',iv:'1 Tom', type:'tone'},
  {n:'Lá', iv:'1 Tom', type:'tone'},
  {n:'Si', iv:'1 Tom', type:'tone'},
  {n:'Dó', iv:'½ Tom',type:'semi'},
];
// Sol com o Fá errado (7º grau alto demais)
const SOL_WRONG=[
  {n:'Sol',iv:'',       type:'tone'},
  {n:'Lá', iv:'1 Tom', type:'tone'},
  {n:'Si', iv:'1 Tom', type:'tone'},
  {n:'Dó', iv:'½ Tom',type:'semi'},
  {n:'Ré', iv:'1 Tom', type:'tone'},
  {n:'Mi', iv:'1 Tom', type:'tone'},
  {n:'Fá', iv:'1 Tom ⚠️',type:'wrong'},  // <-- erro
  {n:'Sol',iv:'½ Tom',type:'semi'},
];
// Sol correto com Fá♯
const SOL_RIGHT=[
  {n:'Sol', iv:'',       type:'tone'},
  {n:'Lá',  iv:'1 Tom', type:'tone'},
  {n:'Si',  iv:'1 Tom', type:'tone'},
  {n:'Dó',  iv:'½ Tom',type:'semi'},
  {n:'Ré',  iv:'1 Tom', type:'tone'},
  {n:'Mi',  iv:'1 Tom', type:'tone'},
  {n:'Fá♯', iv:'½ Tom',type:'golden'},
  {n:'Sol', iv:'1 Tom', type:'tone'},
];

/* ══════════════════════════════════════════════════
   CONSTRUÇÃO DA ESCADA

   A escada tem forma real: cada nota fica um nível
   acima da anterior. Fazemos isso calculando a altura
   total acumulada e usando align-items:flex-end —
   cada brick tem a altura = base_acumulada.

   Alturas base:
     1º grau : 40px (base mínima)
     + 40px por Tom anterior
     + 20px por semitom anterior

   Assim a coluna 1 = 40px, coluna 2 = 80px, etc.
   align-items:flex-end faz tudo tocar o mesmo solo.

   dropIndex: índice onde mostrar drop-zone em vez do brick.
   solved: anima o brick golden.
══════════════════════════════════════════════════ */
const BASE=38, TONE_H=36, SEMI_H=18;

function buildStaircase(scale, dropIndex=-1, solved=false){
  const wrap=document.createElement('div');
  wrap.className='staircase';

  let accumulated=BASE; // altura acumulada até este degrau
  scale.forEach((s,i)=>{
    // altura do brick = acumulado atual
    const brickH=accumulated;

    // avança o acumulado com o intervalo DESTE grau
    // (para o próximo bloco já estar mais alto)
    if(s.iv.includes('½'))  accumulated+=SEMI_H;
    else if(s.iv.includes('Tom')) accumulated+=TONE_H;

    // coluna
    const col=document.createElement('div');
    col.className='step-col';

    // brick
    let brick;
    if(dropIndex===i&&!solved){
      brick=document.createElement('div');
      brick.className='brick dropzone';
      brick.style.height=brickH+'px';
      brick.innerHTML='♯';
      brick.title='Clique ou solte aqui';
      brick.addEventListener('click',()=>onDropSharp());
      brick.addEventListener('dragover',e=>{e.preventDefault();brick.classList.add('drag-over');});
      brick.addEventListener('dragleave',()=>brick.classList.remove('drag-over'));
      brick.addEventListener('drop',e=>{e.preventDefault();onDropSharp();});
    } else {
      brick=document.createElement('div');
      let cls=solved&&s.type==='golden'?'golden drop-in':s.type;
      brick.className='brick '+cls;
      brick.style.height=brickH+'px';
      brick.textContent=s.n;
    }
    col.appendChild(brick);

    // label
    const lbl=document.createElement('div');
    lbl.className='step-note-label';
    lbl.textContent=s.n;
    if(s.iv){
      const tag=document.createElement('span');
      tag.className='itag'+(s.type==='semi'?' semi-itag':s.type==='wrong'?' wrong-itag':'');
      tag.textContent=s.iv;
      lbl.appendChild(tag);
    }
    col.appendChild(lbl);
    wrap.appendChild(col);

    // separador
    if(i<scale.length-1){
      const sep=document.createElement('div');
      sep.className='step-sep';
      wrap.appendChild(sep);
    }
  });
  return wrap;
}

function buildFormula(scale){
  const bar=document.createElement('div');
  bar.className='formula-bar';
  scale.filter(s=>s.iv).forEach(s=>{
    const b=document.createElement('div');
    b.className='fb '+(s.iv.includes('½')?'fs':'ft');
    b.textContent=s.iv.replace(' ⚠️','');
    bar.appendChild(b);
  });
  return bar;
}

function buildLegend(includeWrong=false){
  const d=document.createElement('div');
  d.className='legend';
  const items=[
    ['lb-tone','1 Tom'],
    ['lb-semi','½ Tom (semitom)'],
    ['lb-sharp','♯ Sustenido (eleva ½ tom)'],
  ];
  if(includeWrong) items.push(['lb-wrong','Intervalo incorreto']);
  items.forEach(([c,t])=>{
    const it=document.createElement('div');
    it.className='legend-item';
    it.innerHTML=`<div class="legend-box ${c}"></div><span>${t}</span>`;
    d.appendChild(it);
  });
  return d;
}

/* ══════════════════════════════════════════════════
   FASES
══════════════════════════════════════════════════ */
let phase2State='intro';

function renderPhase0(){
  const card=document.getElementById('main-card');
  card.innerHTML='';

  h(card,'div','phase-title','🏗️ A Fórmula da Escala Maior');
  const desc=h(card,'div','phase-desc');
  desc.innerHTML=`A escala de <strong>Dó Maior</strong> é a referência: <strong>sem sustenidos ou bemoéis</strong>.<br>
  Cada degrau mostra a distância até a próxima nota.<br>
  <strong>Degraus altos (azul) = 1 Tom &nbsp;|&nbsp; Degraus baixos (verde) = ½ Tom</strong><br>
  Fórmula obrigatória de toda escala maior: <strong>T – T – ½ – T – T – T – ½</strong>`;

  card.appendChild(buildLegend());

  const sl=h(card,'div','scale-label','DÓ MAIOR');
  card.appendChild(buildStaircase(DO_SCALE));
  card.appendChild(buildFormula(DO_SCALE));

  const br=h(card,'div','btn-row');
  btn(br,'btn-secondary','🔊 Ouvir Dó Maior',playDo);
  btn(br,'btn-primary','Próxima fase →',()=>goPhase(1));
}

function renderPhase1(){
  const card=document.getElementById('main-card');
  card.innerHTML='';

  h(card,'div','phase-title','❓ E se começarmos pelo Sol?');
  const desc=h(card,'div','phase-desc');
  desc.innerHTML=`Compare as duas escalas abaixo.<br>
  A de <strong>Sol</strong> tenta seguir a mesma fórmula, mas o <strong>7º grau (Fá→Sol) fica errado</strong>:<br>
  deveria ser ½ Tom, mas o Fá natural está a <strong>1 Tom</strong> do Sol. ⚠️`;

  card.appendChild(buildLegend(true));

  // SOL MAIOR (com erro) — TOPO
  h(card,'div','scale-label','SOL MAIOR — com problema ⚠️');
  card.appendChild(buildStaircase(SOL_WRONG));
  card.appendChild(buildFormula(SOL_WRONG));

  card.appendChild(document.createElement('hr')).className='scale-divider';

  // DÓ MAIOR — REFERÊNCIA abaixo
  h(card,'div','scale-label scale-ref-label','DÓ MAIOR — referência (formato correto)');
  card.appendChild(buildStaircase(DO_SCALE));
  card.appendChild(buildFormula(DO_SCALE));

  const eb=h(card,'div','explain-box');
  eb.innerHTML=`<strong>⚠️ O degrau vermelho está alto demais!</strong><br>
  Compare com Dó Maior: na posição 7 a escada deveria ter um degrau <em>baixo</em> (½ Tom).
  O Fá natural cria um degrau <em>alto</em> (1 Tom). Precisamos elevá-lo ½ tom → <strong>Fá♯</strong>.`;

  const br=h(card,'div','btn-row');
  btn(br,'btn-secondary','🔊 Ouvir Sol (errado)',()=>playSol(false));
  btn(br,'btn-primary','Corrigir →',()=>goPhase(2));
}

function renderPhase2(state){
  const card=document.getElementById('main-card');
  card.innerHTML='';

  h(card,'div','phase-title','✨ Sol Maior – Coloque o Sustenido!');

  if(state==='intro'){
    const desc=h(card,'div','phase-desc');
    desc.innerHTML=`O bloco dourado <strong>♯</strong> eleva a nota <strong>meio tom</strong>.<br>
    Clique no espaço tracejado (degrau do Fá) para encaixar o sustenido e corrigir a escada.`;

    const pool=h(card,'div','sharp-pool');
    h(pool,'p',null,'Bloco disponível:');
    const drag=h(pool,'div','sharp-drag','♯ Fá');
    drag.draggable=true;
    drag.addEventListener('dragstart',e=>e.dataTransfer.setData('text','sharp'));

    const fb=h(card,'div','feedback-bar');
    fb.id='fb-p2';

    card.appendChild(buildLegend(true));

    // SOL — com drop zone no índice 6
    h(card,'div','scale-label','SOL MAIOR — coloque o ♯ no lugar certo');
    card.appendChild(buildStaircase(SOL_WRONG,6,false));

    card.appendChild(document.createElement('hr')).className='scale-divider';

    // DÓ MAIOR referência
    h(card,'div','scale-label scale-ref-label','DÓ MAIOR — referência (formato correto)');
    card.appendChild(buildStaircase(DO_SCALE));

    const br=h(card,'div','btn-row');
    btn(br,'btn-secondary','🔊 Ouvir sem ♯',()=>playSol(false));
  }

  if(state==='solved'){
    const desc=h(card,'div','phase-desc');
    desc.innerHTML=`<strong style="color:#2ed573">✓ Perfeito!</strong> O <strong>Fá♯</strong> corrigiu o degrau!<br>
    A escada de Sol Maior agora tem o mesmo formato que Dó Maior.`;

    card.appendChild(buildLegend());

    h(card,'div','scale-label','SOL MAIOR — correto! ✨');
    card.appendChild(buildStaircase(SOL_RIGHT,-1,true));
    card.appendChild(buildFormula(SOL_RIGHT));

    card.appendChild(document.createElement('hr')).className='scale-divider';

    h(card,'div','scale-label scale-ref-label','DÓ MAIOR — referência');
    card.appendChild(buildStaircase(DO_SCALE));
    card.appendChild(buildFormula(DO_SCALE));

    const eb=h(card,'div','explain-box');
    eb.innerHTML=`<strong>🎯 Por que o Fá♯?</strong><br>
    No 7º grau de Sol Maior a fórmula exige ½ Tom até o Sol.
    O Fá natural dista 1 Tom — o bloco <strong>♯</strong> eleva ½ tom, criando o degrau baixo correto.<br>
    Por isso a <strong>armadura de Sol Maior tem 1 sustenido: Fá♯</strong>.`;

    const br=h(card,'div','btn-row');
    btn(br,'btn-secondary','🔊 Ouvir Sol Maior ✔',()=>playSol(true));
    btn(br,'btn-secondary','🔄 Repetir',()=>{phase2State='intro';goPhase(2);});
  }
}

function onDropSharp(){
  const fb=document.getElementById('fb-p2');
  if(fb){fb.textContent='✨ Fá♯ encaixado! Escada corrigida!';fb.className='feedback-bar correct show';}
  setTimeout(()=>{phase2State='solved';renderPhase2('solved');playSol(true);},700);
}

/* ══════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════ */
function h(parent,tag,cls,text){
  const el=document.createElement(tag);
  if(cls)el.className=cls;
  if(text)el.innerHTML=text;
  if(parent)parent.appendChild(el);
  return el;
}
function btn(parent,cls,text,cb){
  const b=document.createElement('button');
  b.className=cls;b.innerHTML=text;
  b.addEventListener('click',cb);
  parent.appendChild(b);
  return b;
}
function goPhase(n){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===n));
  if(n===0)renderPhase0();
  if(n===1)renderPhase1();
  if(n===2)renderPhase2(phase2State);
}
goPhase(0);
</script>
</body>
</html>
