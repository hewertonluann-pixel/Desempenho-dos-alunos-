<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Escada de Notas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex; justify-content: center; align-items: flex-start;
      padding: 24px 10px 40px;
    }
    .container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 28px 32px;
      max-width: 740px; width: 100%;
      color: white;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 {
      text-align: center; font-size: 1.75rem; margin-bottom: 4px;
      background: linear-gradient(90deg,#f9a825,#ff6f00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { text-align:center; font-size:0.88rem; color:#aaa; margin-bottom:20px; }
    .progress-bar-wrap { background:rgba(255,255,255,0.1); border-radius:99px; height:8px; margin-bottom:6px; }
    .progress-bar { height:8px; border-radius:99px; background:linear-gradient(90deg,#f9a825,#ff6f00); transition:width 0.4s; }
    .progress-label { display:flex; justify-content:space-between; font-size:0.78rem; color:#aaa; margin-bottom:18px; }
    .hud { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .score-box { font-size:1.1rem; font-weight:bold; color:#f9a825; }
    .lives { display:flex; gap:4px; font-size:1.3rem; }
    .ref-wrap { margin-bottom:16px; }
    .ref-toggle {
      background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
      border-radius:8px; padding:8px 14px; cursor:pointer; font-size:0.85rem; color:#ccc;
      display:flex; align-items:center; gap:8px; transition:background 0.2s; width:100%; text-align:left;
    }
    .ref-toggle:hover { background:rgba(255,255,255,0.14); }
    .ref-scale {
      display:flex; gap:6px; flex-wrap:wrap; margin-top:10px;
      padding:10px 14px; background:rgba(255,255,255,0.06);
      border-radius:8px; justify-content:center;
    }
    .ref-note {
      background:rgba(249,168,37,0.2); border:1px solid #f9a825;
      border-radius:6px; padding:4px 12px; font-weight:bold; font-size:0.9rem; color:#f9a825;
    }
    .hidden { display:none !important; }
    .stair-area {
      display:flex; justify-content:center; align-items:center;
      margin-bottom:18px; background:rgba(0,0,0,0.2);
      border-radius:12px; padding:10px 4px; overflow:hidden;
    }
    #stair-svg { display:block; }
    .options-label { text-align:center; font-size:0.82rem; color:#aaa; margin-bottom:10px; }
    .options { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:20px; }
    .opt-btn {
      min-width:64px; height:50px; border-radius:10px; padding:0 14px;
      background:rgba(21,101,192,0.3); border:2px solid #1565c0;
      color:white; font-weight:bold; font-size:1rem; cursor:pointer; transition:all 0.18s;
    }
    .opt-btn:hover:not(:disabled) { background:rgba(21,101,192,0.6); transform:translateY(-2px); }
    .opt-btn:disabled { opacity:0.35; cursor:default; }
    .toast {
      position:fixed; top:24px; left:50%; transform:translateX(-50%);
      padding:10px 28px; border-radius:10px; font-weight:bold; font-size:1rem;
      pointer-events:none; opacity:0; transition:opacity 0.3s; z-index:9998;
    }
    .toast.show { opacity:1; }
    .toast.ok  { background:#2e7d32; color:#c8e6c9; }
    .toast.err { background:#b71c1c; color:#ffcdd2; }
    .end-screen { text-align:center; padding:20px 0; }
    .end-screen h2 { font-size:2rem; margin-bottom:8px; color:#f9a825; }
    .end-screen p  { color:#ccc; margin-bottom:16px; font-size:1rem; }
    .btn-restart {
      padding:12px 36px; border-radius:10px;
      background:linear-gradient(90deg,#f9a825,#ff6f00);
      border:none; color:#1a1a2e; font-weight:bold; font-size:1rem; cursor:pointer; transition:opacity 0.2s;
    }
    .btn-restart:hover { opacity:0.85; }
    .stars { font-size:2.5rem; margin-bottom:12px; }
  </style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="container">
  <h1>🪜 Escada de Notas</h1>
  <p class="subtitle">Cada degrau representa uma nota — mais alto = nota mais aguda</p>

  <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="progress-label">
    <span id="progress-text">Escada 1 de 8</span>
    <span id="combo-text"></span>
  </div>
  <div class="hud">
    <div class="score-box">⭐ <span id="score">0</span> pts</div>
    <div class="lives" id="lives"></div>
  </div>

  <div class="ref-wrap">
    <button class="ref-toggle" onclick="toggleRef()">
      <span>🎼</span>
      <span>Ver escala de referência (Dó maior)</span>
      <span style="margin-left:auto" id="ref-arrow">▼</span>
    </button>
    <div class="ref-scale hidden" id="ref-scale">
      <div class="ref-note">Dó</div><div class="ref-note">Ré</div><div class="ref-note">Mi</div>
      <div class="ref-note">Fá</div><div class="ref-note">Sol</div><div class="ref-note">Lá</div>
      <div class="ref-note">Si</div><div class="ref-note">Dó</div>
    </div>
  </div>

  <div id="game-area">
    <div class="stair-area" id="stair-area">
      <svg id="stair-svg"></svg>
    </div>
    <div class="options-label" id="opt-label"></div>
    <div class="options" id="options"></div>
  </div>
  <div id="end-screen" class="end-screen hidden"></div>
</div>

<script>
// ── constantes ──────────────────────────────────────────────────────────────
const NOTES = ['Dó','Ré','Mi','Fá','Sol','Lá','Si'];
// índice 0 = Dó (mais grave), 6 = Si (mais agudo)
const NOTE_IDX = Object.fromEntries(NOTES.map((n,i)=>[n,i]));

// Escadas: array de notas. O visual posiciona cada degrau pela altura da nota.
// reveal = índices das notas já mostradas como âncora
const STAIRS = [
  // 1: escala Dó maior ascendente completa
  { label:'Escada 1', notes:['Dó','Ré','Mi','Fá','Sol','Lá','Si'], reveal:[0,6] },
  // 2: escala Dó maior descendente
  { label:'Escada 2', notes:['Si','Lá','Sol','Fá','Mi','Ré','Dó'], reveal:[0,6] },
  // 3: sol - mi - sol - si (sobe e desce e sobe)
  { label:'Escada 3', notes:['Sol','Lá','Si','Lá','Sol','Fá','Mi'], reveal:[0,6] },
  // 4: mi - sol - mi - dó (sobe e desce)
  { label:'Escada 4', notes:['Mi','Fá','Sol','Lá','Sol','Fá','Mi'], reveal:[0,3,6] },
  // 5: subida e descida (arco)
  { label:'Escada 5', notes:['Dó','Mi','Sol','Si','Sol','Mi','Dó'], reveal:[0,3,6] },
  // 6: descida e subida (vale)
  { label:'Escada 6', notes:['Si','Sol','Mi','Dó','Mi','Sol','Si'], reveal:[0,3,6] },
  // 7: escala de Sol (a partir de Sol)
  { label:'Escada 7', notes:['Sol','Lá','Si','Dó','Ré','Mi','Fá'], reveal:[0,3] },
  // 8: escala de Ré descendente
  { label:'Escada 8', notes:['Dó','Si','Lá','Sol','Fá','Mi','Ré'], reveal:[0,4] },
];

// ── estado ──────────────────────────────────────────────────────────────────
let cs=0, filled=[], blanks=[], currentBlank=0,
    score=0, lives=3, combo=0, refVisible=false;

// ── SVG ────────────────────────────────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs, parent){
  const e = document.createElementNS(SVG_NS, tag);
  for(const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  if(parent) parent.appendChild(e);
  return e;
}

// ── desenhar a escada com degraus por altura de nota ────────────────────────────
function drawStair(){
  const stair  = STAIRS[cs];
  const notes  = stair.notes;
  const n      = notes.length;
  const svg    = document.getElementById('stair-svg');
  svg.innerHTML = '';

  // — dimensões —
  const PAD_L = 18, PAD_R = 18, PAD_T = 54, PAD_B = 28;
  const STEP_W = 68;          // largura de cada degrau (plataforma horizontal)
  const ROW_H  = 30;          // distância vertical entre notas adjacentes
  const ROWS   = 7;           // Dó(0) a Si(6)
  const W = PAD_L + n * STEP_W + PAD_R;
  const H = PAD_T + ROWS * ROW_H + PAD_B;

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width',  '100%');
  svg.setAttribute('height', H);

  // função: converte índice de nota (0=Dó...6=Si) para Y no SVG
  // nota mais aguda (Si=6) fica em cima, mais grave (Dó=0) fica embaixo
  function noteY(noteStr) {
    const idx = NOTE_IDX[noteStr];
    return PAD_T + (ROWS - 1 - idx) * ROW_H;
  }

  // — linhas de guia horizontais (como pautas leves) —
  for(let r=0; r<ROWS; r++){
    const y = PAD_T + r * ROW_H;
    svgEl('line',{
      x1: PAD_L, y1: y, x2: W - PAD_R, y2: y,
      stroke:'rgba(255,255,255,0.05)', 'stroke-width':'1'
    }, svg);
    // rótulo da nota à esquerda
    const noteLabel = NOTES[ROWS - 1 - r];
    svgEl('text',{
      x: PAD_L - 4, y: y + 4,
      'text-anchor':'end',
      fill:'rgba(255,255,255,0.18)',
      'font-size':'9',
      'font-family':'Segoe UI, Arial, sans-serif'
    }, svg).textContent = noteLabel;
  }

  // — construir o caminho da escada —
  // Para cada nota i:
  //   - degrau horizontal: x de (PAD_L + i*STEP_W) até (PAD_L + (i+1)*STEP_W)
  //   - y = noteY(notes[i])
  //   - conexão vertical com o próximo degrau na borda direita do degrau
  const HALF = STEP_W / 2;
  let pathD = '';
  const cx = [], cy = [];
  for(let i=0;i<n;i++){
    const x0 = PAD_L + i * STEP_W;
    const x1 = PAD_L + (i+1) * STEP_W;
    const y  = noteY(notes[i]);
    cx.push(x0 + HALF);  // centro X do degrau
    cy.push(y);
    if(i===0){
      // começa no meio-esquerdo do 1º degrau
      pathD += `M ${x0} ${y}`;
    }
    // linha horizontal do degrau
    pathD += ` L ${x1} ${y}`;
    if(i < n-1){
      // conexão vertical até a altura do próximo degrau
      const yNext = noteY(notes[i+1]);
      pathD += ` L ${x1} ${yNext}`;
    }
  }

  // sombra da escada
  svgEl('path',{
    d: pathD,
    stroke:'rgba(0,0,0,0.4)', 'stroke-width':'5',
    fill:'none', 'stroke-linecap':'square', 'stroke-linejoin':'miter'
  }, svg);

  // linha da escada
  svgEl('path',{
    d: pathD,
    stroke:'rgba(255,255,255,0.5)', 'stroke-width':'2.5',
    fill:'none', 'stroke-linecap':'square', 'stroke-linejoin':'miter'
  }, svg);

  // — blocos de nota sobre cada degrau —
  const BW = 46, BH = 28;
  for(let i=0;i<n;i++){
    const note      = notes[i];
    const isReveal  = stair.reveal.includes(i);
    const isCorrect = filled[i] === 'correct';
    const isWrong   = filled[i] === 'wrong';
    const isActive  = blanks[currentBlank] === i;
    const isDone    = filled[i] === 'done'; // preenchido e confirmado

    // posiciona bloco acima do degrau
    const bx = cx[i] - BW/2;
    const by = cy[i] - BH - 5;

    let fill, stroke, textCol;
    if(isReveal)   { fill='rgba(249,168,37,0.3)';  stroke='#f9a825'; textCol='#fde68a'; }
    else if(isCorrect){ fill='rgba(46,125,50,0.45)'; stroke='#66bb6a'; textCol='#a5d6a7'; }
    else if(isWrong)  { fill='rgba(198,40,40,0.45)'; stroke='#ef5350'; textCol='#ef9a9a'; }
    else if(isActive) { fill='rgba(21,101,192,0.45)'; stroke='#42a5f5'; textCol='#90caf9'; }
    else              { fill='rgba(255,255,255,0.04)'; stroke='rgba(255,255,255,0.18)'; textCol='rgba(255,255,255,0.0)'; }

    svgEl('rect',{ x:bx, y:by, width:BW, height:BH, rx:'7', ry:'7',
      fill, stroke, 'stroke-width':'2' }, svg);

    // — label do bloco —
    let label = '';
    if(isReveal)    label = note;
    else if(isCorrect) label = note;
    else if(isWrong)   label = '✗';
    else if(isActive)  label = '?';

    svgEl('text',{ x: cx[i], y: by + BH/2 + 5,
      'text-anchor':'middle', fill: textCol,
      'font-size':'12', 'font-weight':'bold',
      'font-family':'Segoe UI, Arial, sans-serif',
      'pointer-events':'none' }, svg).textContent = label;

    // número do degrau abaixo
    svgEl('text',{ x: cx[i], y: cy[i] + 14,
      'text-anchor':'middle', fill:'rgba(255,255,255,0.22)',
      'font-size':'9.5', 'font-family':'Segoe UI, Arial, sans-serif',
      'pointer-events':'none' }, svg).textContent = (i+1);
  }
}

// ── opções ────────────────────────────────────────────────────────────────────────
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

function renderOptions(){
  const stair = STAIRS[cs];
  const bidx  = blanks[currentBlank];
  const ans   = stair.notes[bidx];
  // gera distractores próximos (notas vizinhas) para ser mais desafiador
  const others = shuffle(NOTES.filter(n=>n!==ans)).slice(0,3);
  const choices= shuffle([ans,...others]);
  document.getElementById('opt-label').textContent = `Qual é a nota do degrau ${bidx+1}?`;
  const div = document.getElementById('options');
  div.innerHTML = '';
  choices.forEach(n=>{
    const b = document.createElement('button');
    b.className='opt-btn'; b.textContent=n;
    b.onclick=()=>choose(n);
    div.appendChild(b);
  });
}

// ── resposta do aluno ────────────────────────────────────────────────────────────────
function choose(note){
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const stair = STAIRS[cs];
  const bidx  = blanks[currentBlank];
  const ans   = stair.notes[bidx];
  if(note===ans){
    filled[bidx]='correct';
    combo++;
    const bonus = combo>=3?20:10;
    score+=bonus;
    document.getElementById('score').textContent=score;
    updateCombo();
    showToast(combo>=3?`🔥 +${bonus} Combo!`:`✅ +${bonus}`,'ok');
    drawStair();
    currentBlank++;
    if(currentBlank>=blanks.length){ setTimeout(nextStair,800); }
    else { setTimeout(()=>{ drawStair(); renderOptions(); },400); }
  } else {
    filled[bidx]='wrong';
    lives--; combo=0;
    renderLives(); updateCombo();
    showRefForced();
    showToast(`❌ Errou! Era "${ans}"`,'err');
    drawStair();
    setTimeout(()=>{
      filled[bidx]=null;
      drawStair();
      if(lives<=0){ endGame(); return; }
      renderOptions();
    },950);
  }
}

function nextStair(){ cs++; if(cs>=STAIRS.length){ endGame(); return; } loadStair(); }

function loadStair(){
  const stair = STAIRS[cs];
  filled  = stair.notes.map((_,i)=> stair.reveal.includes(i)?'revealed':null);
  blanks  = stair.notes.map((_,i)=>i).filter(i=>!stair.reveal.includes(i));
  currentBlank=0;
  document.getElementById('progress-bar').style.width=(cs/STAIRS.length*100)+'%';
  document.getElementById('progress-text').textContent=`${stair.label} de ${STAIRS.length}`;
  document.getElementById('score').textContent=score;
  updateCombo(); drawStair(); renderOptions();
}

function renderLives(){
  document.getElementById('lives').innerHTML=
    Array.from({length:3},(_,i)=>`<span>${i<lives?'❤️':'🖤'}</span>`).join('');
}
function updateCombo(){
  const e=document.getElementById('combo-text');
  e.textContent=combo>=3?`🔥 Combo x${combo}`:combo>0?`✨ Combo x${combo}`:'';
}
function showRefForced(){
  document.getElementById('ref-scale').classList.remove('hidden');
  document.getElementById('ref-arrow').textContent='▲'; refVisible=true;
}
function toggleRef(){
  refVisible=!refVisible;
  document.getElementById('ref-scale').classList.toggle('hidden',!refVisible);
  document.getElementById('ref-arrow').textContent=refVisible?'▲':'▼';
}
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  clearTimeout(t._t); t._t=setTimeout(()=>t.className='toast',1900);
}
function endGame(){
  document.getElementById('game-area').classList.add('hidden');
  const pct=score/(STAIRS.length*5*20);
  const stars=pct>0.8?'⭐⭐⭐':pct>0.5?'⭐⭐':'⭐';
  const won=lives>0;
  const end=document.getElementById('end-screen');
  end.classList.remove('hidden');
  end.innerHTML=`
    <div class="stars">${stars}</div>
    <h2>${won?'🎉 Parabéns!':'😢 Fim de Jogo'}</h2>
    <p>${won?'Você completou todas as escadas!':'Suas vidas acabaram.'}</p>
    <p style="font-size:1.6rem;font-weight:bold;color:#f9a825;margin-bottom:20px">⭐ ${score} pontos</p>
    <button class="btn-restart" onclick="initGame()">🔄 Jogar Novamente</button>`;
  document.getElementById('progress-bar').style.width='100%';
}
function initGame(){
  cs=0; score=0; lives=3; combo=0; refVisible=false;
  document.getElementById('ref-scale').classList.add('hidden');
  document.getElementById('ref-arrow').textContent='▼';
  document.getElementById('end-screen').classList.add('hidden');
  document.getElementById('game-area').classList.remove('hidden');
  renderLives(); loadStair();
}
initGame();
</script>
</body>
</html>
