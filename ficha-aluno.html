<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ficha do Aluno - Orquestra Filhos de Asafe</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap">
  <style>
    /* ── Variáveis ── */
    :root {
      --bg: #020617; --card: #0b1220; --border: rgba(56,189,248,0.25);
      --ink: #e2e8f0; --muted: #94a3b8; --azul: #0ea5e9;
      --verde: #22c55e; --vermelho: #ef4444; --amarelo: #f59e0b;
    }
    * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 0; }
    body {
      background: radial-gradient(circle at top, #0f172a 0%, #020617 45%, #000 100%);
      color: var(--ink); min-height: 100vh; padding: 24px 16px 60px;
    }
    .topo {
      display: flex; align-items: center; gap: 12px;
      max-width: 680px; margin: 0 auto 28px; flex-wrap: wrap;
    }
    .btn-voltar {
      display: inline-flex; align-items: center; gap: 6px;
      background: #1e293b; color: var(--azul); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 16px; font-size: 0.88rem;
      font-weight: 600; cursor: pointer; text-decoration: none;
      transition: all .2s;
    }
    .btn-voltar:hover { background: rgba(14,165,233,0.12); border-color: var(--azul); }
    .titulo-pagina { font-size: 1.4rem; font-weight: 700; color: var(--azul); flex: 1; }

    /* Botão imprimir */
    .btn-imprimir {
      display: inline-flex; align-items: center; gap: 6px;
      background: #1e293b; color: #a78bfa;
      border: 1px solid rgba(167,139,250,0.35);
      border-radius: 10px; padding: 8px 16px; font-size: 0.88rem;
      font-weight: 600; cursor: pointer; transition: all .2s;
    }
    .btn-imprimir:hover { background: rgba(167,139,250,0.12); border-color: #a78bfa; }

    #loaderFicha { text-align: center; padding: 60px; color: var(--muted); font-size: 1rem; }
    .spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid rgba(34,211,238,0.2); border-top-color: #22d3ee;
      animation: spin .9s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .ficha-wrap { max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

    .card-perfil {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; padding: 22px;
      display: flex; gap: 20px; align-items: center;
    }
    .foto-perfil {
      width: 80px; height: 80px; border-radius: 50%; overflow: hidden;
      border: 2px solid var(--azul); flex-shrink: 0;
      background: #1e293b; display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: #475569;
    }
    .foto-perfil img { width: 100%; height: 100%; object-fit: cover; }
    .info-perfil h2 { font-size: 1.3rem; color: var(--azul); margin-bottom: 4px; }
    .info-perfil p  { font-size: 0.85rem; color: var(--muted); }
    .turma-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(34,211,238,0.1); border: 1px solid rgba(34,211,238,0.3);
      color: #22d3ee; border-radius: 999px;
      font-size: 0.75rem; font-weight: 700; padding: 3px 10px; margin-top: 6px;
    }

    .secao {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
    }
    .secao-titulo {
      font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .secao-titulo::after { content: ''; flex: 1; height: 1px; background: rgba(56,189,248,0.18); }

    .campos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 520px) { .campos-grid { grid-template-columns: 1fr; } }
    .campo-full { grid-column: 1 / -1; }

    .campo label {
      display: block; font-size: 0.75rem; font-weight: 600;
      color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em;
    }
    .campo input, .campo select {
      width: 100%; background: #0f172a; border: 1px solid #334155;
      border-radius: 9px; color: var(--ink); padding: 9px 12px;
      font-size: 0.9rem; outline: none; transition: border-color .2s; font-family: inherit;
    }
    .campo input:focus, .campo select:focus { border-color: var(--azul); box-shadow: 0 0 0 2px rgba(14,165,233,0.15); }
    .campo input[readonly] { color: var(--muted); cursor: default; }

    .idade-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(14,165,233,0.12); border: 1px solid rgba(14,165,233,0.3);
      color: var(--azul); border-radius: 999px;
      font-size: 0.8rem; font-weight: 700; padding: 4px 12px;
      margin-top: 8px;
    }
    .idade-badge.oculto { display: none; }

    .senha-wrapper { position: relative; }
    .senha-wrapper input { padding-right: 42px; }
    .btn-ver-senha {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1rem; padding: 4px; transition: color .2s;
    }
    .btn-ver-senha:hover { color: var(--azul); }

    .dica-login { font-size: 0.75rem; color: #64748b; margin-top: 5px; }
    .dica-login strong { color: #38bdf8; }

    .acoes-ficha { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
    .btn-acao {
      flex: 1; min-width: 140px;
      padding: 11px 16px; border-radius: 10px; border: none;
      font-size: 0.88rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: all .2s;
    }
    .btn-salvar    { background: var(--verde);  color: #022c22; box-shadow: 0 4px 14px rgba(34,197,94,0.35); }
    .btn-salvar:hover    { background: #16a34a; }
    .btn-redefinir { background: #1e293b; color: var(--amarelo); border: 1px solid rgba(245,158,11,0.4); }
    .btn-redefinir:hover { background: rgba(245,158,11,0.1); }
    .btn-copiar    { background: #1e293b; color: var(--azul); border: 1px solid var(--border); }
    .btn-copiar:hover    { background: rgba(14,165,233,0.1); }
    .btn-acao:disabled   { opacity: .55; cursor: not-allowed; }

    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293b; border: 1px solid var(--border);
      color: var(--ink); border-radius: 10px; padding: 10px 20px;
      font-size: 0.88rem; font-weight: 600; z-index: 999;
      opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; }
    #toast.ok   { border-color: var(--verde);    color: #86efac; }
    #toast.err  { border-color: var(--vermelho); color: #fca5a5; }

    /* ══════════════════════════════════════════════════
       ESTILOS DE IMPRESSÃO / PDF
       ══════════════════════════════════════════════════ */
    /* Elementos que NÃO aparecem no PDF */
    .no-print { }

    @media print {
      /* Reset geral */
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

      body {
        background: #fff !important;
        color: #111 !important;
        padding: 0 !important;
        margin: 0 !important;
        font-size: 11pt;
      }

      /* Oculta elementos de UI */
      .no-print,
      .topo,
      .acoes-ficha,
      #toast,
      .btn-ver-senha,
      .dica-login,
      .spinner,
      #loaderFicha { display: none !important; }

      /* Cabeçalho do PDF */
      .ficha-wrap::before {
        content: '';
        display: block;
        width: 100%;
        padding: 14pt 0 10pt;
        border-bottom: 2pt solid #0ea5e9;
        margin-bottom: 18pt;
      }
      .pdf-header {
        display: flex !important;
        align-items: center;
        justify-content: space-between;
        padding: 14pt 0 10pt;
        border-bottom: 2pt solid #0ea5e9;
        margin-bottom: 18pt;
      }
      .pdf-header-titulo {
        font-size: 15pt;
        font-weight: 800;
        color: #0ea5e9;
        letter-spacing: -.3px;
      }
      .pdf-header-org {
        font-size: 9pt;
        color: #64748b;
        text-align: right;
        line-height: 1.5;
      }

      /* Rodapé do PDF */
      .pdf-footer {
        display: block !important;
        margin-top: 24pt;
        padding-top: 8pt;
        border-top: 1pt solid #cbd5e1;
        font-size: 8pt;
        color: #94a3b8;
        text-align: center;
      }

      /* Ficha wrap sem flex gap */
      .ficha-wrap {
        max-width: 100% !important;
        display: block !important;
        margin: 0 !important;
        padding: 16pt 20pt !important;
      }

      /* Card perfil */
      .card-perfil {
        background: #f8fafc !important;
        border: 1pt solid #cbd5e1 !important;
        border-radius: 8pt !important;
        padding: 12pt !important;
        margin-bottom: 14pt;
        display: flex !important;
        gap: 14pt;
        align-items: center;
        page-break-inside: avoid;
      }
      .foto-perfil {
        width: 64pt; height: 64pt;
        border: 1.5pt solid #0ea5e9 !important;
        border-radius: 50% !important;
        background: #e2e8f0 !important;
        flex-shrink: 0;
        overflow: hidden;
      }
      .foto-perfil img { width: 100%; height: 100%; object-fit: cover; }
      .info-perfil h2 { font-size: 14pt; color: #0ea5e9 !important; margin-bottom: 3pt; }
      .info-perfil p  { font-size: 9pt; color: #475569 !important; }
      .turma-chip {
        background: #e0f2fe !important;
        border: 1pt solid #7dd3fc !important;
        color: #0369a1 !important;
        border-radius: 999pt;
        font-size: 8pt; font-weight: 700;
        padding: 2pt 8pt; margin-top: 4pt;
        display: inline-flex !important;
      }

      /* Seções */
      .secao {
        background: #fff !important;
        border: 1pt solid #e2e8f0 !important;
        border-radius: 6pt !important;
        padding: 10pt 14pt !important;
        margin-bottom: 12pt;
        page-break-inside: avoid;
      }
      .secao-titulo {
        font-size: 7.5pt !important;
        font-weight: 800 !important;
        text-transform: uppercase;
        letter-spacing: .07em;
        color: #0ea5e9 !important;
        margin-bottom: 10pt !important;
        display: flex !important;
        gap: 6pt;
        align-items: center;
      }
      .secao-titulo::after {
        content: '';
        flex: 1;
        height: .75pt;
        background: #bae6fd;
      }

      /* Campos: substitui inputs por linhas de texto */
      .campos-grid {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
        gap: 8pt 14pt !important;
      }
      .campo label {
        font-size: 7pt !important;
        color: #64748b !important;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .05em;
        display: block;
        margin-bottom: 2pt;
      }
      .campo input,
      .campo select {
        background: transparent !important;
        border: none !important;
        border-bottom: 1pt solid #cbd5e1 !important;
        border-radius: 0 !important;
        color: #1e293b !important;
        padding: 3pt 0 !important;
        font-size: 10pt !important;
        width: 100% !important;
        box-shadow: none !important;
        -webkit-appearance: none;
        appearance: none;
      }
      /* Esconde a seta do select */
      .campo select { background-image: none !important; }

      .idade-badge {
        background: #e0f2fe !important;
        border: 1pt solid #7dd3fc !important;
        color: #0369a1 !important;
        font-size: 8pt !important;
      }
      .idade-badge.oculto { display: none !important; }

      /* Seção de Acesso: oculta no PDF por segurança */
      .secao-acesso { display: none !important; }

      @page {
        size: A4;
        margin: 15mm 18mm;
      }
    }
  </style>
</head>
<body>
  <div class="topo">
    <a href="professor.html" class="btn-voltar no-print">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      Voltar
    </a>
    <span class="titulo-pagina" id="tituloPagina">Ficha do Aluno</span>

    <!-- Botão Imprimir -->
    <button class="btn-imprimir no-print" onclick="window.print()" title="Gerar PDF da ficha">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 9V2h12v7"/>
        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
        <rect x="6" y="14" width="12" height="8" rx="1"/>
      </svg>
      Imprimir / PDF
    </button>
  </div>

  <div id="loaderFicha">
    <div class="spinner"></div>
    Carregando ficha...
  </div>

  <div class="ficha-wrap" id="fichaWrap" style="display:none;">

    <!-- Cabeçalho visível apenas no PDF -->
    <div class="pdf-header" style="display:none;">
      <div>
        <div class="pdf-header-titulo" id="pdfTitulo">Ficha do Aluno</div>
      </div>
      <div class="pdf-header-org">
        Orquestra Filhos de Asafe<br>
        <span id="pdfData"></span>
      </div>
    </div>

    <!-- Perfil -->
    <div class="card-perfil">
      <div class="foto-perfil" id="fotoPerfil">👤</div>
      <div class="info-perfil">
        <h2 id="nomeExibido"></h2>
        <p id="instrumentoExibido"></p>
        <span class="turma-chip" id="turmaExibida" style="display:none;"></span>
      </div>
    </div>

    <!-- Seção: Acesso (oculta no PDF) -->
    <div class="secao secao-acesso">
      <div class="secao-titulo">🔐 Acesso do Aluno</div>
      <div class="campos-grid">
        <div class="campo">
          <label>Login (usado para entrar)</label>
          <input type="text" id="campoLogin" placeholder="ex.: joao ou joao.silva" autocomplete="off" />
          <p class="dica-login">O aluno digita este valor na tela de login. Se vazio, usa o <strong>primeiro nome</strong> como fallback.</p>
        </div>
        <div class="campo">
          <label>Senha</label>
          <div class="senha-wrapper">
            <input type="password" id="campoSenha" placeholder="••••••" autocomplete="new-password" />
            <button class="btn-ver-senha" id="btnVerSenha" title="Mostrar/ocultar senha">👁️</button>
          </div>
        </div>
      </div>
      <div class="acoes-ficha" style="margin-top:16px;">
        <button class="btn-acao btn-salvar" id="btnSalvarAcesso">💾 Salvar acesso</button>
        <button class="btn-acao btn-redefinir" id="btnRedefinir">🔄 Redefinir senha para padrão</button>
        <button class="btn-acao btn-copiar" id="btnCopiar">📋 Copiar credenciais</button>
      </div>
    </div>

    <!-- Seção: Dados Pessoais -->
    <div class="secao">
      <div class="secao-titulo">👤 Dados Pessoais</div>
      <div class="campos-grid">
        <div class="campo">
          <label>Data de Nascimento</label>
          <input type="date" id="campoDataNasc" />
          <span class="idade-badge oculto" id="idadeBadge">🎂 <span id="idadeTexto"></span></span>
        </div>
        <div class="campo">
          <label>WhatsApp / Telefone</label>
          <input type="tel" id="campoTelefone" placeholder="(00) 00000-0000" />
        </div>
        <div class="campo campo-full">
          <label>Nome do Responsável <span style="font-weight:400;text-transform:none;font-size:0.7rem;">(para menores)</span></label>
          <input type="text" id="campoResponsavel" placeholder="Nome completo do responsável" />
        </div>
      </div>
      <div class="acoes-ficha" style="margin-top:16px;">
        <button class="btn-acao btn-salvar" id="btnSalvarPessoais">💾 Salvar dados pessoais</button>
      </div>
    </div>

    <!-- Seção: Dados gerais -->
    <div class="secao">
      <div class="secao-titulo">📝 Dados Gerais</div>
      <div class="campos-grid">
        <div class="campo campo-full">
          <label>Nome completo</label>
          <input type="text" id="campoNome" />
        </div>
        <div class="campo">
          <label>Instrumento</label>
          <input type="text" id="campoInstrumento" />
        </div>
        <div class="campo">
          <label>Turma</label>
          <select id="campoTurma"><option value="">Carregando...</option></select>
        </div>
        <div class="campo">
          <label>Status</label>
          <select id="campoAtivo">
            <option value="true">✅ Ativo</option>
            <option value="false">⏸️ Inativo</option>
          </select>
        </div>
        <div class="campo">
          <label>Classificado</label>
          <select id="campoClassificado">
            <option value="false">Não classificado</option>
            <option value="true">🎯 Classificado</option>
          </select>
        </div>
      </div>
      <div class="acoes-ficha" style="margin-top:16px;">
        <button class="btn-acao btn-salvar" id="btnSalvarDados">💾 Salvar dados</button>
      </div>
    </div>

    <!-- Seção: Endereço -->
    <div class="secao">
      <div class="secao-titulo">📍 Endereço</div>
      <div class="campos-grid">
        <div class="campo campo-full">
          <label>Rua</label>
          <input type="text" id="campoRua" placeholder="Nome da rua ou avenida" />
        </div>
        <div class="campo">
          <label>Número</label>
          <input type="text" id="campoNumero" placeholder="Ex: 123" />
        </div>
        <div class="campo">
          <label>Bairro</label>
          <input type="text" id="campoBairro" placeholder="Nome do bairro" />
        </div>
        <div class="campo campo-full">
          <label>Cidade</label>
          <input type="text" id="campoCidade" placeholder="Nome da cidade" />
        </div>
      </div>
      <div class="acoes-ficha" style="margin-top:16px;">
        <button class="btn-acao btn-salvar" id="btnSalvarEndereco">💾 Salvar endereço</button>
      </div>
    </div>

    <!-- Rodapé visível apenas no PDF -->
    <div class="pdf-footer" style="display:none;">
      Documento gerado em <span id="pdfDataRodape"></span> · Orquestra Filhos de Asafe
    </div>

  </div>

  <div id="toast"></div>

  <script>
    // Preenche data no cabeçalho/rodapé do PDF
    const dataAtual = new Date().toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });
    document.getElementById('pdfData').textContent    = dataAtual;
    document.getElementById('pdfDataRodape').textContent = dataAtual;
  </script>
  <script type="module" src="ficha-aluno.js"></script>
  <script type="module" src="navegacao.js"></script>
</body>
</html>
