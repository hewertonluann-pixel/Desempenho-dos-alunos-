<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Como Funciona a Pauta – Tutorial</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 14px 48px;
      color: #e2e8f0;
    }
    .back-btn {
      align-self: flex-start;
      background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.15);
      color: #e2e8f0; padding: 8px 16px; border-radius: 10px;
      font-size: 0.88rem; font-weight: 600; cursor: pointer;
      text-decoration: none; display: flex; align-items: center; gap: 6px;
      transition: background 0.18s; margin-bottom: 20px;
    }
    .back-btn:hover { background: rgba(255,255,255,0.15); }

    /* Cabeçalho */
    .page-header { text-align: center; margin-bottom: 28px; }
    .page-header h1 {
      font-size: 1.7rem; font-weight: 800; color: #e2b96f;
      text-shadow: 0 2px 10px rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .page-header p { font-size: 0.9rem; color: #94a3b8; margin-top: 6px; }

    /* Indicador de passos */
    .steps-indicator {
      display: flex; gap: 8px; margin-bottom: 28px;
    }
    .step-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.2); transition: all 0.3s;
    }
    .step-dot.active { background: #e2b96f; transform: scale(1.3); }
    .step-dot.done   { background: #22c55e; }

    /* Card do passo */
    .card {
      background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 28px 24px; max-width: 680px; width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4); backdrop-filter: blur(6px);
      animation: fadeIn 0.35s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .card-title {
      font-size: 1.25rem; font-weight: 800; color: #e2b96f;
      margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
    }
    .card-text {
      font-size: 0.95rem; color: #cbd5e1; line-height: 1.65;
      margin-bottom: 18px;
    }
    .card-text strong { color: #e2b96f; }
    .card-text em { color: #93c5fd; font-style: normal; font-weight: 600; }

    /* Área do canvas */
    .canvas-wrap {
      background: #fffef5; border-radius: 14px;
      padding: 14px 16px 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      margin-bottom: 18px;
      overflow-x: auto;
      display: flex; justify-content: center;
    }
    canvas { display: block; max-width: 100%; }

    /* Legenda da escada/pauta */
    .legend {
      display: flex; flex-wrap: wrap; gap: 10px;
      justify-content: center; margin-bottom: 18px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.82rem; color: #94a3b8;
    }
    .legend-dot {
      width: 12px; height: 12px; border-radius: 3px;
    }

    /* Tabela de linhas/espaços */
    .table-wrap { overflow-x: auto; margin-bottom: 18px; }
    table {
      width: 100%; border-collapse: collapse;
      font-size: 0.88rem; color: #cbd5e1;
    }
    th {
      background: rgba(226,185,111,0.15); color: #e2b96f;
      padding: 8px 12px; text-align: left; font-weight: 700;
      border-bottom: 1.5px solid rgba(226,185,111,0.3);
    }
    td { padding: 7px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    tr:hover td { background: rgba(255,255,255,0.04); }
    .badge-linha  { background: rgba(59,130,246,0.25); color:#93c5fd; padding:2px 8px; border-radius:20px; font-size:0.78rem; font-weight:700; }
    .badge-espaco { background: rgba(168,85,247,0.25); color:#d8b4fe; padding:2px 8px; border-radius:20px; font-size:0.78rem; font-weight:700; }
    .badge-nota   { background: rgba(226,185,111,0.25); color:#fde68a; padding:2px 8px; border-radius:20px; font-size:0.78rem; font-weight:700; }
    .badge-clave  { background: rgba(34,197,94,0.25); color:#86efac; padding:2px 8px; border-radius:20px; font-size:0.78rem; font-weight:700; }

    /* Botões de navegação */
    .nav-btns {
      display: flex; gap: 12px; justify-content: flex-end; margin-top: 8px;
    }
    .btn-back {
      background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.2);
      color: #94a3b8; padding: 11px 22px; border-radius: 10px;
      font-size: 0.92rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.14); color: #e2e8f0; }
    .btn-next {
      background: linear-gradient(135deg, #e2b96f, #f59e0b);
      border: none; color: #1a1a2e;
      padding: 11px 28px; border-radius: 10px;
      font-size: 0.92rem; font-weight: 800; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(226,185,111,0.4); }
    .btn-next.green {
      background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff;
    }

    /* Destaque de nota interativa */
    .note-interactive {
      display: flex; flex-wrap: wrap; gap: 10px;
      justify-content: center; margin-bottom: 18px;
    }
    .note-btn {
      width: 58px; height: 58px;
      border-radius: 12px;
      border: 2px solid rgba(226,185,111,0.4);
      background: rgba(226,185,111,0.08);
      color: #e2b96f; font-size: 1rem; font-weight: 800;
      cursor: pointer; transition: all 0.2s;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px;
    }
    .note-btn span.pos { font-size: 0.6rem; color: #94a3b8; font-weight: 400; }
    .note-btn:hover { background: rgba(226,185,111,0.2); transform: translateY(-3px); box-shadow: 0 6px 18px rgba(226,185,111,0.3); }
    .note-btn.linha  { border-color: #3b82f6; color: #93c5fd; background: rgba(59,130,246,0.1); }
    .note-btn.linha:hover  { background: rgba(59,130,246,0.25); box-shadow: 0 6px 18px rgba(59,130,246,0.3); }
    .note-btn.espaco { border-color: #a855f7; color: #d8b4fe; background: rgba(168,85,247,0.1); }
    .note-btn.espaco:hover { background: rgba(168,85,247,0.25); box-shadow: 0 6px 18px rgba(168,85,247,0.3); }

    /* Callout / destaque informativo */
    .callout {
      background: rgba(34,197,94,0.08); border-left: 4px solid #22c55e;
      border-radius: 0 10px 10px 0; padding: 12px 16px;
      font-size: 0.88rem; color: #86efac; line-height: 1.6;
      margin-bottom: 16px;
    }
    .callout.amber {
      background: rgba(226,185,111,0.1); border-left-color: #e2b96f; color: #fde68a;
    }
    .callout.blue {
      background: rgba(59,130,246,0.1); border-left-color: #3b82f6; color: #93c5fd;
    }

    /* Progress bar */
    .progress-wrap {
      width: 100%; max-width: 680px;
      background: rgba(255,255,255,0.08); border-radius: 20px;
      height: 6px; margin-bottom: 20px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 20px;
      background: linear-gradient(90deg, #e2b96f, #22c55e);
      transition: width 0.5s ease;
    }

    @media (max-width: 600px) {
      .card { padding: 20px 16px; }
      .card-title { font-size: 1.1rem; }
      .note-btn { width: 48px; height: 48px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <a href="atividades.html" class="back-btn">← Atividades</a>

  <div class="page-header">
    <h1>🎼 Como Funciona a Pauta</h1>
    <p>Tutorial: entenda as linhas, espaços e a Clave de Sol</p>
  </div>

  <div class="steps-indicator" id="stepsIndicator"></div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="card" id="mainCard"></div>

<script>
// ─── Áudio ──────────────────────────────────────────────────────────────────
let audioCtx = null;
function getACtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
const NOTE_FREQS = {
  'Mi': 329.63, 'Fá': 349.23, 'Sol': 392.00,
  'Lá': 440.00, 'Si': 493.88, 'Dó': 523.25,
  'Ré': 587.33, 'Mi2': 659.25
};
function playNote(noteName) {
  const freq = NOTE_FREQS[noteName] || NOTE_FREQS['Mi2'];
  try {
    const ac = getACtx();
    [[freq, 0.45, 1.2], [freq*2, 0.12, 0.6]].forEach(([f, v, d]) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(f, ac.currentTime);
      g.gain.setValueAtTime(0, ac.currentTime);
      g.gain.linearRampToValueAtTime(v, ac.currentTime + 0.015);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + d);
      o.connect(g).connect(ac.destination);
      o.start(ac.currentTime); o.stop(ac.currentTime + d);
    });
  } catch(e) {}
}

// ─── Dados das notas na pauta (clave de sol) ─────────────────────────────────
// slot: posição no sistema de linhas/espaços (0 = 1ª linha, 1 = 1º espaço, ...)
const STAFF_NOTES = [
  { nota: 'Mi',  slot: 0, tipo: 'linha',  pos: '1ª linha',   degrau: 1 },
  { nota: 'Fá',  slot: 1, tipo: 'espaco', pos: '1º espaço',  degrau: 2 },
  { nota: 'Sol', slot: 2, tipo: 'linha',  pos: '2ª linha',   degrau: 3, clave: true },
  { nota: 'Lá',  slot: 3, tipo: 'espaco', pos: '2º espaço',  degrau: 4 },
  { nota: 'Si',  slot: 4, tipo: 'linha',  pos: '3ª linha',   degrau: 5 },
  { nota: 'Dó',  slot: 5, tipo: 'espaco', pos: '3º espaço',  degrau: 6 },
  { nota: 'Ré',  slot: 6, tipo: 'linha',  pos: '4ª linha',   degrau: 7 },
  { nota: 'Mi',  slot: 7, tipo: 'espaco', pos: '4º espaço',  degrau: 8 },
  { nota: 'Fá',  slot: 8, tipo: 'linha',  pos: '5ª linha',   degrau: 9 },
];

// ─── Canvas: desenha pauta com notas ─────────────────────────────────────────
function desenharPauta(canvasId, opcoesVisuais) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const LINE1_Y = H - 50;  // posição da 1ª linha (de baixo)
  const GAP = 14;           // espaço entre linhas
  const NOTE_R = 9;
  const STAFF_X = 70;
  const STAFF_W = W - STAFF_X - 20;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fffef5';
  ctx.fillRect(0, 0, W, H);

  // Função: converte slot para Y na pauta
  function slotToY(slot) { return LINE1_Y - slot * GAP; }

  // Desenha as 5 linhas da pauta
  for (let i = 0; i < 5; i++) {
    const y = slotToY(i * 2);
    ctx.strokeStyle = '#444'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(STAFF_X, y); ctx.lineTo(STAFF_X + STAFF_W, y); ctx.stroke();
  }

  // Clave de Sol
  ctx.fillStyle = '#222';
  ctx.font = 'bold 88px serif';
  ctx.fillText('\uD834\uDD1E', STAFF_X - 12, slotToY(0) + 20);

  const {
    notaDestaque = null,    // slot da nota em destaque
    mostrarNomes = false,   // mostrar nomes em todas
    mostrarDegraus = false, // mostrar números dos degraus
    mostrarTipo = false,    // colorir linha vs espaço
    destacarClave = false,  // destacar 2ª linha (Sol)
    apenasNota = null,      // mostrar apenas esta nota (slot)
    notasVisiveis = null,   // array de slots visíveis
  } = opcoesVisuais || {};

  // Desenha notas
  STAFF_NOTES.forEach((n, idx) => {
    const x = STAFF_X + 90 + idx * 50;
    const y = slotToY(n.slot);
    const visivel = notasVisiveis ? notasVisiveis.includes(n.slot) : (apenasNota === null || apenasNota === n.slot);
    if (!visivel) return;

    const ehDestaque = notaDestaque === n.slot;
    const ehClave = destacarClave && n.clave;

    // Linha de ledger se necessário (acima da 5ª linha ou abaixo da 1ª)
    // (não necessário para estas notas)

    // Seta indicadora acima da nota em destaque
    if (ehDestaque) {
      ctx.fillStyle = '#e2b96f';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('▼', x, y - NOTE_R - 4);
    }

    // Corpo da nota
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(1.28, 1);
    ctx.beginPath();
    ctx.ellipse(0, 0, NOTE_R, NOTE_R * 0.72, -0.3, 0, 2 * Math.PI);

    let notaColor = '#555';
    if (ehDestaque) notaColor = '#e2b96f';
    else if (ehClave) notaColor = '#22c55e';
    else if (mostrarTipo && n.tipo === 'linha') notaColor = '#3b82f6';
    else if (mostrarTipo && n.tipo === 'espaco') notaColor = '#a855f7';

    ctx.fillStyle = notaColor;
    ctx.strokeStyle = ehDestaque ? '#b45309' : (ehClave ? '#166534' : '#333');
    ctx.lineWidth = 1.5;
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(0, 0, NOTE_R * 0.42, NOTE_R * 0.28, -0.3, 0, 2 * Math.PI);
    ctx.fillStyle = '#fffef5'; ctx.fill();
    ctx.restore();

    // Nome da nota
    if (mostrarNomes || ehDestaque || ehClave) {
      ctx.fillStyle = ehDestaque ? '#b45309' : (ehClave ? '#166534' : '#333');
      ctx.font = `bold 11px Segoe UI, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(n.nota, x, y + NOTE_R + 13);
    }

    // Número do degrau
    if (mostrarDegraus) {
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.font = '9.5px Segoe UI, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(n.degrau, x, y - NOTE_R - (ehDestaque ? 20 : 6));
    }

    // Badge de tipo (linha/espaço) acima das notas
    if (mostrarTipo) {
      const tipoLabel = n.tipo === 'linha' ? 'L' : 'E';
      const tipoColor = n.tipo === 'linha' ? '#3b82f6' : '#a855f7';
      ctx.fillStyle = tipoColor;
      ctx.font = 'bold 9px Segoe UI, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(tipoLabel, x, y - NOTE_R - 7);
    }
  });
}

// ─── Escada simples (passo 1) ─────────────────────────────────────────────────
function desenharEscada(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fffef5'; ctx.fillRect(0, 0, W, H);

  const notas = ['Mi','Fá','Sol','Lá','Si','Dó','Ré','Mi'];
  const n = notas.length;
  const PAD_L = 30, PAD_B = 30;
  const STEP_W = 52, ROW_H = 22;
  const TOTAL_H = n * ROW_H;

  // Linhas de guia
  ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 1;
  for (let i = 0; i < n; i++) {
    const y = H - PAD_B - i * ROW_H;
    ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W - 20, y); ctx.stroke();
  }

  // Escada
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2.5;
  ctx.lineJoin = 'miter'; ctx.lineCap = 'square';
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const x0 = PAD_L + i * STEP_W;
    const x1 = PAD_L + (i + 1) * STEP_W;
    const y  = H - PAD_B - i * ROW_H;
    if (i === 0) ctx.moveTo(x0, y);
    ctx.lineTo(x1, y);
    if (i < n - 1) ctx.lineTo(x1, H - PAD_B - (i + 1) * ROW_H);
  }
  ctx.stroke();

  // Blocos de nota
  notas.forEach((nota, i) => {
    const cx = PAD_L + i * STEP_W + STEP_W / 2;
    const cy = H - PAD_B - i * ROW_H;
    const bw = 40, bh = 22;
    ctx.fillStyle = 'rgba(249,168,37,0.2)';
    ctx.strokeStyle = '#f9a825'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(cx - bw/2, cy - bh - 3, bw, bh, 6);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#92400e'; ctx.font = 'bold 11px Segoe UI, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(nota, cx, cy - bh/2 + 1);
    // número do degrau
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.font = '9px sans-serif';
    ctx.fillText(i + 1, cx, cy + 12);
  });
}

// ─── Definição dos 5 passos do tutorial ──────────────────────────────────────
const PASSOS = [
  // Passo 1: Relembrando a escada
  {
    titulo: '🪜 Passo 1 – Lembra da Escada?',
    renderizar(container) {
      container.innerHTML = `
        <div class="card-text">
          Na atividade anterior você viu que as notas musicais formam uma <strong>escada sonora</strong>.
          Cada degrau sobe uma nota: <em>Mi → Fá → Sol → Lá → Si → Dó → Ré → Mi</em>.
          Quanto mais alto o degrau, <strong>mais agudo é o som</strong>.
        </div>
        <div class="canvas-wrap">
          <canvas id="cv1" width="490" height="210"></canvas>
        </div>
        <div class="callout amber">
          🎯 <strong>Ideia central:</strong> a pauta musical é exatamente essa escada —
          só que deitada horizontalmente no papel.
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#f9a825"></div> Degrau (nota)</div>
          <div class="legend-item"><div class="legend-dot" style="background:rgba(0,0,0,0.15);border:1px solid #888"></div> Número do degrau</div>
        </div>
      `;
      desenharEscada('cv1');
    }
  },

  // Passo 2: A pauta é a escada deitada
  {
    titulo: '🎼 Passo 2 – A Pauta é a Escada Deitada',
    renderizar(container) {
      container.innerHTML = `
        <div class="card-text">
          A <strong>pauta musical</strong> tem <em>5 linhas horizontais</em>. Entre elas existem
          <em>4 espaços</em>. Juntas, essas posições formam 9 degraus — como a escada!
          Quanto mais <strong>alto na pauta</strong>, mais <strong>aguda</strong> é a nota.
        </div>
        <div class="canvas-wrap">
          <canvas id="cv2" width="580" height="200"></canvas>
        </div>
        <div class="callout blue">
          📌 As notas estão escritas <strong>sobre as linhas</strong> ou <strong>nos espaços</strong> entre elas.
          Notas escritas mais acima soam mais agudo; mais abaixo, mais grave.
        </div>
      `;
      desenharPauta('cv2', { notasVisiveis: [] });
      // Redesenha só as linhas (sem notas)
      const canvas = document.getElementById('cv2');
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const LINE1_Y = H - 50, GAP = 14, STAFF_X = 70, STAFF_W = W - STAFF_X - 20;
      // Setas e labels para linhas
      const linhaLabels = ['1ª linha','2ª linha','3ª linha','4ª linha','5ª linha'];
      const espacoLabels = ['1º espaço','2º espaço','3º espaço','4º espaço'];
      ctx.font = '10px Segoe UI, sans-serif'; ctx.textAlign = 'right';
      for (let i = 0; i < 5; i++) {
        const y = LINE1_Y - i * 2 * GAP;
        ctx.fillStyle = '#3b82f6';
        ctx.fillText(linhaLabels[i], STAFF_X - 4, y + 4);
      }
      ctx.fillStyle = '#a855f7';
      for (let i = 0; i < 4; i++) {
        const y = LINE1_Y - (i * 2 + 1) * GAP;
        ctx.fillText(espacoLabels[i], STAFF_X - 4, y + 4);
      }
    }
  },

  // Passo 3: Linhas e Espaços são os Degraus
  {
    titulo: '🔢 Passo 3 – Linhas e Espaços: os Degraus',
    renderizar(container) {
      container.innerHTML = `
        <div class="card-text">
          Os degraus da pauta <strong>alternam entre linhas e espaços</strong>, sempre de baixo para cima:
          <em>1ª linha → 1º espaço → 2ª linha → 2º espaço → ...</em>
          Cada posição é um degrau. Abaixo você pode <strong>clicar em cada nota</strong> para ouvi-la!
        </div>
        <div class="canvas-wrap">
          <canvas id="cv3" width="580" height="200"></canvas>
        </div>
        <div id="noteButtons" class="note-interactive"></div>
        <div class="callout">
          ✅ Cada posição (linha ou espaço) = um degrau = uma nota diferente.
          <strong>Linhas e espaços se alternam</strong>, como os degraus de uma escada.
        </div>
      `;
      let slotAtivo = null;
      function redesenhar() {
        desenharPauta('cv3', { mostrarTipo: true, mostrarDegraus: true, notaDestaque: slotAtivo, notasVisiveis: STAFF_NOTES.map(n => n.slot) });
      }
      redesenhar();
      // Botões de nota
      const div = document.getElementById('noteButtons');
      STAFF_NOTES.forEach(n => {
        const btn = document.createElement('button');
        btn.className = `note-btn ${n.tipo}`;
        btn.innerHTML = `${n.nota}<span class="pos">${n.pos}</span>`;
        btn.onclick = () => {
          slotAtivo = n.slot;
          redesenhar();
          playNote(n.nota === 'Mi' && n.degrau > 1 ? 'Mi2' : n.nota);
        };
        div.appendChild(btn);
      });
    }
  },

  // Passo 4: A Clave de Sol define tudo
  {
    titulo: '🔑 Passo 4 – A Clave de Sol Define o Nome',
    renderizar(container) {
      container.innerHTML = `
        <div class="card-text">
          Mas como sabemos o <strong>nome</strong> de cada degrau da pauta?
          É aí que entra a <em>Clave de Sol</em> 𝄞 — o símbolo no início da pauta.
          Ela <strong>enrola ao redor da 2ª linha</strong> e declara:
          <em>"Esta linha se chama SOL"</em>.
          A partir do Sol, seguimos os degraus para cima e para baixo para descobrir todas as notas.
        </div>
        <div class="canvas-wrap">
          <canvas id="cv4" width="580" height="200"></canvas>
        </div>
        <div class="callout">
          🔑 <strong>A Clave de Sol define: 2ª linha = Sol.</strong><br>
          Subindo um degrau: <strong>Lá, Si, Dó, Ré, Mi, Fá...</strong><br>
          Descendo um degrau da 2ª linha: <strong>Fá, Mi...</strong>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Posição</th><th>Tipo</th><th>Nome da Nota</th><th>Degrau</th></tr>
            </thead>
            <tbody>
              ${STAFF_NOTES.map(n => `
                <tr>
                  <td>${n.pos}</td>
                  <td><span class="badge-${n.tipo}">${n.tipo === 'linha' ? 'Linha' : 'Espaço'}</span></td>
                  <td>
                    <span class="badge-nota">${n.nota}</span>
                    ${n.clave ? '<span class="badge-clave" style="margin-left:6px">← Clave de Sol</span>' : ''}
                  </td>
                  <td>${n.degrau}º</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
      desenharPauta('cv4', { mostrarNomes: true, destacarClave: true, notasVisiveis: STAFF_NOTES.map(n => n.slot) });
    }
  },

  // Passo 5: Revisão e praticar
  {
    titulo: '🎉 Passo 5 – Agora Você Sabe!',
    renderizar(container) {
      container.innerHTML = `
        <div class="card-text">
          Muito bem! Veja o resumo do que aprendemos:
        </div>
        <div class="canvas-wrap">
          <canvas id="cv5" width="580" height="200"></canvas>
        </div>
        <div class="callout amber">
          🎯 <strong>Resumo:</strong> A pauta é uma escada deitada. Cada linha e cada espaço é um degrau.
          Os degraus alternam: linha → espaço → linha → espaço...
          A <strong>Clave de Sol</strong> define que a <strong>2ª linha = Sol</strong>,
          e daí derivamos todas as outras: <em>Mi – Fá – Sol – Lá – Si – Dó – Ré – Mi – Fá</em>.
        </div>
        <div class="note-interactive" id="noteButtons5"></div>
        <div class="callout">
          ✅ Agora pratique! Na próxima atividade você vai <strong>identificar as notas na pauta</strong>.
          Clique no botão abaixo quando estiver pronto.
        </div>
      `;
      desenharPauta('cv5', { mostrarNomes: true, mostrarTipo: true, notasVisiveis: STAFF_NOTES.map(n => n.slot) });
      const div = document.getElementById('noteButtons5');
      STAFF_NOTES.forEach(n => {
        const btn = document.createElement('button');
        btn.className = `note-btn ${n.tipo}`;
        btn.innerHTML = `${n.nota}<span class="pos">${n.pos}</span>`;
        btn.onclick = () => playNote(n.nota === 'Mi' && n.degrau > 1 ? 'Mi2' : n.nota);
        div.appendChild(btn);
      });
    }
  }
];

// ─── Navegação entre passos ───────────────────────────────────────────────────
let passoAtual = 0;
const TOTAL = PASSOS.length;

function renderizarPasso() {
  const passo = PASSOS[passoAtual];
  const card = document.getElementById('mainCard');

  // Atualiza barra de progresso
  document.getElementById('progressFill').style.width = ((passoAtual + 1) / TOTAL * 100) + '%';

  // Atualiza indicadores de passo
  const stepsDiv = document.getElementById('stepsIndicator');
  stepsDiv.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const dot = document.createElement('div');
    dot.className = 'step-dot' + (i < passoAtual ? ' done' : i === passoAtual ? ' active' : '');
    stepsDiv.appendChild(dot);
  }

  // Monta o card
  card.innerHTML = `<div class="card-title">${passo.titulo}</div><div id="conteudoPasso"></div>`;
  passo.renderizar(document.getElementById('conteudoPasso'));

  // Botões de navegação
  const nav = document.createElement('div');
  nav.className = 'nav-btns';
  if (passoAtual > 0) {
    const btnBack = document.createElement('button');
    btnBack.className = 'btn-back';
    btnBack.textContent = '← Anterior';
    btnBack.onclick = () => { passoAtual--; renderizarPasso(); window.scrollTo({top:0, behavior:'smooth'}); };
    nav.appendChild(btnBack);
  }
  if (passoAtual < TOTAL - 1) {
    const btnNext = document.createElement('button');
    btnNext.className = 'btn-next';
    btnNext.innerHTML = 'Próximo &#8594;';
    btnNext.onclick = () => { passoAtual++; renderizarPasso(); window.scrollTo({top:0, behavior:'smooth'}); };
    nav.appendChild(btnNext);
  } else {
    const btnPratica = document.createElement('button');
    btnPratica.className = 'btn-next green';
    btnPratica.innerHTML = '🎯 Praticar agora – Atividade 3';
    btnPratica.onclick = () => { window.location.href = 'atividades-notas.html'; };
    nav.appendChild(btnPratica);
  }
  document.getElementById('conteudoPasso').appendChild(nav);
}

renderizarPasso();
</script>
