<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatório de Progresso Mensal</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">

  <style>
    @page { size: A4; margin: 15mm; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); color: #e2e8f0; min-height: 100vh; padding: 20px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; max-width: 900px; margin: 0 auto 20px; gap: 12px; flex-wrap: wrap; }
    .top-bar h1 { color: #22d3ee; font-size: 1.4em; font-weight: 700; text-shadow: 0 0 10px rgba(34,211,238,0.4); }
    .top-bar-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .btn-print, .btn-jpg { background: linear-gradient(135deg, #0ea5e9, #0284c7); color: #fff; border: none; border-radius: 10px; padding: 10px 20px; font-size: 0.95em; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(14,165,233,0.3); }
    .btn-print:hover, .btn-jpg:hover { background: linear-gradient(135deg, #0284c7, #0369a1); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(14,165,233,0.5); }
    .btn-jpg { background: linear-gradient(135deg, #eab308, #ca8a04); }
    .btn-jpg:hover { background: linear-gradient(135deg, #ca8a04, #a16207); box-shadow: 0 6px 20px rgba(234,179,8,0.5); }
    .btn-voltar { background: rgba(30,41,59,0.9); color: #94a3b8; border: 1px solid rgba(56,189,248,0.3); border-radius: 10px; padding: 10px 18px; font-size: 0.9em; cursor: pointer; transition: all 0.3s ease; }
    .btn-voltar:hover { color: #22d3ee; border-color: rgba(34,211,238,0.6); }
    #loader-relatorio { text-align: center; padding: 60px 20px; color: #22d3ee; }
    .spinner-rel { width: 50px; height: 50px; border: 4px solid rgba(34,211,238,0.2); border-top-color: #22d3ee; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .page { width: 100%; max-width: 900px; background: #fff; color: #1a202c; margin: 0 auto; padding: 30px 35px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .rel-header { display: flex; align-items: center; gap: 20px; border-bottom: 3px solid #0ea5e9; padding-bottom: 20px; margin-bottom: 24px; }
    .rel-foto { width: 100px; height: 100px; border-radius: 12px; object-fit: cover; border: 3px solid #0ea5e9; flex-shrink: 0; background: #e2e8f0; }
    .rel-info h1 { font-size: 1.8em; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
    .rel-info .instrumento { font-size: 1em; color: #475569; font-weight: 500; }
    .rel-info .periodo { font-size: 0.9em; color: #64748b; margin-top: 4px; }
    .rel-logo { margin-left: auto; text-align: right; flex-shrink: 0; }
    .rel-logo .titulo-sistema { font-size: 1em; font-weight: 700; color: #0ea5e9; }
    .rel-logo .subtitulo-sistema { font-size: 0.8em; color: #64748b; }
    .rel-titulo-secao { font-size: 1.05em; font-weight: 700; color: #0f172a; border-left: 4px solid #0ea5e9; padding-left: 10px; margin-bottom: 14px; margin-top: 24px; }
    .indicadores-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
    .indicador-card { border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px; text-align: center; background: #f8fafc; }
    .indicador-card h4 { font-size: 0.85em; color: #475569; margin-bottom: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .indicador-valores { display: flex; justify-content: space-between; gap: 6px; margin-bottom: 10px; }
    .ind-val { flex: 1; padding: 6px 4px; border-radius: 8px; background: #f1f5f9; font-size: 0.78em; color: #475569; }
    .ind-val span { display: block; font-size: 1.1em; font-weight: 700; color: #1e293b; margin-top: 2px; }
    .ind-val.atual { background: #dbeafe; border: 2px solid #3b82f6; }
    .ind-val.atual span { color: #1d4ed8; }
    .ind-val.evoluiu { background: #dcfce7; border: 2px solid #22c55e; }
    .ind-val.evoluiu span { color: #166534; }
    .indicador-status { font-size: 0.82em; font-weight: 700; padding: 5px 10px; border-radius: 20px; display: inline-block; }
    .status-evoluiu  { background: #dcfce7; color: #166534; }
    .status-estavel  { background: #fef9c3; color: #854d0e; }
    .status-regrediu { background: #fee2e2; color: #991b1b; }
    .status-neutro   { background: #f1f5f9; color: #475569; }
    .badge-snapshot { display: inline-block; font-size: 0.7em; background: #ede9fe; color: #6d28d9; border-radius: 6px; padding: 2px 7px; margin-left: 6px; font-weight: 600; vertical-align: middle; }
    .comprometimento-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
    .comp-card { border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; background: #f8fafc; }
    .comp-card h4 { font-size: 0.85em; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    .comp-valor { font-size: 2.2em; font-weight: 800; color: #0f172a; line-height: 1; }
    .comp-detalhe { font-size: 0.82em; color: #64748b; margin-top: 4px; }
    .comp-barra-wrap { margin-top: 10px; background: #e2e8f0; border-radius: 100px; height: 8px; overflow: hidden; }
    .comp-barra-fill { height: 100%; border-radius: 100px; transition: width 0.5s ease; }
    .fill-verde    { background: linear-gradient(90deg, #22c55e, #16a34a); }
    .fill-amarelo  { background: linear-gradient(90deg, #f59e0b, #d97706); }
    .fill-vermelho { background: linear-gradient(90deg, #ef4444, #dc2626); }
    .fill-azul     { background: linear-gradient(90deg, #3b82f6, #2563eb); }
    .analise-box { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 12px; padding: 16px 20px; margin-bottom: 24px; line-height: 1.7; font-size: 0.92em; color: #0f172a; }
    .conquistas-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
    .conquista-item { display: flex; align-items: center; gap: 8px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 8px 14px; font-size: 0.85em; }
    .conquista-item.ouro     { border-color: #f59e0b; background: #fffbeb; }
    .conquista-item.prata    { border-color: #94a3b8; background: #f8fafc; }
    .conquista-item.lendario { border-color: #8b5cf6; background: #f5f3ff; }
    .conquista-icone { font-size: 1.3em; }
    .conquista-info strong { display: block; font-weight: 700; color: #1e293b; }
    .conquista-info span { font-size: 0.82em; color: #64748b; }
    .sem-conquistas { color: #94a3b8; font-style: italic; font-size: 0.9em; }
    .presenca-section { margin-bottom: 24px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88em; }
    th, td { border: 1px solid #e2e8f0; padding: 8px 12px; text-align: center; }
    th { background: #f1f5f9; font-weight: 700; color: #475569; text-transform: uppercase; font-size: 0.8em; letter-spacing: 0.05em; }
    tr:nth-child(even) td { background: #f8fafc; }
    .td-presente { color: #16a34a; font-weight: 700; }
    .td-ausente  { color: #dc2626; font-weight: 700; }
    .rel-footer { border-top: 2px solid #e2e8f0; padding-top: 14px; margin-top: 10px; display: flex; justify-content: space-between; align-items: flex-end; font-size: 0.8em; color: #94a3b8; }
    .assinatura-linha { border-top: 1px solid #94a3b8; width: 200px; text-align: center; padding-top: 6px; font-size: 0.85em; color: #475569; }
    .exportando { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; color: white; font-size: 1.2em; }
    .exportando.mostrar { display: flex; }
    .spinner-export { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #eab308; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 20px; }
    @media print {
      body { background: white !important; padding: 0 !important; color: #1a202c !important; }
      .top-bar { display: none !important; }
      .page { box-shadow: none !important; border-radius: 0 !important; padding: 0 !important; max-width: 100% !important; }
      .indicador-card, .comp-card, .conquista-item, .analise-box { break-inside: avoid; }
    }
    @media (max-width: 600px) {
      .indicadores-grid { grid-template-columns: 1fr; }
      .comprometimento-grid { grid-template-columns: 1fr; }
      .rel-header { flex-direction: column; text-align: center; }
      .rel-logo { margin-left: 0; text-align: center; }
    }
  </style>
</head>

<body>
  <div class="top-bar">
    <h1>📊 Relatório de Progresso Mensal</h1>
    <div class="top-bar-actions">
      <button class="btn-voltar" onclick="history.back()">← Voltar</button>
      <button class="btn-print" onclick="window.print()">🖸️ Imprimir / Salvar PDF</button>
      <button class="btn-jpg" id="btn-jpg">🖼️ Exportar JPG</button>
    </div>
  </div>

  <div class="exportando" id="exportando">
    <div style="display:flex;align-items:center;gap:15px;">
      <div class="spinner-export"></div>
      <span>Exportando para JPG... Aguarde</span>
    </div>
  </div>

  <div id="loader-relatorio">
    <div class="spinner-rel"></div>
    <p>Carregando dados do aluno...</p>
  </div>

  <div class="page" id="pagina-relatorio" style="display:none;"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection, getDocs, doc, getDoc, query, where, orderBy
    } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";
    import { regrasDeConquistas } from "./conquistas.js";

    const MESES = {
      "01":"Janeiro","02":"Fevereiro","03":"Março","04":"Abril",
      "05":"Maio","06":"Junho","07":"Julho","08":"Agosto",
      "09":"Setembro","10":"Outubro","11":"Novembro","12":"Dezembro"
    };

    const params         = new URLSearchParams(window.location.search);
    const alunoId        = params.get("id");
    const mesSelecionado = params.get("mes");

    if (!alunoId) {
      document.getElementById("loader-relatorio").innerHTML =
        `<p style="color:#ef4444;">❌ Nenhum aluno selecionado.</p>`;
    } else {
      gerarRelatorio(alunoId, mesSelecionado);
    }

    // ── Exportar JPG ───────────────────────────────────────────────────────────
    document.getElementById('btn-jpg').addEventListener('click', async () => {
      const pagina     = document.getElementById('pagina-relatorio');
      const exportando = document.getElementById('exportando');
      if (pagina.style.display === 'none') { alert('Aguarde o relatório carregar.'); return; }
      exportando.classList.add('mostrar');
      try {
        const canvas = await html2canvas(pagina, {
          scale: 2, useCORS: true, allowTaint: true,
          backgroundColor: '#ffffff',
          width: pagina.scrollWidth, height: pagina.scrollHeight,
          logging: false, letterRendering: true,
          onclone: (clonedDoc) => {
            const p = clonedDoc.getElementById('pagina-relatorio');
            p.style.boxShadow = 'none';
            p.style.borderRadius = '0';
          }
        });
        const link = document.createElement('a');
        link.download = `relatorio_${alunoId}_${mesSelecionado || 'atual'}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
        setTimeout(() => exportando.classList.remove('mostrar'), 1000);
      } catch (err) {
        console.error(err);
        exportando.classList.remove('mostrar');
        alert('Erro ao gerar imagem.');
      }
    });

    // ── Buscar snapshots do aluno ──────────────────────────────────────────────
    async function buscarSnapshots(id) {
      try {
        const q = query(
          collection(db, "snapshotsMensais"),
          where("alunoId", "==", id),
          orderBy("chave", "asc")
        );
        const snap = await getDocs(q);
        return snap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch {
        const snap = await getDocs(
          query(collection(db, "snapshotsMensais"), where("alunoId", "==", id))
        );
        const lista = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        lista.sort((a, b) => a.chave.localeCompare(b.chave));
        return lista;
      }
    }

    // ── Gerar relatório principal ──────────────────────────────────────────────
    async function gerarRelatorio(id, mesChave) {
      try {
        const alunoSnap = await getDoc(doc(db, "alunos", id));
        if (!alunoSnap.exists()) throw new Error("Aluno não encontrado.");
        const aluno = { id: alunoSnap.id, ...alunoSnap.data() };

        const agora  = new Date();
        const chave  = mesChave || `${agora.getFullYear()}-${String(agora.getMonth()+1).padStart(2,"0")}`;
        const [anoRel, mesRel] = chave.split("-");
        const chaveAnterior    = getMesAnterior(chave);

        const snapEventos  = await getDocs(collection(db, "eventos"));
        const todosEventos = snapEventos.docs.map(d => ({ id: d.id, ...d.data() }));
        const eventosMes    = todosEventos.filter(e => e.data?.startsWith(chave));
        const eventosAno    = todosEventos.filter(e => e.data?.startsWith(`${anoRel}-`));
        const eventosMesAnt = todosEventos.filter(e => e.data?.startsWith(chaveAnterior));

        const freqMes         = calcularFrequencia(eventosMes,    aluno.nome);
        const freqGeral       = calcularFrequencia(eventosAno,    aluno.nome);
        const freqMesAnterior = calcularFrequencia(eventosMesAnt, aluno.nome);

        const alunoSimMes   = { ...aluno, frequenciaMensal: { porcentagem: freqMes.percentual } };
        const conquistasMes = regrasDeConquistas.filter(c => c.condicao(alunoSimMes));

        const presencaDetalhada = eventosMes.map(ev => {
          const p = ev.presencas?.find(x => x.nome === aluno.nome);
          return { data: formatarData(ev.data), status: p?.presenca === "presente" ? "Presente" : "Ausente" };
        }).sort((a, b) => a.data.localeCompare(b.data));

        const snapshots    = await buscarSnapshots(id);
        const snapAtual    = snapshots.find(s => s.chave === chave);
        const snapAnterior = snapshots.find(s => s.chave === chaveAnterior);

        const leituraAtual    = snapAtual?.leitura    ?? aluno.leitura    ?? 1;
        const leituraAnterior = snapAnterior?.leitura ?? null;
        const leituraMeta     = leituraAtual + 2;

        const metodoAtual    = snapAtual?.metodo    ?? aluno.metodo    ?? 1;
        const metodoAnterior = snapAnterior?.metodo ?? null;
        const metodoMeta     = metodoAtual + 2;

        const temSnapAtual    = !!snapAtual;
        const temSnapAnterior = !!snapAnterior;

        renderizarRelatorio({
          aluno, anoRel, mesRel, chave,
          freqMes, freqGeral, freqMesAnterior,
          conquistasMes, presencaDetalhada,
          leituraAtual, leituraAnterior, leituraMeta,
          metodoAtual,  metodoAnterior,  metodoMeta,
          temSnapAtual, temSnapAnterior
        });

      } catch (err) {
        console.error(err);
        document.getElementById("loader-relatorio").innerHTML =
          `<p style="color:#ef4444;">❌ Erro ao carregar relatório: ${err.message}</p>`;
      }
    }

    // ── Utilitários ────────────────────────────────────────────────────────────
    function calcularFrequencia(eventos, nomeAluno) {
      if (!eventos?.length) return { total: 0, presencas: 0, percentual: 0 };
      const total     = eventos.length;
      const presencas = eventos.filter(ev =>
        ev.presencas?.find(x => x.nome === nomeAluno)?.presenca === "presente"
      ).length;
      return { total, presencas, percentual: Math.round((presencas / total) * 100) };
    }

    function getMesAnterior(chave) {
      const [ano, mes] = chave.split("-").map(Number);
      const d = new Date(ano, mes - 2, 1);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    }

    function formatarData(iso) {
      if (!iso) return "-";
      const [a, m, d] = iso.split("-");
      return `${d}/${m}/${a}`;
    }

    function gerarStatus(atual, anterior) {
      if (anterior === null) return { texto: "— Sem histórico", classe: "status-neutro" };
      if (atual > anterior)  return { texto: "▲ Evoluiu",        classe: "status-evoluiu" };
      if (atual === anterior) return { texto: "● Estável",        classe: "status-estavel" };
      return                         { texto: "▼ Regrediu",       classe: "status-regrediu" };
    }

    function corBarra(pct) {
      if (pct >= 80) return "fill-verde";
      if (pct >= 50) return "fill-amarelo";
      return "fill-vermelho";
    }

    // ── Análise automática ─────────────────────────────────────────────────────
    function gerarAnalise(aluno, freqMes, freqGeral, freqMesAnterior,
                          leituraAtual, leituraAnterior, metodoAtual, metodoAnterior) {
      const nome   = aluno.nome ? aluno.nome.split(" ")[0] : "você";
      const lNome  = aluno.leituraNome || "Bona";
      const mNome  = aluno.metodoNome  || "Método";
      const partes = [];
      const pct    = freqMes.percentual;
      const pctAnt = freqMesAnterior.total > 0 ? freqMesAnterior.percentual : null;

      // ── BLOCO 1: Presença mensal (baseada na faixa real, não só na tendência) ──
      if (freqMes.total === 0) {
        partes.push(`${nome}, não há registros de chamada para este mês.`);
      } else if (pct === 100) {
        partes.push(`${nome}, presença perfeita neste mês! Você é um exemplo de comprometimento para toda a orquestra. Parabéns!`);
      } else if (pct >= 80) {
        if (pctAnt !== null && pct > pctAnt)
          partes.push(`${nome}, sua frequência chegou a ${pct}% — ótimo resultado! Agora o desafio é alcançar 100% de presença.`);
        else if (pctAnt !== null && pct < pctAnt)
          partes.push(`${nome}, sua frequência caiu para ${pct}%, mas ainda está em um bom patamar. Recupere o ritmo e mire os 100%.`);
        else
          partes.push(`${nome}, você manteve ${pct}% de presença — muito bom! O próximo passo é chegar a 100%.`);
      } else if (pct >= 50) {
        if (pctAnt !== null && pct > pctAnt)
          partes.push(`${nome}, sua frequência subiu para ${pct}% — uma melhora bem-vinda! O próximo objetivo é chegar a 80%. Você está no caminho certo.`);
        else if (pctAnt !== null && pct < pctAnt)
          partes.push(`${nome}, sua frequência caiu para ${pct}%. Tente reverter essa tendência e buscar os 80% no próximo mês.`);
        else
          partes.push(`${nome}, sua frequência se manteve em ${pct}%. Há espaço para crescer — tente chegar a 80% no próximo mês.`);
      } else {
        // 0–49% — sempre preocupante, independente da tendência
        partes.push(`${nome}, sua presença neste mês foi de ${pct}% — um índice que precisa de atenção. Tente chegar pelo menos a 80% no próximo mês. Cada ensaio perdido é uma oportunidade de crescimento que não volta!`);
      }

      // ── BLOCO 2: Leitura ───────────────────────────────────────────────────
      if (leituraAnterior === null) {
        partes.push(`Na leitura, você está na lição ${leituraAtual} (${lNome}) — agora é hora de avançar e mostrar seu potencial!`);
      } else if (leituraAtual > leituraAnterior) {
        partes.push(`Na leitura, você avançou do nível ${leituraAnterior} para o nível ${leituraAtual} (${lNome}) — excelente! Isso mostra dedicação real ao solfejo.`);
      } else if (leituraAtual === leituraAnterior) {
        partes.push(`${nome}, você está na lição ${leituraAtual} (${lNome}) há dois meses consecutivos. A lição ${leituraAtual} foi uma conquista — mas ela não precisa ser sua morada. Que tal se desafiar a avançar?`);
      } else {
        partes.push(`Sua leitura recuou do nível ${leituraAnterior} para ${leituraAtual} (${lNome}). Não desanime — redobrar a atenção ao solfejo nas próximas semanas fará toda a diferença.`);
      }

      // ── BLOCO 3: Método instrumental ──────────────────────────────────────
      if (metodoAnterior === null) {
        partes.push(`Você está na lição ${metodoAtual} do ${mNome} — cada lição concluída é um passo real no seu instrumento.`);
      } else if (metodoAtual > metodoAnterior) {
        partes.push(`No método, você avançou da unidade ${metodoAnterior} para a unidade ${metodoAtual} (${mNome}) — um progresso notável que evidencia seu comprometimento!`);
      } else if (metodoAtual === metodoAnterior) {
        partes.push(`${nome}, você está na unidade ${metodoAtual} do ${mNome} há dois meses. A unidade ${metodoAtual} foi uma conquista — mas ela não precisa ser sua morada. Que tal se desafiar a avançar?`);
      } else {
        partes.push(`Houve um recuo no método (de ${metodoAnterior} para ${metodoAtual}). Retome com calma — você tem capacidade de recuperar e superar esse ponto.`);
      }

      // ── BLOCO 4: Comprometimento geral anual (omite se igual ao mensal) ───
      if (freqGeral.total > 0 && freqGeral.percentual !== pct) {
        if (freqGeral.percentual >= 85)
          partes.push(`Seu comprometimento geral no ano é excelente (${freqGeral.percentual}%) — você é um exemplo de dedicação para toda a orquestra!`);
        else if (freqGeral.percentual >= 60)
          partes.push(`Seu comprometimento geral no ano está em ${freqGeral.percentual}% — um resultado satisfatório, com espaço para crescer ainda mais.`);
        else
          partes.push(`Seu comprometimento geral no ano (${freqGeral.percentual}%) merece atenção. Aumentar sua presença nos ensaios vai refletir diretamente no seu crescimento musical.`);
      }

      return partes.join(" ");
    }

    // ── Renderizar ─────────────────────────────────────────────────────────────
    function renderizarRelatorio({
      aluno, anoRel, mesRel, chave,
      freqMes, freqGeral, freqMesAnterior,
      conquistasMes, presencaDetalhada,
      leituraAtual, leituraAnterior, leituraMeta,
      metodoAtual,  metodoAnterior,  metodoMeta,
      temSnapAtual, temSnapAnterior
    }) {
      const nomeMes = MESES[mesRel] || mesRel;

      const stPresenca = gerarStatus(freqMes.percentual,
        freqMesAnterior.total > 0 ? freqMesAnterior.percentual : null);
      const stLeitura  = gerarStatus(leituraAtual, leituraAnterior);
      const stMetodo   = gerarStatus(metodoAtual,  metodoAnterior);

      const metaPresenca = freqMes.percentual >= 100 ? 100
        : freqMes.percentual >= 80 ? 100 : 80;

      const badgeSnap = temSnapAtual
        ? `<span class="badge-snapshot">📸 pegada</span>`
        : `<span class="badge-snapshot" style="background:#fef9c3;color:#854d0e;">⚠️ sem pegada</span>`;

      const antLeituraTexto = leituraAnterior !== null ? `Nível ${leituraAnterior}` : "—";
      const antMetodoTexto  = metodoAnterior  !== null ? `Unid. ${metodoAnterior}`  : "—";

      const clsAntLeitura = (leituraAnterior !== null && leituraAtual > leituraAnterior) ? "evoluiu" : "";
      const clsAntMetodo  = (metodoAnterior  !== null && metodoAtual  > metodoAnterior)  ? "evoluiu" : "";

      const analise = gerarAnalise(
        aluno, freqMes, freqGeral, freqMesAnterior,
        leituraAtual, leituraAnterior, metodoAtual, metodoAnterior
      );

      const conquistasHTML = conquistasMes.length
        ? conquistasMes.map(c => `
            <div class="conquista-item ${c.raridade || ''}">
              <span class="conquista-icone">${c.icone}</span>
              <div class="conquista-info"><strong>${c.titulo}</strong><span>${c.descricao}</span></div>
            </div>`).join("")
        : `<span class="sem-conquistas">Nenhuma conquista desbloqueada neste mês.</span>`;

      const presencaHTML = presencaDetalhada.length
        ? presencaDetalhada.map(p => `
            <tr>
              <td>${p.data}</td>
              <td class="${p.status === 'Presente' ? 'td-presente' : 'td-ausente'}">${p.status}</td>
            </tr>`).join("")
        : `<tr><td colspan="2" style="color:#94a3b8;font-style:italic;">Nenhum registro de chamada neste mês.</td></tr>`;

      const html = `
        <div class="rel-header">
          <img src="${aluno.foto || 'https://via.placeholder.com/100'}" class="rel-foto" alt="${aluno.nome}" onerror="this.src='https://via.placeholder.com/100'">
          <div class="rel-info">
            <h1>${aluno.nome}</h1>
            <p class="instrumento">🎵 ${aluno.instrumento || "Instrumento não definido"}</p>
            <p class="periodo">📅 Relatório de ${nomeMes} / ${anoRel} ${badgeSnap}</p>
          </div>
          <div class="rel-logo">
            <div class="titulo-sistema">Filhos de Asafe</div>
            <div class="subtitulo-sistema">Sistema de Desempenho Musical</div>
          </div>
        </div>

        <div class="rel-titulo-secao">📈 Indicadores de Progresso</div>
        <div class="indicadores-grid">

          <div class="indicador-card">
            <h4>Presença no Mês</h4>
            <div class="indicador-valores">
              <div class="ind-val">Anterior<span>${freqMesAnterior.total > 0 ? freqMesAnterior.percentual + '%' : '—'}</span></div>
              <div class="ind-val atual">Atual<span>${freqMes.percentual}%</span></div>
              <div class="ind-val">Meta<span>${metaPresenca}%</span></div>
            </div>
            <span class="indicador-status ${stPresenca.classe}">${stPresenca.texto}</span>
          </div>

          <div class="indicador-card">
            <h4>Leitura (${aluno.leituraNome || 'Bona'})</h4>
            <div class="indicador-valores">
              <div class="ind-val ${clsAntLeitura}">Anterior<span>${antLeituraTexto}</span></div>
              <div class="ind-val atual">Atual<span>Nível ${leituraAtual}</span></div>
              <div class="ind-val">Meta<span>Nível ${leituraMeta}</span></div>
            </div>
            <span class="indicador-status ${stLeitura.classe}">${stLeitura.texto}</span>
          </div>

          <div class="indicador-card">
            <h4>Método (${aluno.metodoNome || 'Método'})</h4>
            <div class="indicador-valores">
              <div class="ind-val ${clsAntMetodo}">Anterior<span>${antMetodoTexto}</span></div>
              <div class="ind-val atual">Atual<span>Unid. ${metodoAtual}</span></div>
              <div class="ind-val">Meta<span>Unid. ${metodoMeta}</span></div>
            </div>
            <span class="indicador-status ${stMetodo.classe}">${stMetodo.texto}</span>
          </div>

        </div>

        <div class="rel-titulo-secao">⚡ Comprometimento</div>
        <div class="comprometimento-grid">
          <div class="comp-card">
            <h4>Comprometimento Mensal — ${nomeMes}</h4>
            <div class="comp-valor">${freqMes.percentual}%</div>
            <div class="comp-detalhe">${freqMes.presencas} presença(s) de ${freqMes.total} chamada(s)</div>
            <div class="comp-barra-wrap"><div class="comp-barra-fill ${corBarra(freqMes.percentual)}" style="width:${freqMes.percentual}%"></div></div>
          </div>
          <div class="comp-card">
            <h4>Comprometimento Geral — ${anoRel}</h4>
            <div class="comp-valor">${freqGeral.percentual}%</div>
            <div class="comp-detalhe">${freqGeral.presencas} presença(s) de ${freqGeral.total} chamada(s) no ano</div>
            <div class="comp-barra-wrap"><div class="comp-barra-fill fill-azul" style="width:${freqGeral.percentual}%"></div></div>
          </div>
        </div>

        <div class="rel-titulo-secao">📝 Análise do Desempenho</div>
        <div class="analise-box">${analise}</div>

        <div class="rel-titulo-secao">🏆 Conquistas do Mês</div>
        <div class="conquistas-grid">${conquistasHTML}</div>

        <div class="rel-titulo-secao">📋 Controle de Presença — ${nomeMes} ${anoRel}</div>
        <div class="presenca-section">
          <table>
            <thead><tr><th>Data</th><th>Status</th></tr></thead>
            <tbody>${presencaHTML}</tbody>
          </table>
        </div>

        <div class="rel-footer">
          <div>
            <div>Gerado em: ${new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'})}</div>
            <div style="margin-top:4px;">Sistema Filhos de Asafe — Relatório de Progresso Mensal</div>
          </div>
          <div class="assinatura-linha">Professor Responsável</div>
        </div>
      `;

      const pagina = document.getElementById("pagina-relatorio");
      pagina.innerHTML = html;
      pagina.style.display = "block";
      document.getElementById("loader-relatorio").style.display = "none";
    }
  </script>
</body>
</html>
