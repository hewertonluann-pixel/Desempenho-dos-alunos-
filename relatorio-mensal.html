<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatório de Progresso Mensal</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <style>
    @page { size: A4; margin: 10mm; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); color: #e2e8f0; min-height: 100vh; padding: 20px; }

    /* ── Top bar ── */
    .top-bar { display: flex; justify-content: space-between; align-items: center; max-width: 900px; margin: 0 auto 16px; gap: 12px; flex-wrap: wrap; }
    .top-bar h1 { color: #22d3ee; font-size: 1.4em; font-weight: 700; text-shadow: 0 0 10px rgba(34,211,238,0.4); }
    .top-bar-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .btn-print, .btn-jpg { background: linear-gradient(135deg, #0ea5e9, #0284c7); color: #fff; border: none; border-radius: 10px; padding: 10px 20px; font-size: 0.95em; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(14,165,233,0.3); }
    .btn-print:hover, .btn-jpg:hover { background: linear-gradient(135deg, #0284c7, #0369a1); transform: translateY(-2px); }
    .btn-jpg { background: linear-gradient(135deg, #eab308, #ca8a04); }
    .btn-jpg:hover { background: linear-gradient(135deg, #ca8a04, #a16207); }
    .btn-voltar { background: rgba(30,41,59,0.9); color: #94a3b8; border: 1px solid rgba(56,189,248,0.3); border-radius: 10px; padding: 10px 18px; font-size: 0.9em; cursor: pointer; transition: all 0.3s ease; }
    .btn-voltar:hover { color: #22d3ee; border-color: rgba(34,211,238,0.6); }

    /* ── Loader ── */
    #loader-relatorio { text-align: center; padding: 60px 20px; color: #22d3ee; }
    .spinner-rel { width: 50px; height: 50px; border: 4px solid rgba(34,211,238,0.2); border-top-color: #22d3ee; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Página principal ── */
    .page {
      width: 100%; max-width: 900px; background: #fff; color: #1a202c;
      margin: 0 auto; padding: 22px 28px;
      border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    /* ── Cabeçalho ── */
    .rel-header { display: flex; align-items: center; gap: 16px; border-bottom: 3px solid #0ea5e9; padding-bottom: 14px; margin-bottom: 16px; }
    .rel-foto { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; border: 3px solid #0ea5e9; flex-shrink: 0; background: #e2e8f0; }
    .rel-info h1 { font-size: 1.55em; font-weight: 700; color: #0f172a; margin-bottom: 2px; }
    .rel-info .instrumento { font-size: 0.9em; color: #475569; font-weight: 500; }
    .rel-info .periodo { font-size: 0.82em; color: #64748b; margin-top: 2px; }
    .rel-logo { margin-left: auto; text-align: right; flex-shrink: 0; }
    .rel-logo .titulo-sistema { font-size: 0.95em; font-weight: 700; color: #0ea5e9; }
    .rel-logo .subtitulo-sistema { font-size: 0.75em; color: #64748b; }

    /* ── Título de seção ── */
    .rel-titulo-secao {
      font-size: 0.92em; font-weight: 700; color: #0f172a;
      border-left: 3px solid #0ea5e9; padding-left: 8px;
      margin-bottom: 8px; margin-top: 14px;
    }

    /* ── Indicadores (3 colunas) ── */
    .indicadores-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
    .indicador-card { border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; text-align: center; background: #f8fafc; }
    .indicador-card h4 { font-size: 0.75em; color: #475569; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .indicador-valores { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 8px; }
    .ind-val { flex: 1; padding: 5px 3px; border-radius: 7px; background: #f1f5f9; font-size: 0.72em; color: #475569; }
    .ind-val span { display: block; font-size: 1.08em; font-weight: 700; color: #1e293b; margin-top: 1px; }
    .ind-val.atual { background: #dbeafe; border: 2px solid #3b82f6; }
    .ind-val.atual span { color: #1d4ed8; }
    .ind-val.evoluiu { background: #dcfce7; border: 2px solid #22c55e; }
    .indicador-status { font-size: 0.76em; font-weight: 700; padding: 4px 8px; border-radius: 20px; display: inline-block; }
    .status-evoluiu  { background: #dcfce7; color: #166534; }
    .status-estavel  { background: #fef9c3; color: #854d0e; }
    .status-regrediu { background: #fee2e2; color: #991b1b; }
    .status-neutro   { background: #dbeafe; color: #1d4ed8; }

    /* ════════════════════════════════════════════════
       PAINEL TURMA: ranking+comparativo (esq) | gráfico (dir)
    ════════════════════════════════════════════════ */
    .painel-turma { display: flex; gap: 8px; margin-bottom: 14px; align-items: stretch; }
    .painel-turma-esq { display: flex; flex-direction: column; gap: 6px; flex: 0 0 52%; min-width: 0; }
    .painel-turma-dir { flex: 1; min-width: 0; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 8px 10px; display: flex; flex-direction: column; }

    .painel-bloco { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 8px 10px; }
    .painel-bloco-label { font-size: 0.65em; font-weight: 700; color: #0ea5e9; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
    .painel-bloco-label::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }

    .rank-mini-grid, .comp-mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }

    .rank-mini-card { text-align: center; padding: 5px 3px; border-radius: 7px; background: #fff; border: 1px solid #e2e8f0; position: relative; overflow: hidden; }
    .rank-mini-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
    .rmc-blue::before   { background: linear-gradient(90deg,#3b82f6,#6366f1); }
    .rmc-green::before  { background: linear-gradient(90deg,#22c55e,#16a34a); }
    .rmc-yellow::before { background: linear-gradient(90deg,#f59e0b,#d97706); }
    .rank-mini-label { font-size: 0.6em; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .rank-mini-pos { font-size: 1.35em; font-weight: 900; line-height: 1.1; }
    .rank-mini-pos.ouro   { color: #d97706; }
    .rank-mini-pos.prata  { color: #64748b; }
    .rank-mini-pos.bronze { color: #92400e; }
    .rank-mini-pos.normal { color: #1e293b; }
    .rank-mini-total { font-size: 0.58em; color: #94a3b8; }
    .rank-mini-badge { display: inline-block; font-size: 0.56em; font-weight: 700; padding: 2px 5px; border-radius: 8px; margin-top: 1px; }
    .rmb-ouro   { background: #fef3c7; color: #92400e; border: 1px solid #fbbf24; }
    .rmb-prata  { background: #f1f5f9; color: #475569; border: 1px solid #94a3b8; }
    .rmb-bronze { background: #fef3c7; color: #78350f; border: 1px solid #d97706; }
    .rmb-normal { background: #eff6ff; color: #1d4ed8; border: 1px solid #93c5fd; }

    .comp-mini-card { text-align: center; padding: 5px 3px; border-radius: 7px; background: #fff; border: 1px solid #e2e8f0; }
    .comp-mini-label  { font-size: 0.58em; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 2px; }
    .comp-mini-row    { display: flex; justify-content: center; align-items: baseline; gap: 2px; }
    .comp-mini-voce   { font-size: 1.05em; font-weight: 800; }
    .comp-mini-voce.acima  { color: #16a34a; }
    .comp-mini-voce.abaixo { color: #dc2626; }
    .comp-mini-voce.igual  { color: #d97706; }
    .comp-mini-vs     { font-size: 0.58em; color: #cbd5e1; }
    .comp-mini-media  { font-size: 0.68em; color: #64748b; }
    .comp-chip-sm { display: inline-block; font-size: 0.56em; font-weight: 700; padding: 1px 5px; border-radius: 7px; margin-top: 1px; }
    .chip-acima  { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .chip-abaixo { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .chip-igual  { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }

    .evolucao-titulo { font-size: 0.65em; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
    .evolucao-chart-wrap { position: relative; flex: 1; min-height: 110px; }
    .evolucao-sem-dados { color: #94a3b8; font-style: italic; font-size: 0.75em; text-align: center; padding: 16px 0; }

    /* ════════════════════════════════════════════════
       PAINEL INFERIOR: comprometimento+conquistas (esq) | análise (dir)
    ════════════════════════════════════════════════ */
    .painel-inferior { display: flex; gap: 8px; margin-bottom: 14px; align-items: stretch; }

    /* Coluna esq: comprometimento compacto + conquistas */
    .painel-inf-esq { display: flex; flex-direction: column; gap: 6px; flex: 0 0 44%; min-width: 0; }

    /* Comprometimento compacto: 2 mini-cards lado a lado */
    .comp-freq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .comp-freq-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 10px; text-align: center; }
    .comp-freq-label { font-size: 0.6em; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .comp-freq-valor { font-size: 1.7em; font-weight: 800; color: #0f172a; line-height: 1; }
    .comp-freq-detalhe { font-size: 0.6em; color: #94a3b8; margin-top: 2px; }
    .comp-barra-wrap { margin-top: 6px; background: #e2e8f0; border-radius: 100px; height: 5px; overflow: hidden; }
    .comp-barra-fill { height: 100%; border-radius: 100px; }
    .fill-verde    { background: linear-gradient(90deg, #22c55e, #16a34a); }
    .fill-amarelo  { background: linear-gradient(90deg, #f59e0b, #d97706); }
    .fill-vermelho { background: linear-gradient(90deg, #ef4444, #dc2626); }
    .fill-azul     { background: linear-gradient(90deg, #3b82f6, #2563eb); }

    /* Conquistas compactas dentro do painel */
    .conquistas-bloco { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 8px 10px; flex: 1; }
    .conquistas-compact { display: flex; flex-wrap: wrap; gap: 5px; }
    .conquista-item { display: flex; align-items: center; gap: 5px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 5px 10px; font-size: 0.76em; }
    .conquista-item.ouro     { border-color: #f59e0b; background: #fffbeb; }
    .conquista-item.prata    { border-color: #94a3b8; background: #f8fafc; }
    .conquista-item.lendario { border-color: #8b5cf6; background: #f5f3ff; }
    .conquista-icone { font-size: 1.15em; }
    .conquista-info strong { display: block; font-weight: 700; color: #1e293b; font-size: 0.95em; }
    .conquista-info span   { font-size: 0.85em; color: #64748b; }
    .sem-conquistas { color: #94a3b8; font-style: italic; font-size: 0.82em; }

    /* Coluna dir: análise */
    .painel-inf-dir { flex: 1; min-width: 0; background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 10px; padding: 10px 13px; display: flex; flex-direction: column; }
    .analise-titulo { font-size: 0.65em; font-weight: 700; color: #0ea5e9; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .analise-texto  { line-height: 1.6; font-size: 0.82em; color: #0f172a; flex: 1; }

    /* ── Tabela de presença ── */
    .presenca-section { margin-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
    th, td { border: 1px solid #e2e8f0; padding: 5px 10px; text-align: center; }
    th { background: #f1f5f9; font-weight: 700; color: #475569; text-transform: uppercase; font-size: 0.75em; letter-spacing: 0.05em; }
    tr:nth-child(even) td { background: #f8fafc; }
    .td-presente { color: #16a34a; font-weight: 700; }
    .td-ausente  { color: #dc2626; font-weight: 700; }

    /* ── Rodapé ── */
    .rel-footer { border-top: 1px solid #e2e8f0; padding-top: 10px; margin-top: 8px; display: flex; justify-content: space-between; align-items: flex-end; font-size: 0.72em; color: #94a3b8; }
    .assinatura-linha { border-top: 1px solid #94a3b8; width: 180px; text-align: center; padding-top: 5px; font-size: 0.85em; color: #475569; }

    /* ── Exportar ── */
    .exportando { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; color: white; font-size: 1.2em; }
    .exportando.mostrar { display: flex; }
    .spinner-export { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #eab308; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 20px; }

    /* ── Exportar A4 ── */
    .exportar-a4 {
      width: 794px !important; min-width: 794px !important; max-width: 794px !important;
      padding: 22px 28px !important; box-shadow: none !important; border-radius: 0 !important;
    }
    .exportar-a4 .indicadores-grid   { grid-template-columns: repeat(3,1fr) !important; }
    .exportar-a4 .painel-turma       { flex-direction: row !important; }
    .exportar-a4 .painel-turma-esq   { flex: 0 0 52% !important; }
    .exportar-a4 .rank-mini-grid,
    .exportar-a4 .comp-mini-grid     { grid-template-columns: repeat(3,1fr) !important; }
    .exportar-a4 .painel-inferior    { flex-direction: row !important; }
    .exportar-a4 .painel-inf-esq     { flex: 0 0 44% !important; }
    .exportar-a4 .comp-freq-grid     { grid-template-columns: 1fr 1fr !important; }
    .exportar-a4 .rel-header         { flex-direction: row !important; text-align: left !important; }
    .exportar-a4 .rel-logo           { margin-left: auto !important; text-align: right !important; }

    /* ── Impressão ── */
    @media print {
      body { background: white !important; padding: 0 !important; color: #1a202c !important; }
      .top-bar { display: none !important; }
      .page {
        box-shadow: none !important; border-radius: 0 !important;
        padding: 10mm !important; max-width: 100% !important;
      }
      .indicadores-grid   { grid-template-columns: repeat(3,1fr) !important; }
      .painel-turma       { flex-direction: row !important; }
      .painel-inferior    { flex-direction: row !important; }
      .painel-turma-esq   { flex: 0 0 52% !important; }
      .painel-inf-esq     { flex: 0 0 44% !important; }
      .comp-freq-grid     { grid-template-columns: 1fr 1fr !important; }
      .rank-mini-grid, .comp-mini-grid { grid-template-columns: repeat(3,1fr) !important; }
      .rel-header         { flex-direction: row !important; }
      .rel-logo           { margin-left: auto !important; }
      .indicador-card, .painel-turma, .painel-inferior, .presenca-section { break-inside: avoid; }
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .indicadores-grid { grid-template-columns: 1fr; }
      .rel-header { flex-direction: column; text-align: center; }
      .rel-logo { margin-left: 0; text-align: center; }
      .painel-turma, .painel-inferior { flex-direction: column; }
      .painel-turma-esq, .painel-inf-esq { flex: none; }
      .rank-mini-grid, .comp-mini-grid, .comp-freq-grid { grid-template-columns: repeat(3,1fr); }
    }
  </style>
</head>

<body>
  <div class="top-bar">
    <h1>📊 Relatório de Progresso Mensal</h1>
    <div class="top-bar-actions">
      <button class="btn-voltar" onclick="history.back()">← Voltar</button>
      <button class="btn-print" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
      <button class="btn-jpg" id="btn-jpg">🖼️ Exportar JPG</button>
    </div>
  </div>

  <div class="exportando" id="exportando">
    <div style="display:flex;align-items:center;gap:15px;">
      <div class="spinner-export"></div>
      <span>Exportando para JPG... Aguarde</span>
    </div>
  </div>

  <div id="loader-relatorio">
    <div class="spinner-rel"></div>
    <p>Carregando dados do aluno...</p>
  </div>

  <div class="page" id="pagina-relatorio" style="display:none;"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection, getDocs, doc, getDoc, query, where, orderBy
    } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";
    import { regrasDeConquistas } from "./conquistas.js";

    const MESES = {
      "01":"Janeiro","02":"Fevereiro","03":"Março","04":"Abril",
      "05":"Maio","06":"Junho","07":"Julho","08":"Agosto",
      "09":"Setembro","10":"Outubro","11":"Novembro","12":"Dezembro"
    };
    const NOMES_MES_CURTO = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

    const params         = new URLSearchParams(window.location.search);
    const alunoId        = params.get("id");
    const mesSelecionado = params.get("mes");

    if (!alunoId) {
      document.getElementById("loader-relatorio").innerHTML =
        `<p style="color:#ef4444;">❌ Nenhum aluno selecionado.</p>`;
    } else {
      gerarRelatorio(alunoId, mesSelecionado);
    }

    document.getElementById('btn-jpg').addEventListener('click', async () => {
      const pagina     = document.getElementById('pagina-relatorio');
      const exportando = document.getElementById('exportando');
      if (pagina.style.display === 'none') { alert('Aguarde o relatório carregar.'); return; }
      exportando.classList.add('mostrar');
      try {
        pagina.classList.add('exportar-a4');
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
        const canvas = await html2canvas(pagina, {
          scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#ffffff',
          width: 794, height: pagina.scrollHeight, windowWidth: 794, logging: false, letterRendering: true,
          onclone: (clonedDoc) => {
            const p = clonedDoc.getElementById('pagina-relatorio');
            p.classList.add('exportar-a4');
            p.style.boxShadow = 'none'; p.style.borderRadius = '0';
          }
        });
        const link = document.createElement('a');
        link.download = `relatorio_${alunoId}_${mesSelecionado || 'atual'}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
        setTimeout(() => exportando.classList.remove('mostrar'), 1000);
      } catch (err) {
        console.error(err);
        exportando.classList.remove('mostrar');
        alert('Erro ao gerar imagem.');
      } finally {
        pagina.classList.remove('exportar-a4');
      }
    });

    async function buscarSnapshots(id) {
      try {
        const snap = await getDocs(query(
          collection(db, "snapshotsMensais"), where("alunoId","==",id), orderBy("chave","asc")
        ));
        return snap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch {
        const snap = await getDocs(query(collection(db,"snapshotsMensais"), where("alunoId","==",id)));
        const lista = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        lista.sort((a,b) => a.chave.localeCompare(b.chave));
        return lista;
      }
    }

    async function buscarDadosTurma(anoRel) {
      try {
        const snapAlunos = await getDocs(collection(db,'alunos'));
        const todosAlunos = snapAlunos.docs.map(d=>({id:d.id,...d.data()})).filter(a=>a.ativo!==false);
        const snapEventos = await getDocs(collection(db,'eventos'));
        const eventosAno  = snapEventos.docs.map(d=>({id:d.id,...d.data()})).filter(e=>e.data?.startsWith(`${anoRel}-`));
        const freqPorAluno = {};
        todosAlunos.forEach(a => {
          const p = eventosAno.filter(ev=>ev.presencas?.find(x=>x.nome===a.nome)?.presenca==='presente').length;
          freqPorAluno[a.nome] = eventosAno.length>0 ? Math.round((p/eventosAno.length)*100) : 0;
        });
        const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
        return {
          todosAlunos, freqPorAluno,
          mediaNivel:   avg(todosAlunos.map(a=>(Number(a.leitura)||0)+(Number(a.metodo)||0))),
          mediaLeitura: avg(todosAlunos.map(a=>Number(a.leitura)||0)),
          mediaMetodo:  avg(todosAlunos.map(a=>Number(a.metodo)||0)),
          mediaFreq:    avg(todosAlunos.map(a=>freqPorAluno[a.nome]||0))
        };
      } catch(e) { console.warn('Erro turma:',e); return null; }
    }

    function calcularRankings(aluno, dadosTurma, freqAnual) {
      if (!dadosTurma) return null;
      const { todosAlunos, freqPorAluno } = dadosTurma;
      const nA = (Number(aluno.leitura)||0)+(Number(aluno.metodo)||0);
      const lA =  Number(aluno.leitura)||0;
      return {
        total: todosAlunos.length,
        rankNivel:   todosAlunos.map(a=>(Number(a.leitura)||0)+(Number(a.metodo)||0)).filter(v=>v>nA).length+1,
        rankLeitura: todosAlunos.map(a=>Number(a.leitura)||0).filter(v=>v>lA).length+1,
        rankFreq:    todosAlunos.map(a=>freqPorAluno[a.nome]||0).filter(v=>v>freqAnual).length+1
      };
    }

    async function gerarRelatorio(id, mesChave) {
      try {
        const alunoSnap = await getDoc(doc(db,"alunos",id));
        if (!alunoSnap.exists()) throw new Error("Aluno não encontrado.");
        const aluno = { id: alunoSnap.id, ...alunoSnap.data() };

        const agora = new Date();
        const chave = mesChave || `${agora.getFullYear()}-${String(agora.getMonth()+1).padStart(2,"0")}`;
        const [anoRel, mesRel] = chave.split("-");
        const chaveAnterior    = getMesAnterior(chave);

        const snapEventos  = await getDocs(collection(db,"eventos"));
        const todosEventos = snapEventos.docs.map(d=>({id:d.id,...d.data()}));
        const eventosMes    = todosEventos.filter(e=>e.data?.startsWith(chave));
        const eventosAno    = todosEventos.filter(e=>e.data?.startsWith(`${anoRel}-`));
        const eventosMesAnt = todosEventos.filter(e=>e.data?.startsWith(chaveAnterior));

        const freqMes         = calcularFrequencia(eventosMes,    aluno.nome);
        const freqGeral       = calcularFrequencia(eventosAno,    aluno.nome);
        const freqMesAnterior = calcularFrequencia(eventosMesAnt, aluno.nome);

        const conquistasMes = regrasDeConquistas.filter(c =>
          c.condicao({...aluno, frequenciaMensal:{porcentagem:freqMes.percentual}})
        );
        const presencaDetalhada = eventosMes.map(ev => {
          const p = ev.presencas?.find(x=>x.nome===aluno.nome);
          return { data: formatarData(ev.data), status: p?.presenca==="presente" ? "Presente" : "Ausente" };
        }).sort((a,b)=>a.data.localeCompare(b.data));

        const snapshots    = await buscarSnapshots(id);
        const snapAtual    = snapshots.find(s=>s.chave===chave);
        const snapAnterior = snapshots.find(s=>s.chave===chaveAnterior);

        const leituraAtual    = snapAtual?.leitura    ?? aluno.leitura    ?? 1;
        const leituraAnterior = snapAnterior?.leitura ?? null;
        const leituraMeta     = leituraAtual + 2;
        const metodoAtual     = snapAtual?.metodo     ?? aluno.metodo     ?? 1;
        const metodoAnterior  = snapAnterior?.metodo  ?? null;
        const metodoMeta      = metodoAtual  + 2;

        const dadosTurma  = await buscarDadosTurma(anoRel);
        const rankings    = calcularRankings(aluno, dadosTurma, freqGeral.percentual);
        const evolucaoAluno = snapshots.slice(-6);

        renderizarRelatorio({
          aluno, anoRel, mesRel, chave,
          freqMes, freqGeral, freqMesAnterior,
          conquistasMes, presencaDetalhada,
          leituraAtual, leituraAnterior, leituraMeta,
          metodoAtual, metodoAnterior, metodoMeta,
          dadosTurma, rankings, evolucaoAluno
        });
      } catch (err) {
        console.error(err);
        document.getElementById("loader-relatorio").innerHTML =
          `<p style="color:#ef4444;">❌ Erro: ${err.message}</p>`;
      }
    }

    function calcularFrequencia(eventos, nomeAluno) {
      if (!eventos?.length) return { total:0, presencas:0, percentual:0 };
      const total     = eventos.length;
      const presencas = eventos.filter(ev=>ev.presencas?.find(x=>x.nome===nomeAluno)?.presenca==="presente").length;
      return { total, presencas, percentual: Math.round((presencas/total)*100) };
    }
    function getMesAnterior(chave) {
      const [ano,mes] = chave.split("-").map(Number);
      const d = new Date(ano, mes-2, 1);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    }
    function formatarData(iso) {
      if (!iso) return "-"; const [a,m,d] = iso.split("-"); return `${d}/${m}/${a}`;
    }
    function gerarStatus(atual, anterior) {
      if (anterior===null)      return { texto:"— Sem histórico", classe:"status-neutro" };
      if (atual>anterior)       return { texto:"▲ Evoluiu",       classe:"status-evoluiu" };
      if (atual===anterior)     return { texto:"● Estável",        classe:"status-estavel" };
      return                           { texto:"▼ Regrediu",      classe:"status-regrediu" };
    }
    function corBarra(pct) { return pct>=80?"fill-verde":pct>=50?"fill-amarelo":"fill-vermelho"; }
    function medalhaClasse(pos) { return pos===1?'ouro':pos===2?'prata':pos===3?'bronze':'normal'; }
    function medalhaTexto(pos)  { return pos===1?'🥇 1º':pos===2?'🥈 2º':pos===3?'🥉 3º':`${pos}º`; }
    function chipComp(val, media) {
      const d = val-media;
      if (d> 0.5) return {cls:'acima', chip:'chip-acima', txt:`▲ +${d.toFixed(1)}`};
      if (d<-0.5) return {cls:'abaixo',chip:'chip-abaixo',txt:`▼ ${d.toFixed(1)}`};
      return              {cls:'igual', chip:'chip-igual', txt:'● Média'};
    }

    function gerarAnalise(aluno,freqMes,freqGeral,freqMesAnterior,
                          leituraAtual,leituraAnterior,metodoAtual,metodoAnterior) {
      const nome  = aluno.nome ? aluno.nome.split(" ")[0] : "você";
      const lNome = aluno.leituraNome || "Bona";
      const mNome = aluno.metodoNome  || "Método";
      const p = [], pct = freqMes.percentual, pctAnt = freqMesAnterior.total>0?freqMesAnterior.percentual:null;
      if (freqMes.total===0) p.push(`${nome}, sem registros de chamada neste mês.`);
      else if (pct===100)    p.push(`${nome}, presença perfeita neste mês! Parabéns pelo comprometimento!`);
      else if (pct>=80) {
        if (pctAnt!==null&&pct>pctAnt)  p.push(`${nome}, frequência chegou a ${pct}% — ótimo! Mire 100%.`);
        else if (pctAnt!==null&&pct<pctAnt) p.push(`${nome}, frequência caiu a ${pct}%, mas ainda boa. Recupere o ritmo!`);
        else p.push(`${nome}, manteve ${pct}% de presença — muito bom!`);
      } else if (pct>=50) {
        if (pctAnt!==null&&pct>pctAnt)  p.push(`${nome}, frequência subiu para ${pct}% — no caminho certo. Busque 80%.`);
        else if (pctAnt!==null&&pct<pctAnt) p.push(`${nome}, frequência caiu para ${pct}%. Reverta essa tendência!`);
        else p.push(`${nome}, frequência em ${pct}%. Tente chegar a 80% no próximo mês.`);
      } else p.push(`${nome}, presença de ${pct}% precisa de atenção. Meta: 80% no próximo mês.`);

      if (leituraAnterior===null)              p.push(`Leitura na lição ${leituraAtual} (${lNome}) — avançar!`);
      else if (leituraAtual>leituraAnterior)   p.push(`Leitura avançou de ${leituraAnterior} → ${leituraAtual} (${lNome}) — excelente!`);
      else if (leituraAtual===leituraAnterior) p.push(`Lição ${leituraAtual} (${lNome}) há 2 meses. Desafie-se a avançar!`);
      else p.push(`Leitura recuou para ${leituraAtual} (${lNome}). Redobrar atenção ao solfejo.`);

      if (metodoAnterior===null)               p.push(`Método na unid. ${metodoAtual} (${mNome}) — cada lição é um passo real.`);
      else if (metodoAtual>metodoAnterior)     p.push(`Método avançou ${metodoAnterior} → ${metodoAtual} (${mNome}) — notável!`);
      else if (metodoAtual===metodoAnterior)   p.push(`Unid. ${metodoAtual} (${mNome}) por 2 meses. Avance!`);
      else p.push(`Método recuou para ${metodoAtual}. Retome com calma.`);

      if (freqGeral.total>0 && freqGeral.percentual!==pct) {
        if (freqGeral.percentual>=85)      p.push(`Comprometimento anual excelente: ${freqGeral.percentual}%!`);
        else if (freqGeral.percentual>=60) p.push(`Comprometimento anual: ${freqGeral.percentual}% — bom, mas pode crescer.`);
        else p.push(`Comprometimento anual: ${freqGeral.percentual}% — aumentar presença reflete no crescimento.`);
      }
      return p.join(" ");
    }

    function renderizarRelatorio({
      aluno, anoRel, mesRel, chave,
      freqMes, freqGeral, freqMesAnterior,
      conquistasMes, presencaDetalhada,
      leituraAtual, leituraAnterior, leituraMeta,
      metodoAtual, metodoAnterior, metodoMeta,
      dadosTurma, rankings, evolucaoAluno
    }) {
      const nomeMes = MESES[mesRel] || mesRel;
      const stPresenca = freqMes.total===0
        ? {texto:"— Sem chamadas",classe:"status-neutro"}
        : gerarStatus(freqMes.percentual, freqMesAnterior.total>0?freqMesAnterior.percentual:null);
      const stLeitura = gerarStatus(leituraAtual, leituraAnterior);
      const stMetodo  = gerarStatus(metodoAtual,  metodoAnterior);
      const metaPresenca   = freqMes.percentual>=80?100:80;
      const clsAntLeitura  = (leituraAnterior!==null&&leituraAtual>leituraAnterior)?"evoluiu":"";
      const clsAntMetodo   = (metodoAnterior!==null&&metodoAtual>metodoAnterior)?"evoluiu":"";
      const analise = gerarAnalise(aluno,freqMes,freqGeral,freqMesAnterior,
        leituraAtual,leituraAnterior,metodoAtual,metodoAnterior);

      // ── Painel Turma ──────────────────────────────────────────────────────
      let painelTurmaHTML = '';
      if (rankings && dadosTurma) {
        const {rankNivel,rankLeitura,rankFreq,total} = rankings;
        const {mediaNivel,mediaLeitura,mediaFreq}    = dadosTurma;
        const nivelAluno = (Number(aluno.leitura)||0)+(Number(aluno.metodo)||0);

        const mkRank = (label,pos,cls) => {
          const mc=medalhaClasse(pos);
          return `<div class="rank-mini-card ${cls}">
            <div class="rank-mini-label">${label}</div>
            <div class="rank-mini-pos ${mc}">${pos}º</div>
            <div class="rank-mini-total">de ${total}</div>
            <span class="rank-mini-badge rmb-${mc}">${medalhaTexto(pos)}</span>
          </div>`;
        };
        const mkComp = (label,val,media,unid) => {
          const c=chipComp(val,media);
          return `<div class="comp-mini-card">
            <div class="comp-mini-label">${label}</div>
            <div class="comp-mini-row">
              <span class="comp-mini-voce ${c.cls}">${val}${unid}</span>
              <span class="comp-mini-vs">vs</span>
              <span class="comp-mini-media">${media.toFixed(1)}${unid}</span>
            </div>
            <span class="comp-chip-sm ${c.chip}">${c.txt}</span>
          </div>`;
        };
        const grafico = evolucaoAluno.length>=2
          ? `<div class="evolucao-chart-wrap"><canvas id="mini-chart-evolucao"></canvas></div>`
          : `<div class="evolucao-sem-dados">Histórico insuficiente (mín. 2)</div>`;

        painelTurmaHTML = `
          <div class="rel-titulo-secao">🏅 Turma &amp; Evolução</div>
          <div class="painel-turma">
            <div class="painel-turma-esq">
              <div class="painel-bloco">
                <div class="painel-bloco-label">🏅 Ranking na Turma</div>
                <div class="rank-mini-grid">
                  ${mkRank('Nível Geral',rankNivel,'rmc-blue')}
                  ${mkRank('Leitura',rankLeitura,'rmc-green')}
                  ${mkRank('Frequência',rankFreq,'rmc-yellow')}
                </div>
              </div>
              <div class="painel-bloco">
                <div class="painel-bloco-label">📊 Você vs Turma</div>
                <div class="comp-mini-grid">
                  ${mkComp('Nível',nivelAluno,mediaNivel,'pts')}
                  ${mkComp('Leitura',Number(aluno.leitura)||0,mediaLeitura,'pts')}
                  ${mkComp('Frequência',freqGeral.percentual,mediaFreq,'%')}
                </div>
              </div>
            </div>
            <div class="painel-turma-dir">
              <div class="evolucao-titulo">📈 Evolução — Últimos Meses</div>
              ${grafico}
            </div>
          </div>`;
      }

      // ── Painel Inferior: comprometimento + conquistas | análise ──────────
      const conquistasHTML = conquistasMes.length
        ? conquistasMes.map(c=>`<div class="conquista-item ${c.raridade||''}">
            <span class="conquista-icone">${c.icone}</span>
            <div class="conquista-info"><strong>${c.titulo}</strong><span>${c.descricao}</span></div>
          </div>`).join("")
        : `<span class="sem-conquistas">Nenhuma conquista neste mês.</span>`;

      const painelInferiorHTML = `
        <div class="rel-titulo-secao">⚡ Comprometimento &amp; 🏆 Conquistas</div>
        <div class="painel-inferior">
          <div class="painel-inf-esq">
            <div class="painel-bloco">
              <div class="painel-bloco-label">⚡ Comprometimento</div>
              <div class="comp-freq-grid">
                <div class="comp-freq-card">
                  <div class="comp-freq-label">${nomeMes}</div>
                  <div class="comp-freq-valor">${freqMes.total===0?'—':freqMes.percentual+'%'}</div>
                  <div class="comp-freq-detalhe">${freqMes.total===0?'Sem chamadas':freqMes.presencas+'/'+freqMes.total+' aulas'}</div>
                  <div class="comp-barra-wrap"><div class="comp-barra-fill ${corBarra(freqMes.percentual)}" style="width:${freqMes.percentual}%"></div></div>
                </div>
                <div class="comp-freq-card">
                  <div class="comp-freq-label">${anoRel} (ano)</div>
                  <div class="comp-freq-valor">${freqGeral.percentual}%</div>
                  <div class="comp-freq-detalhe">${freqGeral.presencas}/${freqGeral.total} aulas</div>
                  <div class="comp-barra-wrap"><div class="comp-barra-fill fill-azul" style="width:${freqGeral.percentual}%"></div></div>
                </div>
              </div>
            </div>
            <div class="conquistas-bloco">
              <div class="painel-bloco-label">🏆 Conquistas do Mês</div>
              <div class="conquistas-compact">${conquistasHTML}</div>
            </div>
          </div>
          <div class="painel-inf-dir">
            <div class="analise-titulo">📝 Análise do Desempenho</div>
            <div class="analise-texto">${analise}</div>
          </div>
        </div>`;

      // ── Tabela de presença ───────────────────────────────────────────────
      const presencaHTML = presencaDetalhada.length
        ? presencaDetalhada.map(p=>`<tr><td>${p.data}</td><td class="${p.status==='Presente'?'td-presente':'td-ausente'}">${p.status}</td></tr>`).join("")
        : `<tr><td colspan="2" style="color:#94a3b8;font-style:italic;">Sem registros neste mês.</td></tr>`;

      const html = `
        <div class="rel-header">
          <img src="${aluno.foto||'https://via.placeholder.com/80'}" class="rel-foto" alt="${aluno.nome}" onerror="this.src='https://via.placeholder.com/80'">
          <div class="rel-info">
            <h1>${aluno.nome}</h1>
            <p class="instrumento">🎵 ${aluno.instrumento||"Instrumento não definido"}</p>
            <p class="periodo">📅 Relatório de ${nomeMes} / ${anoRel}</p>
          </div>
          <div class="rel-logo">
            <div class="titulo-sistema">Filhos de Asafe</div>
            <div class="subtitulo-sistema">Sistema de Desempenho Musical</div>
          </div>
        </div>

        <div class="rel-titulo-secao">📈 Indicadores de Progresso</div>
        <div class="indicadores-grid">
          <div class="indicador-card">
            <h4>Presença no Mês</h4>
            <div class="indicador-valores">
              <div class="ind-val">Anterior<span>${freqMesAnterior.total>0?freqMesAnterior.percentual+'%':'—'}</span></div>
              <div class="ind-val atual">Atual<span>${freqMes.total===0?'—':freqMes.percentual+'%'}</span></div>
              <div class="ind-val">Meta<span>${freqMes.total===0?'—':metaPresenca+'%'}</span></div>
            </div>
            <span class="indicador-status ${stPresenca.classe}">${stPresenca.texto}</span>
          </div>
          <div class="indicador-card">
            <h4>Leitura (${aluno.leituraNome||'Bona'})</h4>
            <div class="indicador-valores">
              <div class="ind-val ${clsAntLeitura}">Anterior<span>${leituraAnterior!==null?'Nível '+leituraAnterior:'—'}</span></div>
              <div class="ind-val atual">Atual<span>Nível ${leituraAtual}</span></div>
              <div class="ind-val">Meta<span>Nível ${leituraMeta}</span></div>
            </div>
            <span class="indicador-status ${stLeitura.classe}">${stLeitura.texto}</span>
          </div>
          <div class="indicador-card">
            <h4>Método (${aluno.metodoNome||'Método'})</h4>
            <div class="indicador-valores">
              <div class="ind-val ${clsAntMetodo}">Anterior<span>${metodoAnterior!==null?'Unid. '+metodoAnterior:'—'}</span></div>
              <div class="ind-val atual">Atual<span>Unid. ${metodoAtual}</span></div>
              <div class="ind-val">Meta<span>Unid. ${metodoMeta}</span></div>
            </div>
            <span class="indicador-status ${stMetodo.classe}">${stMetodo.texto}</span>
          </div>
        </div>

        ${painelTurmaHTML}
        ${painelInferiorHTML}

        <div class="rel-titulo-secao">📋 Presença — ${nomeMes} ${anoRel}</div>
        <div class="presenca-section">
          <table>
            <thead><tr><th>Data</th><th>Status</th></tr></thead>
            <tbody>${presencaHTML}</tbody>
          </table>
        </div>

        <div class="rel-footer">
          <div>
            <div>Gerado em: ${new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'})}</div>
            <div style="margin-top:3px;">Sistema Filhos de Asafe — Relatório de Progresso Mensal</div>
          </div>
          <div class="assinatura-linha">Professor Responsável</div>
        </div>
      `;

      const pagina = document.getElementById("pagina-relatorio");
      pagina.innerHTML = html;
      pagina.style.display = "block";
      document.getElementById("loader-relatorio").style.display = "none";

      if (evolucaoAluno.length>=2) {
        const ctx = document.getElementById('mini-chart-evolucao');
        if (ctx) new Chart(ctx, {
          type: 'line',
          data: {
            labels: evolucaoAluno.map(s => {
              const [y,m] = s.chave.split('-');
              return NOMES_MES_CURTO[Number(m)-1]+'/'+y.slice(2);
            }),
            datasets: [
              {label:'Nível Total', data:evolucaoAluno.map(s=>(Number(s.leitura)||0)+(Number(s.metodo)||0)), borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,0.1)', pointBackgroundColor:'#3b82f6', tension:0.4, fill:true,  pointRadius:4},
              {label:'Leitura',     data:evolucaoAluno.map(s=>Number(s.leitura)||0), borderColor:'#22c55e', backgroundColor:'transparent', pointBackgroundColor:'#22c55e', tension:0.4, fill:false, pointRadius:3, borderDash:[4,3]},
              {label:'Método',      data:evolucaoAluno.map(s=>Number(s.metodo)||0),  borderColor:'#f59e0b', backgroundColor:'transparent', pointBackgroundColor:'#f59e0b', tension:0.4, fill:false, pointRadius:3, borderDash:[4,3]}
            ]
          },
          options: {
            responsive:true, maintainAspectRatio:false,
            plugins: {
              legend:  {labels:{color:'#475569',font:{size:9},boxWidth:9,padding:6}},
              tooltip: {mode:'index',intersect:false}
            },
            scales: {
              x: {ticks:{color:'#64748b',font:{size:8}}, grid:{color:'rgba(0,0,0,0.04)'}},
              y: {beginAtZero:true, ticks:{color:'#64748b',font:{size:8}}, grid:{color:'rgba(0,0,0,0.04)'}}
            }
          }
        });
      }
    }
  </script>
</body>
</html>
