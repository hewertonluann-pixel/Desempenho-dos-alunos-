<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca - Orquestra Filhos de Asafe</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="loader.css">
    <link rel="stylesheet" href="bottom-nav.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap">
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #020617;
            --card: #0b1220;
            --card-alt: #0f172a;
            --border: rgba(56, 189, 248, 0.25);
            --ink: #e2e8f0;
            --muted: #94a3b8;
            --azul: #0ea5e9;
            --azul-escuro: #1e293b;
            --azul-suave: rgba(56, 189, 248, 0.2);
            --verde: #22c55e;
            --vermelho: #ef4444;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top, #0f172a 0%, #020617 45%, #000 100%);
            color: var(--ink);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .nav-header {
            background: rgba(11, 18, 32, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-header h1 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--azul);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-role-selector {
            background: var(--card-alt);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 5px 10px;
            color: var(--azul);
            font-size: 0.8rem;
            outline: none;
        }

        /* TODO: Adicionar todo o CSS da biblioteca aqui... */
        /* Por questões de espaço, vou criar arquivos separados */
    </style>
</head>
<body>
    <!-- HEADER COM FOTO, NOME DO GRUPO E BOTÃO SAIR (visível apenas em mobile) -->
    <header class="top-header">
        <img id="headerUserPhoto" 
             src="https://via.placeholder.com/150" 
             alt="Foto do usuário" 
             class="header-user-photo"
             title="Ver meu perfil">
        
        <h1 class="group-name">Filhos de Asafe</h1>
        
        <button id="headerLogoutBtn" class="header-logout-btn" title="Sair da conta">
            <i class="fas fa-sign-out-alt"></i>
            <span>Sair</span>
        </button>
    </header>

    <!-- Conteúdo da biblioteca aqui -->
    <div class="container">
        <h1 style="text-align:center; margin-top:40px;">📚 Biblioteca</h1>
        <p style="text-align:center; color:var(--muted);">Selecione uma coleção para acessar os documentos</p>
        <!-- Resto do conteúdo -->
    </div>

    <!-- BOTTOM NAVIGATION BAR (visível apenas em mobile) -->
    <nav class="bottom-nav">
        <a href="aluno.html" class="nav-item" data-page="home">
            <i class="fas fa-home nav-icon"></i>
            <span class="nav-label">Home</span>
        </a>
        
        <a href="painel-social.html" class="nav-item" data-page="comunidade">
            <i class="fas fa-users nav-icon"></i>
            <span class="nav-label">Comunidade</span>
        </a>
        
        <a href="biblioteca.html" class="nav-item active" data-page="biblioteca">
            <i class="fas fa-book nav-icon"></i>
            <span class="nav-label">Biblioteca</span>
        </a>
        
        <a href="atividades.html" class="nav-item" data-page="atividades">
            <i class="fas fa-clipboard-list nav-icon"></i>
            <span class="nav-label">Atividades</span>
        </a>
        
        <a href="professor.html" class="nav-item" data-page="professor" id="navProfessor" style="display:none;">
            <i class="fas fa-chalkboard-teacher nav-icon"></i>
            <span class="nav-label">Professor</span>
        </a>
    </nav>

    <script src="loader.js"></script>
    <script type="module" src="script_biblioteca.js"></script>
    <script type="module" src="navegacao.js"></script>
    <script type="module" src="bottom-nav.js"></script>
</body>
</html>
