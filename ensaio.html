<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chamada do dia - Orquestra Filhos de Asafe</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:           #030712;
      --card:         #0d1525;
      --card-alt:     #060d1a;
      --border:       #1a2744;
      --ink:          #e2e8f0;
      --muted:        #8899b8;
      --faint:        #3d5070;
      --accent:       #22c55e;
      --accent-soft:  rgba(34,197,94,0.14);
      --accent-glow:  rgba(34,197,94,0.30);
      --danger:       #f87171;
      --danger-soft:  rgba(248,113,113,0.14);
      --danger-glow:  rgba(248,113,113,0.30);
      --sky:          #38bdf8;
      --sky-soft:     rgba(56,189,248,0.15);
      --chip-bg:      #0f1e38;
      --chip-ink:     #94a3b8;
      --header-h:     64px;
      --footer-h:     68px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #030712;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(56,189,248,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(34,197,94,0.05) 0%, transparent 60%);
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .page-header {
      position: sticky;
      top: 0;
      z-index: 40;
      background: rgba(3,7,18,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #1a3a5e 0%, #0d1f35 100%);
      border: 1px solid rgba(56,189,248,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }

    .header-info { flex: 1; min-width: 0; }
    .header-title {
      font-size: 1rem; font-weight: 700;
      color: #f1f5f9;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .header-sub {
      font-size: 0.72rem; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .data-evento {
      display: flex; align-items: center; gap: 6px;
      background: #0f1e38;
      border: 1px solid #1e3a5f;
      border-radius: 10px;
      padding: 5px 10px;
      flex-shrink: 0;
    }
    .data-evento span { font-size: 0.75rem; color: var(--muted); font-weight: 500; }
    #inputData {
      background: transparent;
      border: none;
      color: var(--sky);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0;
      cursor: pointer;
      outline: none;
      font-family: inherit;
      width: 100px;
    }
    #inputData::-webkit-calendar-picker-indicator { filter: invert(0.5) sepia(1) hue-rotate(175deg); cursor: pointer; }

    /* ── WRAP principal ── */
    .wrap {
      flex: 1;
      padding: 14px 12px calc(var(--footer-h) + 16px);
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Contador de status ── */
    .status-bar {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .status-pill {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .status-pill .pill-val {
      font-size: 1.3rem; font-weight: 700;
    }
    .status-pill .pill-lbl {
      font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--muted); font-weight: 500;
    }
    .status-pill.pres .pill-val { color: var(--accent); }
    .status-pill.aus  .pill-val { color: var(--danger); }
    .status-pill.pend .pill-val { color: #facc15; }
    .status-pill.tot  .pill-val { color: var(--sky); }

    .info { font-size: 0.75rem; color: var(--faint); text-align: center; }

    .lista-alunos {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    /* ── Scroll btn ── */
    #btnScroll {
      position: fixed;
      right: 14px;
      bottom: calc(var(--footer-h) + 14px);
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(14,165,233,0.5);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.25s;
      opacity: 0; pointer-events: none;
    }
    #btnScroll.visivel { opacity: 1; pointer-events: auto; }
    #btnScroll:active  { transform: scale(0.91); }
    #btnScroll:hover   { box-shadow: 0 6px 22px rgba(14,165,233,0.7); }

    /* ── Cards de aluno ── */
    .container-aluno {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.45);
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.12s ease, border-color 0.12s ease, background 0.12s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .container-aluno.vazio   { background: var(--card-alt); border-color: #111f38; }
    .container-aluno.presente {
      background: linear-gradient(135deg, rgba(34,197,94,0.12) 0%, var(--card) 60%);
      border-color: rgba(34,197,94,0.55);
      box-shadow: 0 4px 18px rgba(34,197,94,0.22);
    }
    .container-aluno.ausente {
      background: linear-gradient(135deg, rgba(248,113,113,0.12) 0%, var(--card) 60%);
      border-color: rgba(248,113,113,0.55);
      box-shadow: 0 4px 18px rgba(248,113,113,0.20);
    }
    .container-aluno:active { transform: scale(0.975); }
    .container-aluno.focado { outline: 2px solid rgba(56,189,248,0.6); outline-offset: 1px; }

    /* Foto */
    .foto-aluno {
      width: 48px; height: 48px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      border: 2px solid #1e3a5f;
      background: #060d1a;
      display: flex; align-items: center; justify-content: center;
    }
    .container-aluno.presente .foto-aluno { border-color: rgba(34,197,94,0.5); }
    .container-aluno.ausente  .foto-aluno { border-color: rgba(248,113,113,0.5); }
    .foto-aluno img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .foto-placeholder { font-size: 1.3rem; color: #3d5070; }

    /* Dados */
    .dados-aluno { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .nome        { font-weight: 600; font-size: 0.95rem; color: #f1f5f9; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    .instrumento { font-size: 0.78rem; color: var(--muted); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    .status-linha { display: flex; justify-content: space-between; align-items: center; margin-top: 3px; }

    .chip-status {
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 0.67rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      background: var(--chip-bg);
      color: var(--chip-ink);
      border: 1px solid #1e3a5f;
    }
    .chip-status.presente { background: var(--accent-soft); color: #86efac; border-color: rgba(34,197,94,0.4); }
    .chip-status.ausente  { background: var(--danger-soft); color: #fca5a5; border-color: rgba(248,113,113,0.4); }

    /* Ícone de ação (substitui "Toque para mudar") */
    .icone-acao {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
      opacity: 0.4;
      transition: opacity 0.15s;
      background: rgba(255,255,255,0.04);
      flex-shrink: 0;
    }
    .container-aluno:hover .icone-acao,
    .container-aluno.focado .icone-acao { opacity: 0.7; }

    /* ── Observações ── */
    .observacoes-area {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
    }
    .label-observacoes {
      font-size: 0.76rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      display: block;
    }
    textarea {
      width: 100%;
      min-height: 72px;
      border-radius: 10px;
      border: 1px solid #1a2744;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 0.85rem;
      resize: vertical;
      background: #060d1a;
      color: var(--ink);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    textarea::placeholder { color: #3d5070; }
    textarea:focus {
      outline: none;
      border-color: var(--sky);
      box-shadow: 0 0 0 2px rgba(56,189,248,0.15);
    }

    /* ── Footer ── */
    .footer-acoes {
      position: fixed; left: 0; right: 0; bottom: 0;
      height: var(--footer-h);
      padding: 10px 12px 12px;
      background: linear-gradient(to top, rgba(3,7,18,0.97) 60%, transparent);
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      z-index: 50;
    }
    .footer-acoes button {
      flex: 1;
      max-width: 220px;
      height: 44px;
      padding: 0 12px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.88rem;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    .footer-acoes button:active { transform: scale(0.96); }
    .btn-salvar   { background: var(--accent); color: #022c22; box-shadow: 0 6px 20px rgba(34,197,94,0.45); }
    .btn-salvar[disabled] { opacity: 0.55; cursor: default; }
    .btn-cancelar { background: #0f1e38; color: #94a3b8; border: 1px solid #1e3a5f; box-shadow: none; }
    .btn-exportar { background: #0ea5e9; color: #fff; box-shadow: 0 6px 20px rgba(14,165,233,0.35); }

    .loader { text-align: center; font-size: 0.8rem; color: var(--muted); padding: 6px 0; }
  </style>
</head>
<body>

  <!-- HEADER FIXO -->
  <header class="page-header">
    <div class="header-logo">📋</div>
    <div class="header-info">
      <div class="header-title">Chamada</div>
      <div class="header-sub">Orquestra Filhos de Asafe</div>
    </div>
    <div class="data-evento">
      <span>📅</span>
      <input type="date" id="inputData" title="Data da chamada">
    </div>
  </header>

  <div class="wrap">

    <!-- Barra de status com contadores -->
    <div class="status-bar" id="statusBar">
      <div class="status-pill pres">
        <span class="pill-val" id="cntPresente">0</span>
        <span class="pill-lbl">Presentes</span>
      </div>
      <div class="status-pill aus">
        <span class="pill-val" id="cntAusente">0</span>
        <span class="pill-lbl">Ausentes</span>
      </div>
      <div class="status-pill pend">
        <span class="pill-val" id="cntPendente">0</span>
        <span class="pill-lbl">Pendentes</span>
      </div>
      <div class="status-pill tot">
        <span class="pill-val" id="cntTotal">0</span>
        <span class="pill-lbl">Total</span>
      </div>
    </div>

    <div class="info" id="infoCarregando">Carregando alunos...</div>
    <div class="lista-alunos" id="painelAlunos"></div>

    <div class="observacoes-area">
      <label class="label-observacoes" for="observacoes">Observações</label>
      <textarea id="observacoes" placeholder="Ex.: Ensaio geral, preparação para apresentação na praça."></textarea>
    </div>

    <div class="loader" id="loader" style="display:none;">Salvando chamada e atualizando frequências...</div>
  </div>

  <!-- Botão flutuante de scroll -->
  <button id="btnScroll" title="Ir para o fim / topo">↓</button>

  <div class="footer-acoes">
    <button id="btnCancelar" class="btn-cancelar">✕ Cancelar</button>
    <button id="btnSalvar"   class="btn-salvar">💾 Salvar</button>
    <button id="btnExportar" class="btn-exportar">🖼️ Exportar</button>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection, getDocs, getDoc, addDoc, updateDoc, doc
    } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";
    import { exportarChamada3Colunas } from "./exportar-chamada.js";

    const params  = new URLSearchParams(window.location.search);
    let eventoId  = params.get("id") || null;
    let alunos    = [];

    const painel         = document.getElementById("painelAlunos");
    const inputData      = document.getElementById("inputData");
    const infoCarregando = document.getElementById("infoCarregando");
    const observacoesEl  = document.getElementById("observacoes");
    const btnSalvar      = document.getElementById("btnSalvar");
    const btnCancelar    = document.getElementById("btnCancelar");
    const btnExportar    = document.getElementById("btnExportar");
    const loader         = document.getElementById("loader");
    const btnScroll      = document.getElementById("btnScroll");

    btnExportar.addEventListener("click", exportarChamada3Colunas);

    /* ── Scroll btn ── */
    let scrollDirecao = "baixo";
    window.addEventListener("scroll", () => {
      const scrollY   = window.scrollY;
      const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      if (maxScroll > 100) btnScroll.classList.add("visivel");
      else                  btnScroll.classList.remove("visivel");
      if (scrollY < maxScroll * 0.5) {
        btnScroll.textContent = "↓"; btnScroll.title = "Ir para o fim";
        scrollDirecao = "baixo";
      } else {
        btnScroll.textContent = "↑"; btnScroll.title = "Voltar ao topo";
        scrollDirecao = "cima";
      }
    });
    btnScroll.addEventListener("click", () => {
      window.scrollTo({ top: scrollDirecao === "baixo" ? document.documentElement.scrollHeight : 0, behavior: "smooth" });
    });

    /* ── Helpers ── */
    function hojeISO() {
      const br = new Intl.DateTimeFormat('pt-BR', {
        timeZone: 'America/Sao_Paulo', year: 'numeric', month: '2-digit', day: '2-digit'
      }).format(new Date());
      const [d, m, a] = br.split('/');
      return `${a}-${m}-${d}`;
    }

    function proximoEstado(atual) {
      if (!atual || atual === "") return "presente";
      if (atual === "presente")   return "ausente";
      return "";
    }

    /* ── Contadores ── */
    function atualizarContadores() {
      let pres = 0, aus = 0, pend = 0;
      alunos.forEach(a => {
        if      (a.presenca === "presente") pres++;
        else if (a.presenca === "ausente")  aus++;
        else                                pend++;
      });
      document.getElementById("cntPresente").textContent = pres;
      document.getElementById("cntAusente").textContent  = aus;
      document.getElementById("cntPendente").textContent = pend;
      document.getElementById("cntTotal").textContent    = alunos.length;
    }

    /* ── Carregamento ── */
    async function carregarAlunos() {
      const snap = await getDocs(collection(db, "alunos"));
      alunos = snap.docs
        .filter(d => d.data().ativo !== false)
        .map(d => ({ id: d.id, nome: d.data().nome, instrumento: d.data().instrumento || "", foto: d.data().foto || "", presenca: "" }))
        .sort((a, b) => a.nome.localeCompare(b.nome, "pt-BR"));
    }

    async function carregarEvento() {
      if (!eventoId) { inputData.value = hojeISO(); return; }
      const snap = await getDoc(doc(db, "eventos", eventoId));
      if (snap.exists()) {
        const dados = snap.data();
        inputData.value = dados.data || hojeISO();
        observacoesEl.value = dados.observacoes || "";
        (dados.presencas || []).forEach(p => {
          const a = alunos.find(al => al.nome === p.nome);
          if (a) a.presenca = p.presenca;
        });
      } else { inputData.value = hojeISO(); }
    }

    /* ── Render ── */
    function atualizarCard(card, aluno) {
      card.classList.remove("presente", "ausente", "vazio");
      const chip  = card.querySelector(".chip-status");
      const icone = card.querySelector(".icone-acao");
      if (aluno.presenca === "presente") {
        card.classList.add("presente");
        chip.textContent = "Presente"; chip.className = "chip-status presente";
        if (icone) icone.textContent = "✓";
      } else if (aluno.presenca === "ausente") {
        card.classList.add("ausente");
        chip.textContent = "Ausente"; chip.className = "chip-status ausente";
        if (icone) icone.textContent = "✕";
      } else {
        card.classList.add("vazio");
        chip.textContent = "Pendente"; chip.className = "chip-status";
        if (icone) icone.textContent = "○";
      }
      atualizarContadores();
    }

    function focarProximo(idx) {
      const cards = document.querySelectorAll(".container-aluno");
      cards[idx].classList.remove("focado");
      if (idx + 1 < cards.length) {
        cards[idx + 1].classList.add("focado");
        cards[idx + 1].scrollIntoView({ behavior: "smooth", block: "center" });
      }
    }

    function renderizar() {
      painel.innerHTML = "";
      alunos.forEach((aluno, idx) => {
        const card = document.createElement("div");
        card.className = "container-aluno"; card.dataset.index = idx;

        // Foto
        const fw = document.createElement("div"); fw.className = "foto-aluno";
        if (aluno.foto) {
          const img = document.createElement("img"); img.src = aluno.foto; img.alt = aluno.nome;
          fw.appendChild(img);
        } else {
          const sp = document.createElement("span"); sp.className = "foto-placeholder"; sp.textContent = "👤";
          fw.appendChild(sp);
        }

        // Dados
        const dd   = document.createElement("div");  dd.className  = "dados-aluno";
        const dn   = document.createElement("div");  dn.className  = "nome";        dn.textContent = aluno.nome;
        const di   = document.createElement("div");  di.className  = "instrumento"; di.textContent = aluno.instrumento;
        const sl   = document.createElement("div");  sl.className  = "status-linha";
        const chip = document.createElement("span"); chip.className = "chip-status"; chip.textContent = "Pendente";
        // Ícone circular no lugar do texto "Toque para mudar"
        const icone = document.createElement("span"); icone.className = "icone-acao"; icone.textContent = "○";

        sl.appendChild(chip); sl.appendChild(icone);
        dd.appendChild(dn); dd.appendChild(di); dd.appendChild(sl);
        card.appendChild(fw); card.appendChild(dd);

        card.addEventListener("click", () => {
          aluno.presenca = proximoEstado(aluno.presenca);
          atualizarCard(card, aluno);
          focarProximo(idx);
        });

        painel.appendChild(card);
        atualizarCard(card, aluno);
      });

      atualizarContadores();
      const primeiro = painel.querySelector('[data-index="0"]');
      if (primeiro) { primeiro.classList.add("focado"); primeiro.scrollIntoView({ behavior: "smooth", block: "center" }); }
    }

    async function inicializar() {
      infoCarregando.textContent = "Carregando alunos...";
      await carregarAlunos();
      await carregarEvento();
      infoCarregando.style.display = "none";
      renderizar();
    }

    /* ── Salvar ── */
    async function salvar() {
      try {
        btnSalvar.disabled = true; loader.style.display = "block";
        const data      = inputData.value || hojeISO();
        const obs       = observacoesEl.value.trim();
        const presencas = alunos.map(a => ({ nome: a.nome, instrumento: a.instrumento || "", presenca: a.presenca || "ausente" }));

        if (eventoId) await updateDoc(doc(db, "eventos", eventoId), { data, observacoes: obs, presencas });
        else { const nv = await addDoc(collection(db, "eventos"), { data, observacoes: obs, presencas }); eventoId = nv.id; }

        await recalcular(data);
        alert("✔️ Chamada salva e frequências atualizadas com sucesso!");
        window.location.href = "professor.html";
      } catch (e) { console.error(e); alert("Ocorreu um erro ao salvar a chamada."); }
      finally     { btnSalvar.disabled = false; loader.style.display = "none"; }
    }

    async function recalcular(dataISO) {
      const [ano, mes] = dataISO.split("-");
      const chaveMes   = `${ano}-${mes}`;
      const evSnap     = await getDocs(collection(db, "eventos"));
      const eventosMes = [];
      evSnap.forEach(d => { const dd = d.data(); if (dd.data?.startsWith(chaveMes)) eventosMes.push(dd); });
      const total = eventosMes.length; if (!total) return;

      const cont = {};
      eventosMes.forEach(ev => (ev.presencas||[]).forEach(p => {
        if (!p?.nome) return;
        cont[p.nome] = (cont[p.nome] || 0) + (p.presenca === "presente" ? 1 : 0);
      }));

      const siglas  = ["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"];
      const sigla   = siglas[parseInt(mes,10)-1] || mes;
      const alSnap  = await getDocs(collection(db,"alunos"));

      for (const ds of alSnap.docs) {
        const d = ds.data(); if (d.ativo===false) continue;
        const pres = cont[d.nome]||0;
        const pct  = Math.round((pres/total)*100);
        const hist = Array.isArray(d.presencas) ? [...d.presencas] : [];
        let reg    = hist.find(r => r.mes===chaveMes);
        if (!reg) { reg = { mes:chaveMes, totalEnsaios:total, presencasAluno:pres, percentual:pct }; hist.push(reg); }
        else      { reg.totalEnsaios=total; reg.presencasAluno=pres; reg.percentual=pct; }
        const freqAno = d.frequenciaAnual||{};
        freqAno[sigla] = { percentual:pct, totalEnsaios:total, presencasAluno:pres };
        await updateDoc(doc(db,"alunos",ds.id), {
          presencas: hist,
          frequenciaMensal: { porcentagem:pct, totalEventos:total, presencas:pres },
          frequenciaAnual: freqAno
        });
      }
    }

    btnSalvar.addEventListener("click", salvar);
    btnCancelar.addEventListener("click", () => {
      if (confirm("Cancelar alterações e voltar ao painel do professor?"))
        window.location.href = "professor.html";
    });

    inicializar();
  </script>
  <script type="module" src="navegacao.js"></script>
</body>
</html>
