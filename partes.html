<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partes - Biblioteca</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="loader.css">
    <link rel="stylesheet" href="bottom-nav.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #020617;
            --card: #0b1220;
            --card-alt: #0f172a;
            --border: rgba(56,189,248,0.25);
            --ink: #e2e8f0;
            --muted: #94a3b8;
            --azul: #0ea5e9;
            --azul-escuro: #1e293b;
            --azul-suave: rgba(56,189,248,0.2);
            --verde: #22c55e;
            --vermelho: #ef4444;
            --dourado: #facc15;
        }
        * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body {
            margin: 0;
            background: radial-gradient(circle at top, #0f172a 0%, #020617 45%, #000 100%);
            color: var(--ink);
            min-height: 100vh;
            padding-bottom: 90px;
        }

        /* ── HEADER ── */
        .partes-header {
            background: rgba(11,18,32,0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .btn-voltar {
            background: var(--azul-escuro);
            color: var(--azul);
            border: 1px solid var(--border);
            padding: 7px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            white-space: nowrap;
        }
        .btn-voltar:hover { border-color: var(--azul); }
        .partes-header h1 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--azul);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        /* ── SELETOR DE MODO ── */
        .user-role-selector {
            background: var(--card-alt);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 5px 10px;
            color: var(--azul);
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
            flex-shrink: 0;
            transition: border-color 0.2s;
        }
        .user-role-selector:hover  { border-color: var(--azul); }
        .user-role-selector:focus  { border-color: var(--azul); box-shadow: 0 0 0 2px rgba(14,165,233,0.2); }

        /* ── TOGGLE LISTA / GRADE ── */
        .view-toggle {
            display: flex;
            gap: 4px;
            background: var(--card-alt);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 3px;
            flex-shrink: 0;
        }
        .view-toggle button {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 5px 9px;
            border-radius: 6px;
            font-size: 0.85rem;
            line-height: 1;
            transition: all 0.18s;
        }
        .view-toggle button.active {
            background: var(--azul-escuro);
            color: var(--azul);
        }
        .view-toggle button:hover:not(.active) { color: var(--ink); }

        .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

        /* ── PLAYER DE ÁUDIO ── */
        .audio-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .audio-section i { font-size: 1.6rem; color: var(--verde); flex-shrink: 0; }
        .audio-section audio { flex: 1; height: 38px; border-radius: 6px; outline: none; }

        /* ── DOWNLOAD COMPLETO ── */
        .download-completo {
            background: var(--azul-suave);
            border: 1px solid var(--azul);
            border-radius: 12px;
            padding: 14px 20px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .download-completo span { color: var(--ink); font-size: 0.9rem; }
        .btn-dl-completo {
            background: var(--azul);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* ── LOADING ── */
        .loading-partes {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 60px 20px;
            color: var(--muted);
        }
        .loading-partes i { font-size: 2.5rem; color: var(--azul); animation: spin 1s linear infinite; }
        .loading-partes p { margin: 0; font-size: 0.95rem; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ══════════════════════════════════════════════
           MODO GRADE (padrão)
        ══════════════════════════════════════════════ */
        .partes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        /* ══════════════════════════════════════════════
           MODO LISTA
        ══════════════════════════════════════════════ */
        .partes-grid.view-list { display: flex; flex-direction: column; gap: 10px; }

        .partes-grid.view-list .grupo-card:not(.professor-mode) .grupo-thumb { display: none; }

        .partes-grid.view-list .grupo-card:not(.professor-mode) {
            flex-direction: row;
            align-items: center;
            border-radius: 12px;
            padding: 12px 16px;
            gap: 0;
            transform: none !important;
            overflow: visible;
        }
        .partes-grid.view-list .grupo-card:not(.professor-mode):hover {
            background: var(--azul-suave);
            border-color: var(--azul);
            box-shadow: none;
            transform: none !important;
        }
        .partes-grid.view-list .grupo-card:not(.professor-mode) .grupo-info::before {
            content: "\f1c1";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 1.4rem;
            color: var(--azul);
            flex-shrink: 0;
            align-self: center;
            margin-right: 12px;
        }
        .partes-grid.view-list .grupo-card:not(.professor-mode) .grupo-info {
            flex-direction: row;
            align-items: center;
            border-top: none;
            padding: 0;
            gap: 10px;
            flex: 1;
        }
        .partes-grid.view-list .grupo-card:not(.professor-mode) .grupo-nome-wrap {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .partes-grid.view-list .grupo-card:not(.professor-mode) .grupo-nome {
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .partes-grid.view-list .grupo-card:not(.professor-mode) .grupo-paginas-label {
            font-size: 0.7rem;
            white-space: nowrap;
        }
        /* Botões no modo lista: lado a lado compactos */
        .partes-grid.view-list .grupo-card:not(.professor-mode) .grupo-btns {
            flex-direction: row;
            gap: 6px;
            margin-top: 0;
        }
        .partes-grid.view-list .grupo-card:not(.professor-mode) .btn-visualizar-grupo,
        .partes-grid.view-list .grupo-card:not(.professor-mode) .btn-baixar-grupo {
            width: auto;
            padding: 7px 14px;
            margin-top: 0;
            flex-shrink: 0;
            white-space: nowrap;
        }
        /* Oculta label "Visualizar" no modo lista (só ícone) */
        .partes-grid.view-list .grupo-card:not(.professor-mode) .btn-visualizar-grupo .viz-label {
            display: none;
        }

        /* ══════════════════════════════════════════════
           MOBILE MODO LISTA
        ══════════════════════════════════════════════ */
        @media (max-width: 600px) {
            .partes-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
            .partes-grid.view-list { gap: 8px; }
            .grupo-card.professor-mode { grid-column: 1 / -1; }
            #barra-professor { gap: 8px; padding: 8px 12px; }
            #btn-novo-grupo, #btn-salvar-grupos { padding: 7px 14px; font-size: 0.8rem; }
            .partes-header h1 { font-size: 0.9rem; }
            .view-toggle button { padding: 5px 7px; font-size: 0.8rem; }

            .partes-grid.view-list .grupo-card:not(.professor-mode) {
                flex-direction: column;
                align-items: stretch;
                padding: 10px 12px;
                gap: 8px;
            }
            .partes-grid.view-list .grupo-card:not(.professor-mode) .grupo-info {
                flex-direction: column;
                gap: 8px;
            }
            .partes-grid.view-list .grupo-card:not(.professor-mode) .grupo-info::before {
                display: none;
            }
            .partes-grid.view-list .grupo-card:not(.professor-mode) .grupo-nome-wrap {
                display: flex;
                flex-direction: row;
                align-items: flex-start;
                gap: 10px;
                width: 100%;
            }
            .partes-grid.view-list .grupo-card:not(.professor-mode) .grupo-nome-wrap::before {
                content: "\f1c1";
                font-family: "Font Awesome 6 Free";
                font-weight: 900;
                font-size: 1.3rem;
                color: var(--azul);
                flex-shrink: 0;
                margin-top: 2px;
            }
            .partes-grid.view-list .grupo-card:not(.professor-mode) .grupo-nome {
                display: block;
                white-space: normal;
                word-break: break-word;
                font-size: 0.92rem;
                line-height: 1.3;
                flex: 1;
            }
            .partes-grid.view-list .grupo-card:not(.professor-mode) .grupo-paginas-label {
                display: none;
            }
            /* Botões em linha no mobile lista */
            .partes-grid.view-list .grupo-card:not(.professor-mode) .grupo-btns {
                flex-direction: row;
                gap: 6px;
            }
            .partes-grid.view-list .grupo-card:not(.professor-mode) .btn-visualizar-grupo,
            .partes-grid.view-list .grupo-card:not(.professor-mode) .btn-baixar-grupo {
                flex: 1;
                padding: 9px 0;
                font-size: 0.82rem;
            }
            /* No mobile lista oculta label do visualizar também */
            .partes-grid.view-list .grupo-card:not(.professor-mode) .btn-visualizar-grupo .viz-label {
                display: none;
            }
        }

        /* ── CARD ALUNO (grade) ── */
        .grupo-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
        }
        .grupo-card:hover {
            border-color: var(--azul);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .grupo-thumb {
            width: 100%;
            background: #fff;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .grupo-thumb canvas { width: 100% !important; height: auto !important; display: block; }
        .thumb-loading {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 8px; background: #0f172a;
            color: var(--muted); font-size: 0.75rem;
        }
        .thumb-loading i { font-size: 1.8rem; color: var(--azul); animation: spin 1s linear infinite; }
        .thumb-error {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            width: 100%; min-height: 200px;
            gap: 8px; color: var(--muted); font-size: 0.75rem;
            background: #0f172a;
        }
        .thumb-error i { font-size: 2.5rem; color: var(--azul); }
        .grupo-info {
            padding: 12px 14px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }
        .grupo-nome-wrap { display: flex; align-items: center; gap: 6px; }
        .grupo-nome {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--ink);
            flex: 1;
            word-break: break-word;
        }
        .grupo-paginas-label {
            font-size: 0.72rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ── GRUPO-BTNS: contêiner dos dois botões ── */
        .grupo-btns {
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-top: auto;
        }

        /* Botão Visualizar */
        .btn-visualizar-grupo {
            background: var(--azul-suave);
            color: var(--azul);
            border: 1px solid var(--azul);
            padding: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 700;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .btn-visualizar-grupo:hover { background: var(--azul); color: white; }

        /* Botão Baixar */
        .btn-baixar-grupo {
            background: var(--azul-escuro);
            color: var(--azul);
            border: 1px solid var(--border);
            padding: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 700;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .btn-baixar-grupo:hover { background: var(--azul); color: white; border-color: var(--azul); }
        .btn-baixar-grupo:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── CARD PROFESSOR ── */
        .grupo-card.professor-mode { border-color: rgba(250,204,21,0.25); grid-column: 1 / -1; }
        .grupo-card.professor-mode:hover { border-color: var(--dourado); transform: none; }
        .partes-grid.view-list .grupo-card.professor-mode { width: 100%; }
        .grupo-prof-header {
            padding: 12px 16px; border-bottom: 1px solid rgba(250,204,21,0.15);
            display: flex; align-items: center; gap: 10px; background: rgba(250,204,21,0.04);
        }
        .grupo-prof-nome { font-weight: 700; font-size: 1rem; color: var(--ink); flex: 1; }
        .btn-renomear-grupo { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px 6px; border-radius: 4px; font-size: 0.82rem; transition: color 0.2s; }
        .btn-renomear-grupo:hover { color: var(--dourado); }
        .btn-excluir-grupo { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px 6px; border-radius: 4px; font-size: 0.82rem; transition: color 0.2s; }
        .btn-excluir-grupo:hover { color: var(--vermelho); }
        .grupo-thumbs-row { padding: 14px 16px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; border-bottom: 1px solid var(--border); }
        .grupo-mini-wrap { position: relative; width: 80px; flex-shrink: 0; }
        .grupo-mini-thumb { width: 80px; height: 110px; background: #fff; border-radius: 6px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }
        .grupo-mini-thumb canvas { width: 100% !important; height: auto !important; }
        .grupo-mini-label { font-size: 0.65rem; color: var(--muted); text-align: center; margin-top: 3px; }
        .btn-remover-pag { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: var(--vermelho); color: white; border: none; cursor: pointer; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; font-weight: 700; transition: transform 0.15s; z-index: 2; }
        .btn-remover-pag:hover { transform: scale(1.2); }
        .btn-adicionar-pag { width: 80px; height: 110px; border: 2px dashed rgba(56,189,248,0.35); border-radius: 6px; background: none; color: var(--azul); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 0.7rem; transition: all 0.2s; flex-shrink: 0; }
        .btn-adicionar-pag:hover { border-color: var(--azul); background: rgba(56,189,248,0.06); }
        .btn-adicionar-pag i { font-size: 1.2rem; }
        .grupo-prof-footer { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
        .grupo-prof-count { font-size: 0.75rem; color: var(--muted); }
        .grupo-rename-wrap { display: none; align-items: center; gap: 6px; flex: 1; }
        .grupo-rename-input { background: var(--bg); border: 1px solid var(--dourado); border-radius: 6px; padding: 4px 8px; color: var(--ink); font-size: 0.9rem; flex: 1; outline: none; }
        .btn-confirm-rename { background: var(--verde); color: var(--bg); border: none; padding: 4px 10px; border-radius: 5px; cursor: pointer; font-size: 0.78rem; font-weight: 700; }
        .btn-cancel-rename { background: var(--card-alt); color: var(--muted); border: 1px solid var(--border); padding: 4px 10px; border-radius: 5px; cursor: pointer; font-size: 0.78rem; }

        /* ── BARRA PROFESSOR ── */
        #barra-professor {
            position: fixed; bottom: 70px; left: 0; right: 0;
            background: rgba(11,18,32,0.95); backdrop-filter: blur(12px);
            border-top: 1px solid rgba(250,204,21,0.3); padding: 10px 20px;
            display: none; align-items: center; justify-content: center;
            gap: 12px; z-index: 90;
        }
        #btn-novo-grupo { background: var(--azul-escuro); color: var(--azul); border: 1px solid var(--border); padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        #btn-novo-grupo:hover { border-color: var(--azul); background: rgba(14,165,233,0.1); }
        #btn-salvar-grupos { background: var(--verde); color: #020617; border: none; padding: 8px 22px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 6px; transition: opacity 0.2s; }
        #btn-salvar-grupos:disabled { opacity: 0.5; cursor: not-allowed; }
        #btn-salvar-grupos:hover:not(:disabled) { opacity: 0.85; }
        .salvar-indicator { font-size: 0.72rem; color: var(--dourado); display: none; }

        /* ── MODAL SELETOR DE PÁGINAS ── */
        #modal-seletor { position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
        #modal-seletor.aberto { display: flex; }
        #modal-seletor-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        #modal-seletor-box { position: relative; background: var(--card); border: 1px solid rgba(250,204,21,0.3); border-radius: 16px; width: 100%; max-width: 560px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; z-index: 1; }
        #modal-seletor-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        #modal-seletor-header span { font-weight: 700; color: var(--ink); font-size: 0.95rem; }
        #modal-seletor-fechar { background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; line-height: 1; padding: 0 4px; }
        #modal-seletor-fechar:hover { color: var(--vermelho); }
        #modal-seletor-grid { padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 12px; overflow-y: auto; }
        .seletor-item { cursor: pointer; border-radius: 8px; overflow: hidden; border: 2px solid transparent; transition: border-color 0.15s, transform 0.15s; }
        .seletor-item:hover { border-color: var(--azul); transform: scale(1.04); }
        .seletor-thumb { width: 100%; height: 120px; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .seletor-thumb canvas { width: 100% !important; height: auto !important; }
        .seletor-label { background: var(--card-alt); padding: 4px 6px; font-size: 0.65rem; color: var(--muted); text-align: center; }

        /* ══════════════════════════════════════════════
           VISUALIZADOR FULLSCREEN
        ══════════════════════════════════════════════ */
        #viz-modal {
            position: fixed; inset: 0; z-index: 300;
            display: none;
            flex-direction: column;
            background: rgba(2, 6, 23, 0.97);
            backdrop-filter: blur(6px);
        }
        #viz-modal.aberto { display: flex; }

        /* Barra superior */
        #viz-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(11,18,32,0.95);
            border-bottom: 1px solid var(--border);
            gap: 12px;
            flex-shrink: 0;
        }
        #viz-nome {
            font-weight: 700;
            font-size: 1rem;
            color: var(--ink);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #viz-contador {
            font-size: 0.78rem;
            color: var(--muted);
            white-space: nowrap;
        }
        #viz-baixar {
            background: var(--azul-escuro);
            color: var(--azul);
            border: 1px solid var(--border);
            padding: 7px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        #viz-baixar:hover { background: var(--azul); color: white; border-color: var(--azul); }
        #viz-fechar {
            background: rgba(239,68,68,0.15);
            color: var(--vermelho);
            border: 1px solid rgba(239,68,68,0.3);
            width: 36px; height: 36px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        #viz-fechar:hover { background: var(--vermelho); color: white; }

        /* Área do canvas */
        #viz-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            position: relative;
            padding: 16px;
        }
        #viz-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: var(--muted);
        }
        #viz-loading i { font-size: 2rem; color: var(--azul); animation: spin 1s linear infinite; }
        #viz-canvas {
            display: none;
            border-radius: 6px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7);
            max-width: 100%;
            touch-action: pan-y;
        }

        /* Botões de navegação lateral */
        .viz-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(11,18,32,0.85);
            color: var(--azul);
            border: 1px solid var(--border);
            width: 44px; height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 2;
            backdrop-filter: blur(4px);
        }
        .viz-nav:hover { background: var(--azul); color: white; }
        #viz-prev { left: 10px; }
        #viz-next { right: 10px; }

        /* Hint de swipe no mobile */
        #viz-swipe-hint {
            text-align: center;
            font-size: 0.72rem;
            color: var(--muted);
            padding: 6px 0 10px;
            flex-shrink: 0;
        }
        @media (min-width: 601px) { #viz-swipe-hint { display: none; } }

        /* ── ERRO ── */
        .erro-doc { text-align: center; padding: 60px 20px; color: var(--vermelho); }
        .erro-doc i { font-size: 3rem; display: block; margin-bottom: 12px; }
    </style>
</head>

    <!-- TOGGLE LISTA / GRADE -->
    <script>
    (function () {
        const STORAGE_KEY = 'partes_view_mode';
        const btnList = document.getElementById('btn-view-list');
        const btnGrid = document.getElementById('btn-view-grid');

        function getGrid() { return document.querySelector('.partes-grid'); }

        function applyMode(mode) {
            const grid = getGrid();
            if (mode === 'list') {
                if (grid) grid.classList.add('view-list');
                btnList.classList.add('active');
                btnGrid.classList.remove('active');
            } else {
                if (grid) grid.classList.remove('view-list');
                btnGrid.classList.add('active');
                btnList.classList.remove('active');
            }
            localStorage.setItem(STORAGE_KEY, mode);
        }

        const saved = localStorage.getItem(STORAGE_KEY) || 'list';
        document.addEventListener('DOMContentLoaded', () => applyMode(saved));

        const observer = new MutationObserver(() => {
            const grid = getGrid();
            if (grid) {
                const current = localStorage.getItem(STORAGE_KEY) || 'list';
                if (current === 'list') grid.classList.add('view-list');
                observer.disconnect();
            }
        });
        observer.observe(document.getElementById('partes-content'), { childList: true, subtree: true });

        btnList.addEventListener('click', () => applyMode('list'));
        btnGrid.addEventListener('click', () => applyMode('grid'));
    })();
    </script>
