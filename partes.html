<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partes - Biblioteca</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="loader.css">
    <link rel="stylesheet" href="bottom-nav.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #020617;
            --card: #0b1220;
            --card-alt: #0f172a;
            --border: rgba(56,189,248,0.25);
            --ink: #e2e8f0;
            --muted: #94a3b8;
            --azul: #0ea5e9;
            --azul-escuro: #1e293b;
            --azul-suave: rgba(56,189,248,0.2);
            --verde: #22c55e;
            --vermelho: #ef4444;
            --dourado: #facc15;
        }
        * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body {
            margin: 0;
            background: radial-gradient(circle at top, #0f172a 0%, #020617 45%, #000 100%);
            color: var(--ink);
            min-height: 100vh;
            padding-bottom: 90px;
        }

        /* ── HEADER ─────────────────────────────────────────────────────────── */
        .partes-header {
            background: rgba(11,18,32,0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .btn-voltar {
            background: var(--azul-escuro);
            color: var(--azul);
            border: 1px solid var(--border);
            padding: 7px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            white-space: nowrap;
        }
        .btn-voltar:hover { border-color: var(--azul); }
        .partes-header h1 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--azul);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

        /* ── PLAYER DE ÁUDIO ─────────────────────────────────────────────────── */
        .audio-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .audio-section i { font-size: 1.6rem; color: var(--verde); flex-shrink: 0; }
        .audio-section audio { flex: 1; height: 38px; border-radius: 6px; outline: none; }

        /* ── DOWNLOAD COMPLETO ───────────────────────────────────────────────── */
        .download-completo {
            background: var(--azul-suave);
            border: 1px solid var(--azul);
            border-radius: 12px;
            padding: 14px 20px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .download-completo span { color: var(--ink); font-size: 0.9rem; }
        .btn-dl-completo {
            background: var(--azul);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* ── TÍTULO SEÇÃO ────────────────────────────────────────────────────── */
        .section-title {
            font-size: 1rem;
            color: var(--muted);
            margin: 0 0 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title span { color: var(--azul); font-weight: 700; }

        /* ── LOADING GLOBAL ──────────────────────────────────────────────────── */
        .loading-partes {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 60px 20px;
            color: var(--muted);
        }
        .loading-partes i { font-size: 2.5rem; color: var(--azul); animation: spin 1s linear infinite; }
        .loading-partes p { margin: 0; font-size: 0.95rem; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── GRID DE GRUPOS ──────────────────────────────────────────────────── */
        .partes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        /* ── CARD DE GRUPO — MODO ALUNO ──────────────────────────────────────── */
        .grupo-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
        }
        .grupo-card:hover {
            border-color: var(--azul);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .grupo-thumb {
            width: 100%;
            background: #fff;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .grupo-thumb canvas { width: 100% !important; height: auto !important; display: block; }
        .thumb-loading {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 8px; background: #0f172a;
            color: var(--muted); font-size: 0.75rem;
        }
        .thumb-loading i { font-size: 1.8rem; color: var(--azul); animation: spin 1s linear infinite; }
        .thumb-error {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            width: 100%; min-height: 200px;
            gap: 8px; color: var(--muted); font-size: 0.75rem;
            background: #0f172a;
        }
        .thumb-error i { font-size: 2.5rem; color: var(--azul); }
        .grupo-info {
            padding: 12px 14px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }
        .grupo-nome-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .grupo-nome {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--ink);
            flex: 1;
            word-break: break-word;
        }
        .grupo-paginas-label {
            font-size: 0.72rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn-baixar-grupo {
            background: var(--azul-escuro);
            color: var(--azul);
            border: 1px solid var(--border);
            padding: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 700;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
            margin-top: auto;
        }
        .btn-baixar-grupo:hover { background: var(--azul); color: white; border-color: var(--azul); }
        .btn-baixar-grupo:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-baixar-grupo.baixando { opacity: 0.7; }

        /* ── CARD DE GRUPO — MODO PROFESSOR ──────────────────────────────────── */
        .grupo-card.professor-mode {
            border-color: rgba(250,204,21,0.25);
            grid-column: 1 / -1;          /* ocupa largura total */
        }
        .grupo-card.professor-mode:hover {
            border-color: var(--dourado);
            transform: none;
        }
        .grupo-prof-header {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(250,204,21,0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(250,204,21,0.04);
        }
        .grupo-prof-nome {
            font-weight: 700;
            font-size: 1rem;
            color: var(--ink);
            flex: 1;
        }
        .btn-renomear-grupo {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 0.82rem;
            transition: color 0.2s;
        }
        .btn-renomear-grupo:hover { color: var(--dourado); }
        .btn-excluir-grupo {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 0.82rem;
            transition: color 0.2s;
        }
        .btn-excluir-grupo:hover { color: var(--vermelho); }

        /* Fila de miniaturas do professor */
        .grupo-thumbs-row {
            padding: 14px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-start;
            border-bottom: 1px solid var(--border);
        }
        .grupo-mini-wrap {
            position: relative;
            width: 80px;
            flex-shrink: 0;
        }
        .grupo-mini-thumb {
            width: 80px;
            height: 110px;
            background: #fff;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }
        .grupo-mini-thumb canvas { width: 100% !important; height: auto !important; }
        .grupo-mini-label {
            font-size: 0.65rem;
            color: var(--muted);
            text-align: center;
            margin-top: 3px;
        }
        .btn-remover-pag {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--vermelho);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            font-weight: 700;
            transition: transform 0.15s;
            z-index: 2;
        }
        .btn-remover-pag:hover { transform: scale(1.2); }
        .btn-adicionar-pag {
            width: 80px;
            height: 110px;
            border: 2px dashed rgba(56,189,248,0.35);
            border-radius: 6px;
            background: none;
            color: var(--azul);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 0.7rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .btn-adicionar-pag:hover {
            border-color: var(--azul);
            background: rgba(56,189,248,0.06);
        }
        .btn-adicionar-pag i { font-size: 1.2rem; }

        /* Rodapé do card professor */
        .grupo-prof-footer {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }
        .grupo-prof-count {
            font-size: 0.75rem;
            color: var(--muted);
        }

        /* Inline rename input */
        .grupo-rename-wrap {
            display: none;
            align-items: center;
            gap: 6px;
            flex: 1;
        }
        .grupo-rename-input {
            background: var(--bg);
            border: 1px solid var(--dourado);
            border-radius: 6px;
            padding: 4px 8px;
            color: var(--ink);
            font-size: 0.9rem;
            flex: 1;
            outline: none;
        }
        .btn-confirm-rename {
            background: var(--verde);
            color: var(--bg);
            border: none;
            padding: 4px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 700;
        }
        .btn-cancel-rename {
            background: var(--card-alt);
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.78rem;
        }

        /* ── BARRA PROFESSOR ─────────────────────────────────────────────────── */
        #barra-professor {
            position: fixed;
            bottom: 70px;   /* acima do bottom-nav */
            left: 0; right: 0;
            background: rgba(11,18,32,0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(250,204,21,0.3);
            padding: 10px 20px;
            display: none;   /* JS mostra se teacher */
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 90;
        }
        #btn-novo-grupo {
            background: var(--azul-escuro);
            color: var(--azul);
            border: 1px solid var(--border);
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        #btn-novo-grupo:hover { border-color: var(--azul); background: rgba(14,165,233,0.1); }
        #btn-salvar-grupos {
            background: var(--verde);
            color: #020617;
            border: none;
            padding: 8px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s;
        }
        #btn-salvar-grupos:disabled { opacity: 0.5; cursor: not-allowed; }
        #btn-salvar-grupos:hover:not(:disabled) { opacity: 0.85; }
        .salvar-indicator {
            font-size: 0.72rem;
            color: var(--dourado);
            display: none;
        }

        /* ── MODAL SELETOR DE PÁGINAS ────────────────────────────────────────── */
        #modal-seletor {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #modal-seletor.aberto { display: flex; }
        #modal-seletor-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
        }
        #modal-seletor-box {
            position: relative;
            background: var(--card);
            border: 1px solid rgba(250,204,21,0.3);
            border-radius: 16px;
            width: 100%;
            max-width: 560px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1;
        }
        #modal-seletor-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        #modal-seletor-header span {
            font-weight: 700;
            color: var(--ink);
            font-size: 0.95rem;
        }
        #modal-seletor-fechar {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.4rem;
            cursor: pointer;
            line-height: 1;
            padding: 0 4px;
        }
        #modal-seletor-fechar:hover { color: var(--vermelho); }
        #modal-seletor-vazio {
            padding: 40px 20px;
            text-align: center;
            color: var(--muted);
            font-size: 0.9rem;
        }
        #modal-seletor-grid {
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 12px;
            overflow-y: auto;
        }
        .seletor-item {
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: border-color 0.15s, transform 0.15s;
        }
        .seletor-item:hover {
            border-color: var(--azul);
            transform: scale(1.04);
        }
        .seletor-thumb {
            width: 100%;
            height: 120px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .seletor-thumb canvas { width: 100% !important; height: auto !important; }
        .seletor-label {
            background: var(--card-alt);
            padding: 4px 6px;
            font-size: 0.65rem;
            color: var(--muted);
            text-align: center;
        }

        /* ── ERRO ────────────────────────────────────────────────────────────── */
        .erro-doc {
            text-align: center;
            padding: 60px 20px;
            color: var(--vermelho);
        }
        .erro-doc i { font-size: 3rem; display: block; margin-bottom: 12px; }

        /* ── LEGADOS (mantidos para compatibilidade) ─────────────────────────── */
        .parte-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; overflow: hidden;
            transition: all 0.25s ease; display: flex; flex-direction: column;
        }
        .parte-card:hover { border-color: var(--azul); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        .parte-thumb { width:100%; background:#fff; min-height:200px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; cursor:pointer; }
        .parte-thumb canvas { width:100% !important; height:auto !important; display:block; }
        .parte-info { padding:12px 14px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:8px; flex:1; }
        .parte-num { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; }
        .parte-nome { font-weight:700; font-size:0.95rem; color:var(--ink); flex:1; word-break:break-word; }
        .btn-baixar-parte { background:var(--azul-escuro); color:var(--azul); border:1px solid var(--border); padding:8px 0; border-radius:8px; cursor:pointer; font-size:0.82rem; font-weight:700; width:100%; display:flex; align-items:center; justify-content:center; gap:6px; transition:all 0.2s; margin-top:auto; }
        .btn-baixar-parte:hover { background:var(--azul); color:white; border-color:var(--azul); }
        .btn-baixar-parte:disabled { opacity:0.5; cursor:not-allowed; }

        /* ── RESPONSIVE ──────────────────────────────────────────────────────── */
        @media (max-width: 600px) {
            .partes-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
            .grupo-card.professor-mode { grid-column: 1 / -1; }
            #barra-professor { gap: 8px; padding: 8px 12px; }
            #btn-novo-grupo, #btn-salvar-grupos { padding: 7px 14px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div id="global-loader">
        <div class="spinner-container">
            <div class="spinner"></div>
            <div id="emoji-container">🎵</div>
            <div id="verse-container">
                <div id="verse-text"></div>
                <div id="verse-reference"></div>
            </div>
        </div>
    </div>

    <!-- ── HEADER ────────────────────────────────────────────────────────────── -->
    <header class="partes-header">
        <a class="btn-voltar" id="btn-voltar" href="biblioteca.html">
            <i class="fas fa-arrow-left"></i> Voltar
        </a>
        <h1 id="doc-titulo">Carregando...</h1>
    </header>

    <!-- ── CONTEÚDO PRINCIPAL ────────────────────────────────────────────────── -->
    <div class="container">
        <!-- Áudio (se existir) -->
        <div class="audio-section" id="audio-section" style="display:none;">
            <i class="fas fa-music"></i>
            <audio id="audio-player" controls>
                <source id="audio-source" src="" type="audio/mpeg">
            </audio>
        </div>

        <!-- Download completo -->
        <div class="download-completo" id="download-completo" style="display:none;">
            <span>📄 Baixar o documento completo (todas as partes)</span>
            <a class="btn-dl-completo" id="btn-dl-completo" href="#" target="_blank">
                <i class="fas fa-download"></i> PDF Completo
            </a>
        </div>

        <!-- Grid de grupos/partes -->
        <div id="partes-content">
            <div class="loading-partes" id="loading-inicial">
                <i class="fas fa-spinner"></i>
                <p>Carregando documento...</p>
            </div>
        </div>
    </div>

    <!-- ── BARRA PROFESSOR (sticky acima do bottom-nav) ──────────────────────── -->
    <div id="barra-professor">
        <button id="btn-novo-grupo">
            <i class="fas fa-plus"></i> Novo Instrumento
        </button>
        <span class="salvar-indicator" id="salvar-indicator">● alterações não salvas</span>
        <button id="btn-salvar-grupos" disabled>
            <i class="fas fa-save"></i> Salvar Tudo
        </button>
    </div>

    <!-- ── MODAL SELETOR DE PÁGINAS ──────────────────────────────────────────── -->
    <div id="modal-seletor">
        <div id="modal-seletor-overlay"></div>
        <div id="modal-seletor-box">
            <div id="modal-seletor-header">
                <span id="modal-seletor-titulo">Escolha uma página para adicionar</span>
                <button id="modal-seletor-fechar" aria-label="Fechar">×</button>
            </div>
            <div id="modal-seletor-grid"></div>
        </div>
    </div>

    <!-- ── BOTTOM NAV ────────────────────────────────────────────────────────── -->
    <nav class="bottom-nav">
        <a href="aluno.html" class="nav-item" data-page="home">
            <i class="fas fa-home nav-icon"></i>
            <span class="nav-label">Home</span>
        </a>
        <a href="painel-social.html" class="nav-item" data-page="comunidade">
            <i class="fas fa-users nav-icon"></i>
            <span class="nav-label">Comunidade</span>
        </a>
        <a href="biblioteca.html" class="nav-item active" data-page="biblioteca">
            <i class="fas fa-book nav-icon"></i>
            <span class="nav-label">Biblioteca</span>
        </a>
        <a href="atividades.html" class="nav-item" data-page="atividades">
            <i class="fas fa-clipboard-list nav-icon"></i>
            <span class="nav-label">Atividades</span>
        </a>
        <a href="professor.html" class="nav-item" data-page="professor" id="navProfessor" style="display:none;">
            <i class="fas fa-chalkboard-teacher nav-icon"></i>
            <span class="nav-label">Professor</span>
        </a>
    </nav>

    <script src="loader.js"></script>
    <script type="module" src="script_partes.js"></script>
    <script type="module" src="navegacao.js"></script>
    <script type="module" src="bottom-nav.js"></script>
</body>
</html>
